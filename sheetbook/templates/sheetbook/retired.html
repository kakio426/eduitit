{% extends "base.html" %}

{% block title %}학급 기록 보드 종료{% endblock %}

{% block content %}
<section class="max-w-2xl mx-auto px-6 py-16">
  <div class="rounded-3xl border border-slate-200 bg-white px-8 py-10 shadow-sm">
    <p class="text-sm font-semibold text-slate-500">서비스 종료</p>
    <h1 class="mt-3 text-3xl font-bold text-slate-900">학급 기록 보드는 종료되었습니다.</h1>
    <p class="mt-4 text-base leading-7 text-slate-600">
      저장된 오래된 링크는 열 수 없도록 정리되었고, 현재 운영 중인 화면에서 같은 흐름을 이어서 사용할 수 있습니다.
    </p>
    <div class="mt-8 flex flex-wrap gap-3">
      <a href="{{ home_url }}" class="inline-flex items-center rounded-2xl bg-slate-900 px-5 py-3 text-sm font-semibold text-white">
        홈으로 이동
      </a>
      <a href="{{ calendar_url }}" class="inline-flex items-center rounded-2xl border border-slate-300 px-5 py-3 text-sm font-semibold text-slate-700">
        오늘 일정 보기
      </a>
    </div>
  </div>
</section>
{% endblock %}
