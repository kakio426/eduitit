{% block title %}달력{% endblock %}

{% block content %}
<section class="pt-28 pb-16 px-4 min-h-screen">
  <div class="max-w-xl mx-auto">
    <div class="rounded-3xl border border-slate-200 bg-white shadow-sm p-6 text-center">
      <p class="text-sm font-semibold text-slate-700">달력으로 이동하고 있습니다.</p>
      <a
        href="{{ calendar_url }}"
        class="mt-4 inline-flex items-center justify-center rounded-xl bg-slate-900 px-4 py-3 text-sm font-bold text-white hover:bg-slate-800 transition"
      >
        계속하기
      </a>
    </div>
  </div>
</section>
{% endblock %}
