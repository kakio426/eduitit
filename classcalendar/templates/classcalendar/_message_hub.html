{% if is_embedded_on_home %}
<template x-teleport="body">
    <div
        x-show="messageHubOpen && messageHubActiveTab === 'capture' && messageHubEntryMode === 'home_mobile_schedule' && isCompactMobileViewport()"
        x-cloak
        class="fixed inset-0 z-[320] bg-slate-950/70 sm:hidden"
        @keydown.escape.window="closeMessageHub()"
    >
        <div class="flex h-full flex-col bg-white">
            <div class="border-b border-slate-200 px-4 py-4">
                <div class="grid grid-cols-[auto_1fr_auto] items-center gap-3">
                    <button
                        type="button"
                        @click="backToMessageCaptureInput()"
                        class="inline-flex items-center justify-center rounded-full border border-slate-300 px-3 py-2 text-sm font-bold text-slate-700"
                    >
                        뒤로
                    </button>
                    <div class="min-w-0 text-center">
                        <p class="text-[11px] font-black uppercase tracking-[0.2em] text-slate-400">모바일 일정 저장</p>
                        <h3 class="mt-1 truncate text-lg font-black text-slate-900">일정 확인</h3>
                    </div>
                    <button
                        type="button"
                        @click="closeMessageHub()"
                        class="inline-flex items-center justify-center rounded-full border border-slate-300 px-3 py-2 text-sm font-bold text-slate-700"
                    >
                        닫기
                    </button>
                </div>
            </div>

            <div x-ref="messageHubHomeMobilePanel" class="min-h-0 flex-1 overflow-y-auto px-4 py-4">
                <div x-show="messageCaptureMobileState === 'loading'" class="flex h-full flex-col items-center justify-center gap-3 py-16 text-center">
                    <div class="h-12 w-12 animate-spin rounded-full border-4 border-slate-200 border-t-slate-900"></div>
                    <div>
                        <p class="text-lg font-black text-slate-900">붙여넣은 안내문에서 날짜를 찾는 중이에요</p>
                    </div>
                </div>

                <div x-show="messageCaptureMobileState === 'review'" class="space-y-4 pb-28">
                    <div class="rounded-[1.75rem] border border-slate-200 bg-slate-50 px-4 py-4">
                        <div class="flex items-start justify-between gap-3">
                            <div class="min-w-0">
                                <p class="text-base font-black text-slate-900" x-text="messageCaptureCandidateSummaryText()"></p>
                            </div>
                            <span class="shrink-0 rounded-full bg-white px-3 py-1 text-xs font-black text-slate-700" x-text="messageCaptureSelectedCount() > 0 ? `${messageCaptureSelectedCount()}개 선택됨` : '선택 없음'"></span>
                        </div>
                        <div class="mt-3 flex flex-wrap gap-2">
                            <span class="inline-flex items-center rounded-full border px-3 py-1 text-xs font-bold" :class="messageCaptureStatusClass()" x-text="messageCaptureStatusText()"></span>
                            <span class="inline-flex items-center rounded-full border px-3 py-1 text-xs font-bold" :class="messageCaptureConfidenceClass()" x-text="messageCaptureConfidenceText()"></span>
                        </div>
                    </div>

                    <div class="rounded-[1.5rem] border border-slate-200 bg-white px-4 py-4">
                        <div class="flex items-start justify-between gap-3">
                            <div class="min-w-0">
                                <p class="text-sm font-black text-slate-900">붙여넣은 원문</p>
                                <p class="mt-2 line-clamp-2 whitespace-pre-line text-sm leading-6 text-slate-600" x-text="(messageCaptureInputText || '').trim() || '원문이 비어 있어요.'"></p>
                            </div>
                            <button
                                type="button"
                                @click="toggleMessageCaptureSourceExpanded()"
                                class="shrink-0 rounded-full border border-slate-300 px-3 py-1.5 text-xs font-bold text-slate-700"
                                x-text="messageCaptureSourceExpanded ? '원문 닫기' : '원문 수정'"
                            ></button>
                        </div>
                        <div x-show="messageCaptureSourceExpanded" class="mt-4 space-y-3">
                            <textarea
                                x-ref="messageCaptureMobileSourceInput"
                                x-model="messageCaptureInputText"
                                rows="8"
                                class="w-full rounded-2xl border border-slate-300 px-4 py-3 text-sm leading-6 text-slate-800 focus:outline-none focus:ring-2 focus:ring-slate-900"
                            ></textarea>
                            <div class="flex gap-2">
                                <button
                                    type="button"
                                    @click="toggleMessageCaptureSourceExpanded(false)"
                                    class="flex-1 rounded-2xl border border-slate-300 px-4 py-3 text-sm font-bold text-slate-700"
                                >
                                    편집 닫기
                                </button>
                                <button
                                    type="button"
                                    @click="submitMessageCaptureParse()"
                                    :disabled="isParsingMessageCapture"
                                    class="flex-1 rounded-2xl bg-slate-900 px-4 py-3 text-sm font-black text-white disabled:opacity-60"
                                >
                                    다시 확인하기
                                </button>
                            </div>
                        </div>
                    </div>

                    <div class="rounded-2xl border border-amber-200 bg-amber-50 px-4 py-3" x-show="messageCaptureWarnings.length > 0">
                        <template x-for="(warningText, index) in messageCaptureWarnings" :key="`mobile-capture-warning-${index}`">
                            <p class="text-sm font-semibold text-amber-800" x-text="warningText"></p>
                        </template>
                    </div>

                    <div class="space-y-3">
                        <template x-for="candidate in messageCaptureEditableCandidates()" :key="`mobile-candidate-${candidate.candidate_id}`">
                            <div class="rounded-[1.5rem] border border-slate-200 bg-white px-4 py-4 shadow-sm">
                                <div class="flex items-start gap-3">
                                    <input
                                        x-model="candidate.selected"
                                        type="checkbox"
                                        class="mt-1 h-5 w-5 rounded border-slate-300 text-slate-900 focus:ring-slate-900"
                                    >
                                    <div class="min-w-0 flex-1">
                                        <div class="flex items-start justify-between gap-3">
                                            <div class="min-w-0">
                                                <div class="flex flex-wrap items-center gap-2">
                                                    <span class="inline-flex items-center rounded-full border px-2.5 py-1 text-xs font-bold" :class="candidate.badge_class" x-text="candidate.badge_text"></span>
                                                    <span x-show="candidate.needs_check" class="inline-flex items-center rounded-full border border-amber-200 bg-amber-50 px-2.5 py-1 text-xs font-bold text-amber-700">확인 필요</span>
                                                </div>
                                                <p class="mt-3 text-base font-black text-slate-900" x-text="candidate.title || '제목 없는 일정'"></p>
                                                <p class="mt-1 text-sm font-bold text-slate-600" x-text="formatMessageCaptureCandidateDate(candidate)"></p>
                                                <p x-show="candidate.summary" class="mt-2 whitespace-pre-line text-sm leading-6 text-slate-500" x-text="candidate.summary"></p>
                                            </div>
                                            <button
                                                type="button"
                                                @click="toggleMessageCaptureCandidateEdit(candidate)"
                                                class="shrink-0 rounded-full border border-slate-300 px-3 py-1.5 text-xs font-bold text-slate-700"
                                                x-text="candidate.edit_open ? '수정 닫기' : '수정'"
                                            ></button>
                                        </div>

                                        <div x-show="candidate.edit_open" class="mt-4 space-y-3 rounded-[1.25rem] border border-slate-200 bg-slate-50 px-3 py-3">
                                            <div>
                                                <label class="mb-1 block text-xs font-bold text-slate-700">일정 제목</label>
                                                <input x-model="candidate.title" type="text" maxlength="200" class="w-full rounded-xl border border-slate-300 bg-white px-3 py-2 text-sm">
                                            </div>
                                            <div>
                                                <label class="mb-1 block text-xs font-bold text-slate-700">메모</label>
                                                <textarea x-model="candidate.summary" rows="3" class="w-full rounded-xl border border-slate-300 bg-white px-3 py-2 text-sm leading-6"></textarea>
                                            </div>
                                            <div class="grid grid-cols-2 gap-3">
                                                <div>
                                                    <label class="mb-1 block text-[11px] font-bold text-slate-600">시작일</label>
                                                    <input x-model="candidate.start_date" type="date" class="w-full rounded-xl border border-slate-300 bg-white px-3 py-2 text-sm">
                                                </div>
                                                <div>
                                                    <label class="mb-1 block text-[11px] font-bold text-slate-600">종료일</label>
                                                    <input x-model="candidate.end_date" type="date" class="w-full rounded-xl border border-slate-300 bg-white px-3 py-2 text-sm">
                                                </div>
                                            </div>
                                            <div class="flex items-center justify-between gap-3">
                                                <p class="text-xs font-bold text-slate-700">시간 설정</p>
                                                <button type="button" @click="candidate.has_time = !candidate.has_time" class="rounded-full px-3 py-1.5 text-xs font-bold" :class="candidate.has_time ? 'bg-indigo-100 text-indigo-700' : 'bg-slate-200 text-slate-700'">
                                                    <span x-text="candidate.has_time ? '시간 사용' : '종일'"></span>
                                                </button>
                                            </div>
                                            <div x-show="candidate.has_time" class="grid grid-cols-2 gap-3">
                                                <div>
                                                    <label class="mb-1 block text-[11px] font-bold text-slate-600">시작 시간</label>
                                                    <input x-model="candidate.start_clock" type="time" class="w-full rounded-xl border border-slate-300 bg-white px-3 py-2 text-sm">
                                                </div>
                                                <div>
                                                    <label class="mb-1 block text-[11px] font-bold text-slate-600">종료 시간</label>
                                                    <input x-model="candidate.end_clock" type="time" class="w-full rounded-xl border border-slate-300 bg-white px-3 py-2 text-sm">
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </template>
                    </div>

                    <p x-show="messageCaptureErrorText" class="rounded-2xl border border-rose-200 bg-rose-50 px-4 py-3 text-sm font-semibold text-rose-700" x-text="messageCaptureErrorText"></p>
                </div>

                <div x-show="messageCaptureMobileState === 'fallback'" class="space-y-4 pb-28">
                    <div class="rounded-[1.75rem] border border-amber-200 bg-amber-50 px-4 py-4">
                        <p class="text-lg font-black text-amber-900" x-text="messageCaptureCandidates.length > 0 ? '이미 저장된 일정만 있어서 새로 저장할 일정이 없어요.' : '자동으로 바로 저장할 일정은 못 찾았어요.'"></p>
                    </div>

                    <div class="rounded-[1.5rem] border border-slate-200 bg-white px-4 py-4">
                        <div class="flex items-start justify-between gap-3">
                            <div class="min-w-0">
                                <p class="text-sm font-black text-slate-900">붙여넣은 원문</p>
                                <p class="mt-2 line-clamp-2 whitespace-pre-line text-sm leading-6 text-slate-600" x-text="(messageCaptureInputText || '').trim() || '원문이 비어 있어요.'"></p>
                            </div>
                            <button
                                type="button"
                                @click="toggleMessageCaptureSourceExpanded()"
                                class="shrink-0 rounded-full border border-slate-300 px-3 py-1.5 text-xs font-bold text-slate-700"
                                x-text="messageCaptureSourceExpanded ? '원문 닫기' : '원문 수정'"
                            ></button>
                        </div>
                        <div x-show="messageCaptureSourceExpanded" class="mt-4 space-y-3">
                            <textarea
                                x-ref="messageCaptureMobileSourceInput"
                                x-model="messageCaptureInputText"
                                rows="8"
                                class="w-full rounded-2xl border border-slate-300 px-4 py-3 text-sm leading-6 text-slate-800 focus:outline-none focus:ring-2 focus:ring-slate-900"
                            ></textarea>
                        </div>
                    </div>

                    <div x-show="messageCaptureCandidates.length > 0" class="space-y-3">
                        <template x-for="candidate in messageCaptureCandidates" :key="`fallback-candidate-${candidate.candidate_id}`">
                            <div class="rounded-2xl border border-slate-200 bg-white px-4 py-4">
                                <div class="flex flex-wrap items-center gap-2">
                                    <span class="inline-flex items-center rounded-full border px-2.5 py-1 text-xs font-bold" :class="candidate.badge_class" x-text="candidate.badge_text"></span>
                                    <span class="inline-flex items-center rounded-full border border-slate-200 bg-slate-100 px-2.5 py-1 text-xs font-bold text-slate-600">이미 저장됨</span>
                                </div>
                                <p class="mt-3 text-base font-black text-slate-900" x-text="candidate.title || '제목 없는 일정'"></p>
                                <p class="mt-1 text-sm font-bold text-slate-600" x-text="formatMessageCaptureCandidateDate(candidate)"></p>
                            </div>
                        </template>
                    </div>

                    <p x-show="messageCaptureErrorText" class="rounded-2xl border border-rose-200 bg-rose-50 px-4 py-3 text-sm font-semibold text-rose-700" x-text="messageCaptureErrorText"></p>
                </div>

                <div x-show="messageCaptureMobileState === 'success'" class="space-y-4 pb-8">
                    <div class="rounded-[1.75rem] border border-emerald-200 bg-emerald-50 px-5 py-5 text-center">
                        <p class="text-lg font-black text-emerald-900" x-text="messageCaptureDoneTitle()"></p>
                        <p class="mt-2 text-sm font-semibold text-emerald-800" x-text="messageCaptureSavedMessage || '캘린더에서 바로 확인할 수 있어요.'"></p>
                    </div>

                    <div x-show="messageCaptureSavedEvents.length > 0" class="space-y-3">
                        <p class="text-sm font-black text-slate-900">방금 저장한 일정</p>
                        <template x-for="savedEvent in messageCaptureSavedEvents" :key="`mobile-saved-${savedEvent.id}`">
                            <div class="rounded-2xl border border-slate-200 bg-white px-4 py-4 shadow-sm">
                                <p class="text-sm font-black text-slate-900" x-text="savedEvent.title"></p>
                                <p class="mt-1 text-xs font-semibold text-slate-500" x-text="formatArchiveSavedEventDate(savedEvent)"></p>
                            </div>
                        </template>
                    </div>
                </div>
            </div>

            <div x-show="messageCaptureMobileState === 'review'" class="border-t border-slate-200 bg-white px-4 py-4">
                <div class="flex gap-2">
                    <button
                        type="button"
                        @click="backToMessageCaptureInput()"
                        class="flex-1 rounded-2xl border border-slate-300 px-4 py-3 text-sm font-black text-slate-700"
                    >
                        다시 붙여넣기
                    </button>
                    <button
                        type="button"
                        @click="submitMessageCaptureCommit()"
                        :disabled="isCommittingMessageCapture || messageCaptureSelectedCount() === 0"
                        class="flex-[1.3] rounded-2xl bg-slate-900 px-4 py-3 text-sm font-black text-white disabled:opacity-60"
                        x-text="messageCaptureSelectedCount() > 0 ? `선택한 일정 ${messageCaptureSelectedCount()}개 캘린더에 저장` : '선택한 일정 캘린더에 저장'"
                    ></button>
                </div>
            </div>

            <div x-show="messageCaptureMobileState === 'fallback'" class="border-t border-slate-200 bg-white px-4 py-4">
                <div class="flex gap-2">
                    <button
                        type="button"
                        @click="submitMessageCaptureArchiveSave()"
                        :disabled="isSavingMessageCaptureArchive || isParsingMessageCapture"
                        class="flex-1 rounded-2xl border border-slate-300 px-4 py-3 text-sm font-black text-slate-700 disabled:opacity-60"
                    >
                        메시지만 보관
                    </button>
                    <button
                        type="button"
                        @click="submitMessageCaptureParse()"
                        :disabled="isParsingMessageCapture"
                        class="flex-1 rounded-2xl bg-slate-900 px-4 py-3 text-sm font-black text-white disabled:opacity-60"
                    >
                        다시 확인하기
                    </button>
                </div>
            </div>

            <div x-show="messageCaptureMobileState === 'success'" class="border-t border-slate-200 bg-white px-4 py-4">
                <div class="flex gap-2">
                    <button
                        type="button"
                        @click="startAnotherMessageCapture()"
                        class="flex-1 rounded-2xl border border-slate-300 px-4 py-3 text-sm font-black text-slate-700"
                    >
                        다른 안내문 넣기
                    </button>
                    <button
                        type="button"
                        @click="closeMessageHub()"
                        class="flex-1 rounded-2xl bg-slate-900 px-4 py-3 text-sm font-black text-white"
                    >
                        캘린더로 돌아가기
                    </button>
                </div>
                <button
                    type="button"
                    @click="openMessageArchiveFromSuccess()"
                    class="mt-2 w-full rounded-2xl px-4 py-3 text-sm font-bold text-slate-500"
                >
                    메시지 보관함 보기
                </button>
            </div>
        </div>
    </div>
</template>
{% endif %}

<template x-teleport="body">
<div
    x-show="messageHubOpen && !(messageHubActiveTab === 'capture' && messageHubEntryMode === 'home_mobile_schedule' && isCompactMobileViewport())"
    x-cloak
    class="classcalendar-message-hub-shell fixed inset-0 z-[320] bg-slate-950/60 p-3 backdrop-blur-[2px] sm:p-6"
    @click.self="closeMessageHub()"
    @keydown.escape.window="closeMessageHub()"
>
    <div class="flex min-h-full items-center justify-center">
    <div
        class="classcalendar-message-hub-dialog flex w-full flex-col overflow-hidden rounded-[28px] border border-slate-200 bg-white shadow-2xl"
        :class="messageHubActiveTab === 'archive' ? 'max-w-6xl classcalendar-message-hub-dialog--archive' : 'max-w-5xl'"
    >
        <div class="border-b border-slate-200 px-5 py-4 sm:px-6">
            <div class="flex items-start justify-between gap-3">
                <div>
                    <h3 x-show="messageHubActiveTab === 'archive'" class="text-xl font-extrabold text-slate-900 sm:text-2xl">받은 메시지</h3>
                    <h3 x-show="messageHubActiveTab === 'capture'" class="text-xl font-extrabold text-slate-900 sm:text-2xl">새 메시지에서 일정 만들기</h3>
                </div>
                <button
                    type="button"
                    @click="closeMessageHub()"
                    class="inline-flex items-center rounded-xl border border-slate-300 px-3 py-2 text-sm font-semibold text-slate-600 transition hover:bg-slate-100"
                >
                    닫기
                </button>
            </div>
            <div class="mt-4 flex flex-wrap gap-2">
                <button
                    type="button"
                    x-show="messageHubActiveTab === 'archive'"
                    @click="switchMessageHubTab('capture')"
                    class="rounded-full border border-slate-900 bg-slate-900 px-4 py-2 text-sm font-bold text-white transition hover:bg-slate-800"
                >
                    새 메시지에서 일정 만들기
                </button>
                <button
                    type="button"
                    x-show="messageHubActiveTab === 'capture'"
                    @click="switchMessageHubTab('archive')"
                    class="rounded-full border border-slate-300 bg-white px-4 py-2 text-sm font-bold text-slate-700 transition hover:bg-slate-50"
                >
                    받은 메시지 목록
                </button>
            </div>
        </div>

        <div x-show="messageHubActiveTab === 'capture'" x-ref="messageHubCapturePanel" class="classcalendar-message-hub-panel min-h-0 flex-1 overflow-y-auto px-5 py-5 sm:px-6">
            <div class="mx-auto max-w-4xl" x-show="messageCaptureStep === 'input'">
                <div class="space-y-4">
                    <div>
                        <label class="mb-1.5 block text-sm font-bold text-slate-700">메시지 붙여넣기</label>
                        <textarea
                            x-ref="messageCaptureInput"
                            x-model="messageCaptureInputText"
                            rows="10"
                            class="w-full rounded-2xl border border-slate-300 px-4 py-3 text-sm leading-6 focus:outline-none focus:ring-2 focus:ring-indigo-400"
                            aria-label="정리할 메시지"
                            placeholder="예) 3월 19일(목) 학부모총회가 실시됩니다. 12일(목)까지 연수물 수정 부탁드립니다."
                        ></textarea>
                    </div>
                    <div>
                        <label class="mb-1.5 block text-sm font-bold text-slate-700">파일 첨부</label>
                        <div
                            class="rounded-2xl border-2 border-dashed p-4 transition"
                            :class="messageCaptureDropActive ? 'border-indigo-400 bg-indigo-50/70' : 'border-slate-300 bg-slate-50'"
                            @dragover.prevent="messageCaptureDropActive = true"
                            @dragleave.prevent="messageCaptureDropActive = false"
                            @drop.prevent="handleMessageCaptureDrop($event)"
                        >
                            <p class="text-sm font-semibold text-slate-700">여기로 파일을 끌어오거나 선택 버튼을 눌러주세요.</p>
                            <p class="mt-1 text-xs text-slate-500" x-text="messageCaptureFileLimitText()"></p>
                            <div class="mt-3">
                                <input
                                    x-ref="messageCaptureFileInput"
                                    type="file"
                                    class="hidden"
                                    multiple
                                    @change="handleMessageCaptureFileInput($event)"
                                >
                                <button
                                    type="button"
                                    @click="$refs.messageCaptureFileInput.click()"
                                    class="inline-flex items-center rounded-xl border border-slate-300 bg-white px-3 py-2 text-sm font-semibold text-slate-700 transition hover:bg-slate-100"
                                >
                                    파일 선택
                                </button>
                            </div>
                        </div>
                    </div>
                    <template x-if="messageCaptureFileErrors.length > 0">
                        <div class="rounded-2xl border border-rose-200 bg-rose-50 px-4 py-3">
                            <template x-for="(errorText, index) in messageCaptureFileErrors" :key="`capture-file-error-${index}`">
                                <p class="text-sm font-semibold text-rose-700" x-text="errorText"></p>
                            </template>
                        </div>
                    </template>
                    <div class="rounded-2xl border border-slate-200 bg-slate-50 px-4 py-3" x-show="messageCaptureFiles.length > 0">
                        <p class="mb-2 text-xs font-bold text-slate-700">첨부 목록</p>
                        <template x-for="fileItem in messageCaptureFiles" :key="fileItem.id">
                            <div class="flex items-center justify-between gap-2 rounded-xl border border-slate-200 bg-white px-3 py-2">
                                <div class="min-w-0">
                                    <p class="truncate text-sm font-semibold text-slate-800" x-text="fileItem.name"></p>
                                    <p class="text-xs text-slate-500" x-text="formatBytes(fileItem.size)"></p>
                                </div>
                                <button type="button" @click="removeMessageCaptureFile(fileItem.id)" class="text-xs font-bold text-rose-600">삭제</button>
                            </div>
                        </template>
                    </div>
                    <p x-show="messageCaptureErrorText" class="rounded-2xl border border-rose-200 bg-rose-50 px-4 py-3 text-sm font-semibold text-rose-700" x-text="messageCaptureErrorText"></p>
                </div>
                <div class="sticky bottom-0 z-10 mx-auto mt-5 flex max-w-4xl flex-col gap-2 border-t border-slate-200 bg-white/95 px-1 pb-1 pt-3 backdrop-blur sm:static sm:border-0 sm:bg-transparent sm:px-0 sm:pb-0 sm:pt-0 sm:flex-row sm:items-center sm:justify-end">
