<div
    x-show="messageHubOpen"
    x-cloak
    class="classcalendar-message-hub-shell fixed inset-0 z-[260] bg-slate-900/60 p-3 sm:p-6"
    @click.self="closeMessageHub()"
    @keydown.escape.window="closeMessageHub()"
>
    <div class="flex min-h-full items-start justify-center sm:items-center">
    <div class="classcalendar-message-hub-dialog flex w-full max-w-5xl flex-col overflow-hidden rounded-[28px] border border-slate-200 bg-white shadow-2xl">
        <div class="border-b border-slate-200 px-5 py-4 sm:px-6">
            <div class="flex items-start justify-between gap-3">
                <div>
                    <h3 class="text-xl font-extrabold text-slate-900 sm:text-2xl">메시지 정리</h3>
                </div>
                <button
                    type="button"
                    @click="closeMessageHub()"
                    class="inline-flex items-center rounded-xl border border-slate-300 px-3 py-2 text-sm font-semibold text-slate-600 transition hover:bg-slate-100"
                >
                    닫기
                </button>
            </div>
            <div class="mt-4 flex flex-wrap gap-2">
                <button
                    type="button"
                    @click="switchMessageHubTab('capture')"
                    :class="messageHubActiveTab === 'capture' ? 'bg-slate-900 text-white border-slate-900' : 'bg-white text-slate-700 border-slate-300'"
                    class="rounded-full border px-4 py-2 text-sm font-bold transition"
                >
                    일정 찾기
                </button>
                <button
                    type="button"
                    @click="switchMessageHubTab('archive')"
                    :class="messageHubActiveTab === 'archive' ? 'bg-slate-900 text-white border-slate-900' : 'bg-white text-slate-700 border-slate-300'"
                    class="rounded-full border px-4 py-2 text-sm font-bold transition"
                >
                    보관함
                </button>
            </div>
        </div>

        <div x-show="messageHubActiveTab === 'capture'" x-ref="messageHubCapturePanel" class="classcalendar-message-hub-panel min-h-0 flex-1 overflow-y-auto px-5 py-5 sm:px-6">
            <div class="mx-auto max-w-4xl" x-show="messageCaptureStep === 'input'">
                <div class="space-y-4">
                    <div>
                        <textarea
                            x-ref="messageCaptureInput"
                            x-model="messageCaptureInputText"
                            rows="11"
                            class="w-full rounded-2xl border border-slate-300 px-4 py-3 text-sm leading-6 focus:outline-none focus:ring-2 focus:ring-indigo-400"
                            aria-label="정리할 메시지"
                            placeholder="예) 10월 3일 등잔박물관 체험학습, 준비물은 도시락과 물입니다."
                        ></textarea>
                    </div>
                    <details class="rounded-2xl border border-slate-200 bg-slate-50 px-4 py-3" :open="!!(messageCaptureLinkedDate || messageCaptureManualNote || messageCaptureFiles.length > 0)">
                        <summary class="cursor-pointer text-sm font-bold text-slate-700">추가 옵션</summary>
                        <div class="mt-3 space-y-3">
                            <div class="grid grid-cols-1 gap-3 sm:grid-cols-2">
                                <div class="rounded-2xl border border-slate-200 bg-white px-4 py-4">
                                    <label class="mb-1.5 block text-sm font-bold text-slate-700">다시 볼 날짜</label>
                                    <input
                                        x-model="messageCaptureLinkedDate"
                                        type="date"
                                        class="w-full rounded-2xl border border-slate-300 bg-white px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400"
                                    >
                                </div>
                                <div class="rounded-2xl border border-slate-200 bg-white px-4 py-4">
                                    <label class="mb-1.5 block text-sm font-bold text-slate-700">다시 볼 메모</label>
                                    <input
                                        x-model="messageCaptureManualNote"
                                        type="text"
                                        maxlength="200"
                                        class="w-full rounded-2xl border border-slate-300 bg-white px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400"
                                        placeholder="예) 점심시간 전에 확인"
                                    >
                                </div>
                            </div>
                            <div class="rounded-2xl border border-slate-200 bg-white px-4 py-4">
                                <div class="mb-3 flex items-start justify-between gap-3">
                                    <div>
                                        <label class="mb-1.5 block text-sm font-bold text-slate-700">파일 첨부</label>
                                        <p class="text-xs text-slate-500" x-text="messageCaptureFileLimitText()"></p>
                                    </div>
                                    <span x-show="messageCaptureFiles.length > 0" class="rounded-full bg-slate-50 px-3 py-1 text-xs font-bold text-slate-700" x-text="`${messageCaptureFiles.length}개 선택됨`"></span>
                                </div>
                                <div
                                    class="rounded-2xl border-2 border-dashed p-4 transition"
                                    :class="messageCaptureDropActive ? 'border-indigo-400 bg-indigo-50/70' : 'border-slate-300 bg-white'"
                                    @dragover.prevent="messageCaptureDropActive = true"
                                    @dragleave.prevent="messageCaptureDropActive = false"
                                    @drop.prevent="handleMessageCaptureDrop($event)"
                                >
                                    <div class="flex flex-wrap items-center gap-2">
                                        <input
                                            x-ref="messageCaptureFileInput"
                                            type="file"
                                            class="hidden"
                                            multiple
                                            @change="handleMessageCaptureFileInput($event)"
                                        >
                                        <button
                                            type="button"
                                            @click="$refs.messageCaptureFileInput.click()"
                                            class="inline-flex items-center rounded-xl border border-slate-300 bg-white px-3 py-2 text-sm font-semibold text-slate-700 transition hover:bg-slate-100"
                                        >
                                            파일 선택
                                        </button>
                                    </div>
                                    <div x-show="messageCaptureFiles.length > 0" class="mt-3 space-y-2">
                                        <template x-for="fileItem in messageCaptureFiles" :key="fileItem.id">
                                            <div class="flex items-center justify-between gap-2 rounded-xl border border-slate-200 bg-slate-50 px-3 py-2">
                                                <div class="min-w-0">
                                                    <p class="truncate text-sm font-semibold text-slate-800" x-text="fileItem.name"></p>
                                                    <p class="text-xs text-slate-500" x-text="formatBytes(fileItem.size)"></p>
                                                </div>
                                                <button type="button" @click="removeMessageCaptureFile(fileItem.id)" class="text-xs font-bold text-rose-600">삭제</button>
                                            </div>
                                        </template>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </details>
                    <details class="rounded-2xl border border-slate-200 bg-slate-50 px-4 py-3">
                        <summary class="cursor-pointer text-sm font-bold text-slate-700">예시 넣기</summary>
                        <div class="mt-3 flex flex-wrap gap-2">
                            <template x-for="template in messageCaptureTemplates" :key="template.id">
                                <button
                                    type="button"
                                    @click="applyMessageCaptureTemplate(template.id)"
                                    class="inline-flex items-center rounded-full border border-slate-300 bg-white px-3.5 py-2 text-sm font-bold text-slate-700 transition hover:border-indigo-300 hover:text-indigo-700"
                                    x-text="template.title"
                                ></button>
                            </template>
                        </div>
                    </details>
                    <template x-if="messageCaptureFileErrors.length > 0">
                        <div class="rounded-2xl border border-rose-200 bg-rose-50 px-4 py-3">
                            <template x-for="(errorText, index) in messageCaptureFileErrors" :key="`capture-file-error-${index}`">
                                <p class="text-sm font-semibold text-rose-700" x-text="errorText"></p>
                            </template>
                        </div>
                    </template>
                    <p x-show="messageCaptureErrorText" class="rounded-2xl border border-rose-200 bg-rose-50 px-4 py-3 text-sm font-semibold text-rose-700" x-text="messageCaptureErrorText"></p>
                </div>
                <div class="mx-auto mt-5 flex max-w-4xl flex-col gap-2 sm:flex-row sm:items-center sm:justify-end">
                    <button type="button" @click="closeMessageHub()" class="rounded-2xl border border-slate-300 px-4 py-3 text-sm font-bold text-slate-700">닫기</button>
                    <button type="button" @click="submitMessageCaptureArchiveSave()" :disabled="isSavingMessageCaptureArchive || isParsingMessageCapture" class="rounded-2xl bg-slate-900 px-5 py-3 text-sm font-extrabold text-white disabled:opacity-60">메시지 보관함에 저장</button>
                    <button type="button" @click="submitMessageCaptureParse()" :disabled="isSavingMessageCaptureArchive || isParsingMessageCapture" class="rounded-2xl border border-indigo-200 bg-indigo-50 px-5 py-3 text-sm font-extrabold text-indigo-700 disabled:opacity-60">일정 찾기</button>
                </div>
            </div>

            <div class="mx-auto max-w-4xl space-y-4" x-show="messageCaptureStep === 'confirm'">
                <div class="rounded-2xl border border-slate-200 bg-slate-50 px-4 py-4">
                    <div>
                        <p class="text-sm font-extrabold text-slate-900" x-text="messageCaptureCandidateSummaryText()"></p>
                    </div>
                </div>
                <div class="rounded-2xl border border-amber-200 bg-amber-50 px-4 py-3" x-show="messageCaptureWarnings.length > 0">
                    <template x-for="(warningText, index) in messageCaptureWarnings" :key="`capture-warning-${index}`">
                        <p class="text-sm font-semibold text-amber-800" x-text="warningText"></p>
                    </template>
                </div>
                <div class="space-y-3">
                    <template x-for="candidate in messageCaptureVisibleCandidates()" :key="candidate.candidate_id">
                        <div class="rounded-2xl border border-slate-200 bg-white px-4 py-4 shadow-sm">
                            <div class="flex flex-wrap items-center justify-between gap-2">
                                <div class="flex flex-wrap items-center gap-2">
                                    <span class="inline-flex items-center rounded-full border px-2.5 py-1 text-xs font-bold" :class="candidate.badge_class" x-text="candidate.badge_text"></span>
                                    <span x-show="candidate.needs_check" class="inline-flex items-center rounded-full border border-amber-200 bg-amber-50 px-2.5 py-1 text-xs font-bold text-amber-700">확인 필요</span>
                                </div>
                            </div>
                            <div class="mt-4 grid grid-cols-1 gap-4 xl:grid-cols-[minmax(0,1.15fr)_minmax(18rem,0.85fr)]">
                                <div class="space-y-3">
                                    <div>
                                        <label class="mb-1 block text-xs font-bold text-slate-700">일정 제목</label>
                                        <input x-model="candidate.title" type="text" maxlength="200" class="w-full rounded-xl border border-slate-300 px-3 py-2 text-sm">
                                    </div>
                                    <div>
                                        <label class="mb-1 block text-xs font-bold text-slate-700">메모</label>
                                        <textarea x-model="candidate.summary" rows="3" class="w-full rounded-xl border border-slate-300 px-3 py-2 text-sm leading-6" placeholder="메모를 입력하세요."></textarea>
                                    </div>
                                </div>
                                <div class="rounded-2xl border border-slate-200 bg-slate-50 px-4 py-4">
                                    <div class="flex items-center justify-between gap-2">
                                        <p class="text-xs font-bold text-slate-700">날짜 / 시간</p>
                                        <button type="button" @click="candidate.has_time = !candidate.has_time" class="inline-flex items-center rounded-full px-3 py-1.5 text-xs font-bold transition" :class="candidate.has_time ? 'bg-indigo-100 text-indigo-700 hover:bg-indigo-200' : 'bg-slate-200 text-slate-700 hover:bg-slate-300'">
                                            <span x-text="candidate.has_time ? '시간 사용' : '종일'"></span>
                                        </button>
                                    </div>
                                    <div class="mt-3 grid grid-cols-1 gap-3 sm:grid-cols-2">
                                        <div>
                                            <label class="mb-1 block text-[11px] font-bold text-slate-600">시작일</label>
                                            <input x-model="candidate.start_date" type="date" class="w-full rounded-xl border border-slate-300 bg-white px-3 py-2 text-sm">
                                        </div>
                                        <div>
                                            <label class="mb-1 block text-[11px] font-bold text-slate-600">종료일</label>
                                            <input x-model="candidate.end_date" type="date" class="w-full rounded-xl border border-slate-300 bg-white px-3 py-2 text-sm">
                                        </div>
                                    </div>
                                    <div x-show="candidate.has_time" class="mt-3 grid grid-cols-1 gap-3 sm:grid-cols-2">
                                        <div>
                                            <label class="mb-1 block text-[11px] font-bold text-slate-600">시작 시간</label>
                                            <input x-model="candidate.start_clock" type="time" class="w-full rounded-xl border border-slate-300 bg-white px-3 py-2 text-sm">
                                        </div>
                                        <div>
                                            <label class="mb-1 block text-[11px] font-bold text-slate-600">종료 시간</label>
                                            <input x-model="candidate.end_clock" type="time" class="w-full rounded-xl border border-slate-300 bg-white px-3 py-2 text-sm">
                                        </div>
                                    </div>
                                    <p class="mt-3 text-xs font-semibold text-slate-500" x-text="formatMessageCaptureCandidateDate(candidate)"></p>
                                </div>
                            </div>
                        </div>
                    </template>
                    <div x-show="messageCaptureCandidates.length > 0 && messageCaptureVisibleCandidates().length === 0" class="rounded-2xl border border-slate-200 bg-slate-50 px-4 py-4 text-sm font-semibold text-slate-500">
                        추가할 후보가 없습니다.
                    </div>
                </div>
                <details class="rounded-2xl border border-slate-200 bg-slate-50 px-4 py-3" :open="!!(messageCaptureLinkedDate || messageCaptureManualNote || messageCaptureServerAttachments.length > 0)">
                    <summary class="cursor-pointer text-sm font-bold text-slate-700">추가로 남길 내용</summary>
                    <div class="mt-3 grid grid-cols-1 gap-3 xl:grid-cols-[minmax(0,1fr)_minmax(18rem,0.9fr)]">
                        <div class="rounded-2xl border border-slate-200 bg-white px-4 py-4">
                            <div class="grid grid-cols-1 gap-3 sm:grid-cols-2">
                                <div>
                                    <label class="mb-1 block text-xs font-bold text-slate-700">다시 볼 날짜</label>
                                    <input x-model="messageCaptureLinkedDate" type="date" class="w-full rounded-xl border border-slate-300 px-3 py-2 text-sm">
                                </div>
                                <div>
                                    <label class="mb-1 block text-xs font-bold text-slate-700">다시 볼 메모</label>
                                    <input x-model="messageCaptureManualNote" type="text" maxlength="200" class="w-full rounded-xl border border-slate-300 px-3 py-2 text-sm" placeholder="예) 수업 전 다시 확인">
                                </div>
                            </div>
                        </div>
                        <div class="rounded-2xl border border-slate-200 bg-white px-4 py-4">
                            <div class="flex items-center justify-between gap-2">
                                <p class="text-xs font-bold text-slate-700">문서 첨부</p>
                                <span class="text-xs font-semibold text-slate-500" x-text="messageCaptureServerAttachments.length > 0 ? `${messageCaptureServerAttachments.length}개` : '없음'"></span>
                            </div>
                            <div x-show="messageCaptureServerAttachments.length > 0" class="mt-3 space-y-2">
                                <template x-for="attachment in messageCaptureServerAttachments" :key="`capture-attachment-${attachment.id}`">
                                    <div class="rounded-xl border border-slate-200 bg-slate-50 px-3 py-2">
                                        <p class="text-sm font-semibold text-slate-800" x-text="attachment.original_name"></p>
                                        <p class="text-xs text-slate-500" x-text="formatBytes(attachment.size_bytes)"></p>
                                    </div>
                                </template>
                            </div>
                            <p x-show="messageCaptureServerAttachments.length === 0" class="mt-3 rounded-xl border border-dashed border-slate-300 bg-slate-50 px-3 py-3 text-xs font-semibold text-slate-500">지금 연결된 문서가 없어요.</p>
                        </div>
                    </div>
                </details>
                <details x-show="messageCaptureHiddenCandidates().length > 0" class="rounded-2xl border border-slate-200 bg-slate-50 px-4 py-3">
                    <summary class="cursor-pointer text-sm font-bold text-slate-700" x-text="`나머지 일정 더 보기 (${messageCaptureHiddenCandidates().length})`"></summary>
                    <div class="mt-3 space-y-3">
                        <template x-for="candidate in messageCaptureHiddenCandidates()" :key="`hidden-${candidate.candidate_id}`">
                            <div class="rounded-2xl border border-slate-200 bg-white px-4 py-4">
                                <p class="text-base font-extrabold text-slate-900" x-text="candidate.title"></p>
                                <p class="mt-1 text-sm font-bold text-slate-600" x-text="formatMessageCaptureCandidateDate(candidate)"></p>
                            </div>
                        </template>
                    </div>
                </details>
                <p x-show="messageCaptureErrorText" class="rounded-2xl border border-rose-200 bg-rose-50 px-4 py-3 text-sm font-semibold text-rose-700" x-text="messageCaptureErrorText"></p>
                <div class="mx-auto flex max-w-4xl flex-col gap-2 sm:flex-row sm:items-center sm:justify-between">
                    <button type="button" @click="backToMessageCaptureInput()" class="rounded-2xl border border-slate-300 px-4 py-3 text-sm font-bold text-slate-700">다시 붙여넣기</button>
                    <button type="button" @click="submitMessageCaptureLink()" :disabled="isCommittingMessageCapture" class="rounded-2xl bg-indigo-600 px-5 py-3 text-sm font-extrabold text-white disabled:opacity-60">메시지 항목으로 저장</button>
                </div>
            </div>

            <div class="mx-auto max-w-3xl space-y-4 text-center" x-show="messageCaptureStep === 'done'">
                <div class="rounded-3xl border border-emerald-200 bg-emerald-50 px-5 py-5">
                    <p class="text-lg font-black text-emerald-900" x-text="messageCaptureDoneTitle()"></p>
                    <p class="mt-2 text-sm font-semibold text-emerald-800" x-text="messageCaptureSavedMessage || '저장되었습니다.'"></p>
                </div>
                <div x-show="messageCaptureSuccessMode === 'commit' && messageCaptureSavedEvents.length > 0" class="rounded-2xl border border-slate-200 bg-white px-4 py-4 text-left shadow-sm">
                    <p class="mb-3 text-sm font-extrabold text-slate-900">방금 저장한 일정</p>
                    <template x-for="savedEvent in messageCaptureSavedEvents" :key="savedEvent.id">
                        <div class="mb-2 rounded-xl border border-slate-200 bg-slate-50 px-4 py-3 last:mb-0">
                            <p class="text-sm font-bold text-slate-900" x-text="savedEvent.title"></p>
                            <p class="mt-1 text-xs font-semibold text-slate-500" x-text="formatArchiveSavedEventDate(savedEvent)"></p>
                        </div>
                    </template>
                </div>
                <div class="flex flex-col gap-2 sm:flex-row sm:justify-end">
                    <button type="button" @click="startAnotherMessageCapture()" class="rounded-2xl border border-slate-300 px-4 py-3 text-sm font-bold text-slate-700">새 메시지</button>
                    <button type="button" @click="openMessageArchiveFromSuccess()" class="rounded-2xl bg-slate-900 px-5 py-3 text-sm font-extrabold text-white">메시지 보관함 보기</button>
                </div>
            </div>
        </div>

        <div x-show="messageHubActiveTab === 'archive'" x-ref="messageHubArchivePanel" class="classcalendar-message-hub-panel min-h-0 flex-1 overflow-y-auto px-5 py-5 sm:px-6">
            <div class="grid grid-cols-1 gap-4 lg:grid-cols-[22rem_minmax(0,1fr)]">
                <div class="min-h-0 overflow-hidden rounded-[24px] border border-slate-200 bg-slate-50">
                    <div class="space-y-3 border-b border-slate-200 px-4 py-4">
                        <input x-model="messageArchiveQuery" @keydown.enter.prevent="loadMessageArchive({ reset: true })" type="search" placeholder="메모나 첨부 이름으로 찾기" class="w-full rounded-2xl border border-slate-300 px-4 py-3 text-sm">
                        <div class="flex flex-wrap gap-2">
                            <button type="button" @click="setMessageArchiveFilter('all')" :class="messageArchiveFilter === 'all' ? 'bg-slate-900 text-white border-slate-900' : 'bg-white text-slate-700 border-slate-300'" class="rounded-full border px-3 py-1.5 text-xs font-bold transition">전체 <span x-text="messageArchiveCounts.all || 0"></span></button>
                            <button type="button" @click="setMessageArchiveFilter('unparsed')" :class="messageArchiveFilter === 'unparsed' ? 'bg-slate-900 text-white border-slate-900' : 'bg-white text-slate-700 border-slate-300'" class="rounded-full border px-3 py-1.5 text-xs font-bold transition">미분석 <span x-text="messageArchiveCounts.unparsed || 0"></span></button>
                            <button type="button" @click="setMessageArchiveFilter('saved')" :class="messageArchiveFilter === 'saved' ? 'bg-slate-900 text-white border-slate-900' : 'bg-white text-slate-700 border-slate-300'" class="rounded-full border px-3 py-1.5 text-xs font-bold transition">저장 완료 <span x-text="messageArchiveCounts.saved || 0"></span></button>
                            <button type="button" @click="setMessageArchiveFilter('pending')" :class="messageArchiveFilter === 'pending' ? 'bg-slate-900 text-white border-slate-900' : 'bg-white text-slate-700 border-slate-300'" class="rounded-full border px-3 py-1.5 text-xs font-bold transition">미저장 <span x-text="messageArchiveCounts.pending || 0"></span></button>
                        </div>
                    </div>
                    <div class="space-y-3 px-3 py-3">
                        <p x-show="messageArchiveErrorText" class="rounded-2xl border border-rose-200 bg-rose-50 px-4 py-3 text-sm font-semibold text-rose-700" x-text="messageArchiveErrorText"></p>
                        <div x-show="isLoadingMessageArchive && messageArchiveItems.length === 0" class="rounded-2xl border border-slate-200 bg-white px-4 py-5 text-sm font-semibold text-slate-500">보관 메모를 불러오는 중이에요.</div>
                        <template x-for="item in messageArchiveItems" :key="item.capture_id">
                            <button type="button" @click="openMessageArchiveItemFromList(item.capture_id)" class="w-full rounded-[22px] border bg-white px-4 py-4 text-left shadow-sm transition" :class="messageArchiveSelectedCapture && messageArchiveSelectedCapture.capture_id === item.capture_id ? 'border-indigo-300 ring-2 ring-indigo-200' : 'border-slate-200 hover:border-slate-300'">
                                <div class="flex items-start justify-between gap-2">
                                    <div class="min-w-0">
                                        <p class="text-xs font-bold text-slate-500" x-text="formatMessageArchiveCreatedAt(item.created_at)"></p>
                                        <p class="mt-2 whitespace-pre-line text-sm font-extrabold text-slate-900 line-clamp-2" x-text="item.preview_text || '원문이 비어 있어요.'"></p>
                                    </div>
                                    <span class="inline-flex shrink-0 items-center rounded-full border px-2.5 py-1 text-[11px] font-bold" :class="archiveStatusBadgeClass(item.archive_status)" x-text="item.archive_status_label"></span>
                                </div>
                            </button>
                        </template>
                        <div x-show="!isLoadingMessageArchive && messageArchiveItems.length === 0" class="rounded-2xl border border-slate-200 bg-white px-4 py-5 text-sm font-semibold text-slate-500">아직 저장된 메모가 없어요.</div>
                        <button type="button" x-show="messageArchiveHasNext" @click="loadMoreMessageArchive()" class="w-full rounded-2xl border border-slate-300 bg-white px-4 py-3 text-sm font-bold text-slate-700">더 보기</button>
                    </div>
                </div>

                <div x-ref="messageArchiveDetailPane" class="min-h-0 overflow-hidden rounded-[24px] border border-slate-200 bg-white">
                    <div x-show="isLoadingMessageArchiveDetail" class="flex items-center justify-center px-6 py-10 text-sm font-semibold text-slate-500">메모를 불러오는 중이에요.</div>
                    <div x-show="!isLoadingMessageArchiveDetail && !messageArchiveSelectedCapture" class="flex items-center justify-center px-6 py-10 text-center text-sm font-semibold text-slate-500">메모를 고르면 내용이 보입니다.</div>
                    <div x-show="!isLoadingMessageArchiveDetail && messageArchiveSelectedCapture" class="space-y-4 px-5 py-5 sm:px-6">
                        <div class="rounded-2xl border border-slate-200 bg-slate-50 px-4 py-3">
                            <p class="text-sm font-extrabold text-slate-900" x-text="messageArchiveSelectedCapture ? (messageArchiveSelectedCapture.summary_text || '저장된 메모') : ''"></p>
                            <p class="mt-1 text-xs font-semibold text-slate-500" x-text="messageArchiveSelectedCapture ? formatMessageArchiveCreatedAt(messageArchiveSelectedCapture.created_at) : ''"></p>
                        </div>
                        <div x-ref="messageArchivePrimaryAction" class="rounded-2xl border border-indigo-200 bg-indigo-50 px-4 py-4">
                            <p class="text-base font-extrabold text-slate-900" x-text="messageArchivePrimaryActionTitle()"></p>
                            <p class="mt-1 text-sm font-semibold text-slate-600" x-text="messageArchivePrimaryActionDescription()"></p>
                            <div class="mt-3 flex flex-col gap-2 sm:flex-row sm:items-center">
                                <button type="button" @click="replayMessageArchiveCapture()" :disabled="isLoadingMessageArchiveDetail" class="rounded-2xl bg-indigo-600 px-5 py-3 text-sm font-extrabold text-white disabled:cursor-not-allowed disabled:opacity-60" x-text="messageArchivePrimaryActionButtonText()"></button>
                                <button type="button" x-show="canToggleSelectedCapture()" @click="toggleSelectedCapture()" :disabled="isLoadingMessageArchiveDetail" class="rounded-2xl border border-emerald-200 bg-emerald-50 px-5 py-3 text-sm font-extrabold text-emerald-800 disabled:cursor-not-allowed disabled:opacity-60" x-text="selectedCaptureActionText()"></button>
                                <span class="inline-flex items-center rounded-full border px-2.5 py-1 text-xs font-bold" :class="selectedCaptureStatusBadgeClass()" x-text="selectedCaptureStatusText()"></span>
                            </div>
                        </div>
                        <div>
                            <p class="mb-2 text-sm font-extrabold text-slate-900">원문</p>
                            <div class="rounded-2xl border border-slate-200 bg-white px-4 py-4 text-sm leading-6 text-slate-700 whitespace-pre-line" x-text="messageArchiveSelectedCapture ? (messageArchiveSelectedCapture.raw_text || '원문이 비어 있어요.') : ''"></div>
                        </div>
                        <div x-show="messageArchiveSelectedCapture && messageArchiveSelectedCapture.attachments && messageArchiveSelectedCapture.attachments.length > 0">
                            <p class="mb-2 text-sm font-extrabold text-slate-900">첨부</p>
                            <div class="space-y-2">
                                <template x-for="attachment in (messageArchiveSelectedCapture ? messageArchiveSelectedCapture.attachments : [])" :key="attachment.id">
                                    <div class="rounded-2xl border border-slate-200 bg-slate-50 px-4 py-3">
                                        <p class="text-sm font-bold text-slate-900" x-text="attachment.original_name"></p>
                                        <p class="mt-1 text-xs font-semibold text-slate-500" x-text="formatBytes(attachment.size_bytes)"></p>
                                    </div>
                                </template>
                            </div>
                        </div>
                        <div>
                            <p class="mb-2 text-sm font-extrabold text-slate-900">찾은 일정</p>
                            <div class="space-y-3" x-show="messageArchiveVisibleCandidates().length > 0">
                                <template x-for="candidate in messageArchiveVisibleCandidates()" :key="candidate.candidate_id">
                                    <div class="rounded-2xl border border-slate-200 bg-slate-50 px-4 py-4">
                                        <div class="flex flex-wrap items-center gap-2">
                                            <span class="inline-flex items-center rounded-full border px-2.5 py-1 text-xs font-bold" :class="archiveCandidateBadgeClass(candidate.kind)" x-text="candidate.badge_text"></span>
                                        </div>
                                        <p class="mt-2 text-base font-extrabold text-slate-900" x-text="candidate.title"></p>
                                        <p class="mt-1 text-sm font-bold text-slate-600" x-text="formatArchiveCandidateDate(candidate)"></p>
                                    </div>
                                </template>
                            </div>
                            <div x-show="messageArchiveSelectedCapture && messageArchiveVisibleCandidates().length === 0" class="rounded-2xl border border-slate-200 bg-slate-50 px-4 py-4 text-sm font-semibold text-slate-500" x-text="messageArchiveCandidateEmptyText()"></div>
                        </div>
                        <div>
                            <p class="mb-2 text-sm font-extrabold text-slate-900">연결된 일정 / 할 일</p>
                            <div class="space-y-2" x-show="hasSelectedCaptureLinkedItems()">
                                <template x-for="linked in selectedCaptureLinkedItems()" :key="`${linked.item_type}-${linked.id}`">
                                    <div class="rounded-2xl border border-slate-200 bg-slate-50 px-4 py-3">
                                        <div class="flex items-center justify-between gap-3">
                                            <div class="min-w-0">
                                                <p class="text-sm font-bold text-slate-900" x-text="linked.title"></p>
                                                <p class="mt-1 text-xs font-semibold text-slate-500" x-text="linked.detail_text"></p>
                                            </div>
                                            <a x-show="linked.calendar_url" :href="linked.calendar_url" class="shrink-0 text-xs font-bold text-amber-700">캘린더에서 보기</a>
                                        </div>
                                    </div>
                                </template>
                            </div>
                            <div x-show="messageArchiveSelectedCapture && !hasSelectedCaptureLinkedItems()" class="rounded-2xl border border-slate-200 bg-slate-50 px-4 py-4 text-sm font-semibold text-slate-500">아직 연결된 일정이나 할 일이 없어요.</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    </div>
</div>
