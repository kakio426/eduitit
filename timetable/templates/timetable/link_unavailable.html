{% extends "timetable/share_shell.html" %}

{% block title %}시간표 링크 확인{% endblock %}

{% block content %}
<section class="min-h-screen px-4 py-10">
    <div class="mx-auto flex min-h-[70vh] max-w-xl items-center">
        <div class="w-full rounded-[28px] border border-slate-200 bg-white px-6 py-8 text-center shadow-sm">
            <span class="inline-flex rounded-full bg-rose-100 px-4 py-2 text-sm font-bold text-rose-700">{{ status_code }}</span>
            <h1 class="mt-5 text-3xl font-black text-slate-900">{{ message }}</h1>
            <p class="mt-3 text-sm font-semibold text-slate-500">새 링크를 요청해 주세요.</p>
        </div>
    </div>
</section>
{% endblock %}
