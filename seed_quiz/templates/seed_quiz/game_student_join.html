<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>씨앗 퀴즈 게임 입장</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        body { font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif; background: linear-gradient(180deg, #f8fafc 0%, #e0f2fe 100%); }
    </style>
</head>
<body class="min-h-screen px-4 py-8">
    <div class="mx-auto max-w-sm">
        <div class="mb-8 text-center">
            <div class="mb-4 text-6xl">🎮</div>
            <h1 class="text-3xl font-black text-slate-900">실시간 게임</h1>
            {% if room %}
            <p class="mt-2 text-sm text-slate-500">{{ room.classroom.name }} · {{ room.title }}</p>
            {% else %}
            <p class="mt-2 text-sm text-slate-500">코드만 넣으면 바로 들어갑니다.</p>
            {% endif %}
        </div>

        <div class="rounded-[28px] border border-white/70 bg-white/90 p-6 shadow-xl shadow-sky-100">
            {% if error_message %}
            <div class="mb-4 rounded-2xl border border-red-200 bg-red-50 px-4 py-3 text-sm font-bold text-red-700">
                {{ error_message }}
            </div>
            {% endif %}

            <form method="post" action="{% url 'seed_quiz:student_game_start' %}" class="space-y-4">
                {% csrf_token %}
                <div>
                    <label class="mb-2 block text-sm font-bold text-slate-700">입장 코드</label>
                    <input type="text" name="join_code" value="{{ join_code }}" maxlength="8" required
                           class="w-full rounded-2xl border border-slate-200 px-4 py-3 text-center text-xl font-black tracking-[0.35em] text-slate-900">
                </div>
                <div>
                    <label class="mb-2 block text-sm font-bold text-slate-700">번호</label>
                    <input type="tel" name="number" inputmode="numeric" required
                           class="w-full rounded-2xl border border-slate-200 px-4 py-3 text-center text-lg font-bold text-slate-900"
                           placeholder="1">
                </div>
                <div>
                    <label class="mb-2 block text-sm font-bold text-slate-700">이름</label>
                    <input type="text" name="name" required maxlength="20"
                           class="w-full rounded-2xl border border-slate-200 px-4 py-3 text-center text-lg font-bold text-slate-900"
                           placeholder="홍길동">
                </div>
                <button type="submit" class="w-full rounded-2xl bg-slate-900 px-4 py-4 text-lg font-black text-white">
                    들어가기
                </button>
            </form>
        </div>
    </div>
</body>
</html>
