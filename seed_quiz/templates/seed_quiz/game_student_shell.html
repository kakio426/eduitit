<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>{{ room.title }}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/htmx.org@2/dist/htmx.min.js"></script>
    <style>
        body { font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif; background: linear-gradient(180deg, #eff6ff 0%, #f8fafc 100%); }
    </style>
</head>
<body class="min-h-screen">
    <script>
    document.addEventListener('htmx:configRequest', function (event) {
        event.detail.headers['X-CSRFToken'] = '{{ csrf_token }}';
    });
    </script>

    <div class="mx-auto max-w-xl px-4 py-6">
        <div id="game-area"
             hx-get="{% url 'seed_quiz:htmx_student_game_state' %}"
             hx-trigger="load"
             hx-target="#game-area"
             hx-swap="innerHTML">
            <div class="rounded-[28px] border border-white/70 bg-white/90 p-8 text-center shadow-xl shadow-sky-100">
                <div class="mb-4 text-5xl">🌱</div>
                <p class="text-sm font-bold text-slate-700">게임을 불러오는 중입니다.</p>
            </div>
        </div>
    </div>
</body>
</html>
