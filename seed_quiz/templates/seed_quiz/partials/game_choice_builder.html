{% if error_message %}
<div class="rounded-2xl border border-red-200 bg-red-50 px-4 py-3 text-sm font-bold text-red-700">
    {{ error_message }}
</div>
{% else %}
<div class="space-y-3">
    <input type="hidden" name="correct_index" value="{{ correct_index }}">
    {% for choice in choices %}
    <label class="block rounded-2xl border px-4 py-3 {% if forloop.counter0 == correct_index %}border-emerald-300 bg-emerald-50{% else %}border-slate-200 bg-white{% endif %}">
        <span class="mb-2 block text-xs font-bold {% if forloop.counter0 == correct_index %}text-emerald-700{% else %}text-slate-500{% endif %}">
            {% if forloop.counter0 == correct_index %}정답 보기{% else %}보기 {{ forloop.counter }}{% endif %}
        </span>
        <input type="text" name="choice_{{ forloop.counter0 }}" value="{{ choice }}"
               class="w-full bg-transparent text-sm font-bold text-slate-900 outline-none">
    </label>
    {% endfor %}
</div>
{% endif %}
