<div class="space-y-3">
    {% if limit_message %}
    <div class="rounded-2xl border border-amber-200 bg-amber-50 px-4 py-3 text-sm font-semibold text-amber-700">
        {{ limit_message }}
    </div>
    {% endif %}

    {% if error_message %}
    <div class="rounded-2xl border border-rose-200 bg-rose-50 px-4 py-3 text-sm font-semibold text-rose-700">
        {{ error_message }}
    </div>
    {% endif %}

    {% if info_message %}
    <div class="rounded-2xl border border-sky-200 bg-sky-50 px-4 py-3 text-sm font-semibold text-sky-700">
        {{ info_message }}
    </div>
    {% endif %}

    {% if result_text %}
    <div class="rounded-[1.5rem] border border-slate-200 bg-white px-4 py-4">
        <p class="text-sm font-extrabold text-slate-900">생성 미리보기</p>
        <p class="mt-2 text-sm leading-6 text-slate-600">
            {{ result_text }}
        </p>
        <textarea id="home-mini-notice-copy-source" class="hidden">{{ result_text }}</textarea>
        <div class="mt-3 flex items-center justify-between gap-3">
            <p class="text-xs font-semibold text-slate-400">결과는 짧게 보고, 더 다듬으려면 전체 열기로 이동하세요.</p>
            <button
                type="button"
                class="inline-flex items-center gap-1 rounded-xl border border-slate-200 bg-slate-50 px-3 py-2 text-xs font-bold text-slate-700 transition hover:border-indigo-300 hover:text-indigo-600"
                data-copy-source-id="home-mini-notice-copy-source"
            >
                <i class="fa-regular fa-copy"></i>
                복사
            </button>
        </div>
    </div>
    {% else %}
    <div class="rounded-[1.5rem] border border-dashed border-slate-300 bg-slate-50 px-4 py-5 text-sm font-semibold leading-6 text-slate-500">
        대상과 주제를 고르고 문장 만들기를 눌러보세요.
    </div>
    {% endif %}
</div>
