{% extends "base.html" %}

{% block title %}제출 완료{% endblock %}

{% block content %}
<main class="pt-32 pb-16 px-4 min-h-screen bg-[#E0E5EC]">
  <div class="max-w-xl mx-auto">
    <div class="clay-card p-6 text-center">
      <h1 class="text-2xl font-bold text-gray-800 mb-2">동의서 제출이 완료되었습니다.</h1>
      <p class="text-gray-600">{{ recipient.request.title }}</p>
      <p class="text-sm text-gray-500 mt-2">제출 상태: {{ recipient.get_status_display }}</p>
      <p class="text-xs text-gray-500 mt-4 leading-6">
        관련 운영기준은
        <a href="{% url 'policy' %}#terms" target="_blank" rel="noopener noreferrer" class="font-semibold text-purple-700 hover:underline">이용약관</a>,
        <a href="{% url 'policy' %}#privacy" target="_blank" rel="noopener noreferrer" class="font-semibold text-purple-700 hover:underline">개인정보처리방침</a>
        에서 확인할 수 있습니다.
      </p>
    </div>
  </div>
</main>
{% endblock %}
