<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>잇티PDF사인</title>
  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f8fafc;
      color: #0f172a;
    }
    .shell {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .panel {
      width: min(100%, 640px);
      background: #fff;
      border: 1px solid #fde68a;
      border-radius: 28px;
      padding: 32px;
      box-shadow: 0 20px 40px rgba(15, 23, 42, 0.08);
    }
    .eyebrow {
      margin: 0;
      color: #d97706;
      font-size: 14px;
      font-weight: 700;
    }
    h1 {
      margin: 12px 0 0;
      font-size: 32px;
      line-height: 1.15;
    }
    p {
      margin: 12px 0 0;
      font-size: 16px;
      line-height: 1.6;
      color: #475569;
    }
    a {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      margin-top: 24px;
      padding: 12px 20px;
      border-radius: 18px;
      background: #0f172a;
      color: #fff;
      text-decoration: none;
      font-weight: 700;
    }
  </style>
</head>
<body>
  <main class="shell">
    <section class="panel">
      <p class="eyebrow">준비 중</p>
      <h1>잠시만요</h1>
      <p>문서 사인 작업 공간을 마무리하는 중입니다.</p>
      <a href="/">홈으로</a>
    </section>
  </main>
</body>
</html>
