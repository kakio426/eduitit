# Render Blueprint Configuration
# https://render.com/docs/blueprint-spec

services:
  - type: web
    name: eduitit
    runtime: python
    buildCommand: |
      pip install -r requirements.txt
      python manage.py collectstatic --noinput
    preDeployCommand: |
      python manage.py migrate --noinput
      python manage.py bootstrap_runtime
    startCommand: uvicorn config.asgi:application --host 0.0.0.0 --port $PORT
    healthCheckPath: /health/
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings_production
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: eduitit-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: eduitit-redis
          type: keyvalue
          property: connectionString
      - key: ALLOWED_HOSTS
        value: .onrender.com
      - key: DEBUG
        value: "false"
      - key: PYTHON_VERSION
        value: "3.12.0"

  - type: cron
    name: eduitit-quickdrop-cleanup
    runtime: python
    region: oregon
    plan: starter
    autoDeployTrigger: off
    buildCommand: |
      pip install -r requirements.txt
    startCommand: python manage.py cleanup_quickdrop
    # Asia/Seoul 02:00 = UTC 17:00 (previous day)
    schedule: "0 17 * * *"
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings_production
      - key: SECRET_KEY
        fromService:
          type: web
          name: eduitit
          envVarKey: SECRET_KEY
      - key: DATABASE_URL
        fromDatabase:
          name: eduitit-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: eduitit-redis
          type: keyvalue
          property: connectionString
      - key: CLOUDINARY_URL
        fromService:
          type: web
          name: eduitit
          envVarKey: CLOUDINARY_URL
      - key: CLOUDINARY_CLOUD_NAME
        fromService:
          type: web
          name: eduitit
          envVarKey: CLOUDINARY_CLOUD_NAME
      - key: CLOUDINARY_API_KEY
        fromService:
          type: web
          name: eduitit
          envVarKey: CLOUDINARY_API_KEY
      - key: CLOUDINARY_API_SECRET
        fromService:
          type: web
          name: eduitit
          envVarKey: CLOUDINARY_API_SECRET
      - key: ALLOWED_HOSTS
        value: .onrender.com
      - key: DEBUG
        value: "false"
      - key: PYTHON_VERSION
        value: "3.12.0"

  - type: keyvalue
    name: eduitit-redis
    plan: free
    region: oregon

databases:
  - name: eduitit-db
    plan: free
    databaseName: eduitit_prod
    user: eduitit_user
