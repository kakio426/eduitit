# Render Blueprint Configuration
# https://render.com/docs/blueprint-spec

services:
  - type: web
    name: eduitit
    runtime: python
    buildCommand: |
      pip install -r requirements.txt
      python manage.py collectstatic --noinput
      python manage.py migrate
    startCommand: uvicorn config.asgi:application --host 0.0.0.0 --port $PORT
    healthCheckPath: /
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings_production
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: eduitit-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: eduitit-redis
          type: keyvalue
          property: connectionString
      - key: ALLOWED_HOSTS
        value: .onrender.com
      - key: DEBUG
        value: "false"
      - key: PYTHON_VERSION
        value: "3.12.0"

  - type: keyvalue
    name: eduitit-redis
    plan: free
    region: oregon

databases:
  - name: eduitit-db
    plan: free
    databaseName: eduitit_prod
    user: eduitit_user
