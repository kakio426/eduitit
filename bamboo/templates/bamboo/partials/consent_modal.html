<div x-data="{ open: true }" x-show="open" x-cloak class="fixed inset-x-0 bottom-0 z-50 bg-slate-950/40 px-4 pb-4" style="top: var(--main-nav-height, 88px);">
    <div class="mx-auto mt-8 max-w-lg rounded-2xl border border-amber-200 bg-white p-5 shadow-2xl">
        <div class="flex items-start justify-between gap-3">
            <div>
                <p class="text-sm font-black text-amber-700">쓰기 전 약속</p>
                <h3 class="mt-1 text-xl font-black text-slate-950">식별 정보 금지</h3>
            </div>
            <button type="button" class="inline-flex h-9 w-9 items-center justify-center rounded-full text-slate-400 hover:bg-slate-100 hover:text-slate-700" @click="open = false" aria-label="닫기">
                <i class="ph ph-x"></i>
            </button>
        </div>
        <div class="mt-4 space-y-2 text-sm font-semibold leading-6 text-slate-700">
            <p>실명, 학교명, 지역, 연락처, 학년·반을 쓰지 않습니다.</p>
            <p>특정인 비방·허위사실 작성과 공개 책임은 작성자에게 있습니다.</p>
        </div>
        <button type="button" class="mt-5 inline-flex w-full items-center justify-center rounded-xl bg-amber-500 px-4 py-3 text-sm font-black text-white transition hover:bg-amber-600" @click="open = false">확인</button>
    </div>
</div>
