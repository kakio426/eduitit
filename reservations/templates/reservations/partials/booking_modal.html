<div x-show="showModal" class="fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4"
    @mousedown.self="showModal = false"
    x-transition:enter="transition ease-out duration-300 transform" x-transition:enter-start="opacity-0 translate-y-4"
    x-transition:enter-end="opacity-100 translate-y-0" x-transition:leave="transition ease-in duration-200 transform"
    x-transition:leave-start="opacity-100 translate-y-0" x-transition:leave-end="opacity-0 translate-y-4">
    <div class="bg-white rounded-2xl w-full max-w-md p-6 shadow-2xl relative">

        <h3 class="text-xl font-bold text-gray-800 mb-4 flex items-center gap-2">
            <span class="text-xs px-2 py-1 rounded-full font-black"
                :class="submitMode === 'edit' ? 'bg-indigo-100 text-indigo-700' : 'bg-purple-100 text-purple-700'"
                x-text="submitMode === 'edit' ? '예약 수정' : '예약 생성'"></span>
            <span class="text-purple-600 font-extrabold" x-text="selectedRoom"></span>
            <span class="text-gray-400 font-medium text-sm" x-text="selectedPeriodLabel"></span>
        </h3>

        <form action="{% url 'reservations:create_reservation' school.slug %}"
            x-bind:action="getSubmitUrl()"
            x-bind:hx-post="getSubmitUrl()"
            hx-target="#reservation-grid-container"
            hx-swap="none" hx-indicator="#reservation-submit-indicator" hx-disabled-elt="find button[type='submit']"
            hx-on::response-error="alert(event.detail.xhr.responseText || '예약 처리 중 오류가 발생했습니다. 잠시 후 다시 시도해 주세요.')"
            class="space-y-4" @submit="prepareReservationSubmit($event)">
            {% csrf_token %}
            <input type="hidden" name="room_id" :value="selectedRoomId">
            <input type="hidden" name="date" :value="selectedDate">
            <input type="hidden" name="period" :value="selectedPeriod">
            <input type="hidden" name="override_grade_lock" :value="overrideGradeLock ? '1' : '0'">
            <input type="hidden" name="target_label" :value="bookingKind === 'custom' ? targetLabel : ''">

            <div x-show="gradeLockActive" x-cloak class="rounded-xl border border-amber-200 bg-amber-50 px-3 py-2 text-xs text-amber-700">
                이 슬롯은 현재 <strong x-text="`${gradeLockGrade}학년`"></strong> 고정입니다.
                다른 학년으로 예약하면 이번 예약만 예외 처리되고 다음 주 고정은 유지됩니다.
            </div>

            <div>
                <label class="block text-sm font-bold text-gray-700 mb-1">예약 대상 유형</label>
                <div class="grid grid-cols-2 gap-2">
                    <button type="button" @click="setBookingKind('class')"
                        :class="bookingKind === 'class' ? 'bg-purple-100 border-purple-300 text-purple-700' : 'bg-white border-gray-200 text-gray-500'"
                        class="px-3 py-2 rounded-lg border text-sm font-bold transition-colors">학급(학년/반)</button>
                    <button type="button" @click="setBookingKind('custom')"
                        :class="bookingKind === 'custom' ? 'bg-indigo-100 border-indigo-300 text-indigo-700' : 'bg-white border-gray-200 text-gray-500'"
                        class="px-3 py-2 rounded-lg border text-sm font-bold transition-colors">역할/소속 입력</button>
                </div>
            </div>

            <div x-show="bookingKind === 'class'" class="flex gap-4">
                <div class="w-1/2">
                    <label class="block text-sm font-bold text-gray-700 mb-1">학년</label>
                    <input type="number" name="grade" x-model="grade"
                        class="w-full clay-inner p-3 rounded-xl text-center"
                        min="1" max="6" :required="bookingKind === 'class'" :disabled="bookingKind !== 'class'"
                        placeholder="예: 3" autocomplete="off">
                </div>
                <div class="w-1/2">
                    <label class="block text-sm font-bold text-gray-700 mb-1">반</label>
                    <input type="number" name="class_no" x-model="classNo"
                        class="w-full clay-inner p-3 rounded-xl text-center"
                        min="1" max="15" :required="bookingKind === 'class'" :disabled="bookingKind !== 'class'"
                        placeholder="예: 1" autocomplete="off">
                </div>
            </div>
            <p x-show="bookingKind === 'class'" class="text-xs text-gray-400 -mt-2 ml-1">예시: 3학년 1반 홍길동</p>

            <div x-show="bookingKind === 'custom'">
                <label class="block text-sm font-bold text-gray-700 mb-1">역할 또는 소속</label>
                <input type="text" x-model="targetLabel"
                    class="w-full clay-inner p-3 rounded-xl"
                    :required="bookingKind === 'custom'" :disabled="bookingKind !== 'custom'"
                    placeholder="예: 사서, 영양, 보건, 상담, 돌봄, 늘봄, 교무실, 행정실" autocomplete="off" maxlength="40">
            </div>

            <div>
                <label class="block text-sm font-bold text-gray-700 mb-1">이름</label>
                <input type="text" name="name" x-model="name" class="w-full clay-inner p-3 rounded-xl text-center"
                    required placeholder="예: 홍길동" autocomplete="off">
            </div>

            <div>
                <label class="block text-sm font-bold text-gray-700 mb-1"
                    x-text="submitMode === 'edit' ? (editingRequiresCodeSetup ? '수정 코드 4자리' : '새 수정 코드 (선택)') : '수정 코드 4자리'"></label>
                <input type="password" name="edit_code" x-model="editCode"
                    class="w-full clay-inner p-3 rounded-xl text-center tracking-[0.35em]"
                    inputmode="numeric" maxlength="4" autocomplete="one-time-code"
                    :required="submitMode === 'create' || editingRequiresCodeSetup"
                    :placeholder="submitMode === 'edit' && !editingRequiresCodeSetup ? '변경할 때만 입력' : '예: 1234'">
                <p class="mt-1 ml-1 text-xs text-gray-400"
                    x-text="submitMode === 'edit' && !editingRequiresCodeSetup ? '비워두면 기존 코드 유지' : '다른 기기에서 수정하거나 취소할 때 씁니다.'"></p>
            </div>

            <label class="flex items-center gap-2 text-xs text-gray-500 ml-1">
                <input type="checkbox" class="rounded border-gray-300 text-purple-600 focus:ring-purple-400"
                    x-model="rememberInfo" @change="toggleRememberInfo()">
                <span>이 기기에서 정보 기억 (학년/반/기타대상/이름/수정코드)</span>
            </label>

            <div>
                <label class="block text-sm font-bold text-gray-700 mb-1">메모 (선택)</label>
                <input type="text" name="memo" x-model="memo" class="w-full clay-inner p-3 rounded-xl"
                    placeholder="실험 제목 등">
            </div>

            <div class="flex gap-2 mt-6">
                <button type="button" @click="showModal = false"
                    class="w-1/3 py-3 rounded-xl text-gray-500 font-bold hover:bg-gray-100 transition-colors">취소</button>
                <button type="submit"
                    class="w-2/3 py-3 rounded-xl bg-purple-500 text-white font-bold shadow-clay hover:bg-purple-600 transition-colors transform active:scale-95 inline-flex items-center justify-center gap-2">
                    <span id="reservation-submit-indicator" class="htmx-indicator">
                        <i class="fa-solid fa-circle-notch fa-spin"></i>
                    </span>
                    <span x-text="getSubmitLabel()"></span>
                </button>
            </div>
        </form>
    </div>
</div>
