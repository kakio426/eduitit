<div x-show="showClaimModal" class="fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4"
    @mousedown.self="showClaimModal = false"
    x-transition:enter="transition ease-out duration-300 transform" x-transition:enter-start="opacity-0 translate-y-4"
    x-transition:enter-end="opacity-100 translate-y-0" x-transition:leave="transition ease-in duration-200 transform"
    x-transition:leave-start="opacity-100 translate-y-0" x-transition:leave-end="opacity-0 translate-y-4">
    <div class="bg-white rounded-2xl w-full max-w-md p-6 shadow-2xl relative">
        <h3 class="text-xl font-bold text-gray-800 mb-2 flex items-center gap-2">
            <span class="text-xs px-2 py-1 rounded-full font-black bg-amber-100 text-amber-700">열기 / 취소</span>
            <span class="text-purple-600 font-extrabold" x-text="claimRoomName"></span>
        </h3>
        <p class="text-sm text-gray-600" x-text="`${claimDate} · ${claimPeriodLabel}`"></p>
        <p class="mt-1 text-sm font-bold text-gray-700" x-text="claimParty"></p>

        <div x-show="!claimHasEditCode" x-cloak class="mt-4 rounded-xl border border-amber-200 bg-amber-50 px-3 py-2 text-xs text-amber-700">
            이 예약은 아직 수정 코드가 없습니다. 예전 예약이라면 아래의 `내 예약 찾기`로 먼저 연 뒤, 수정 코드 4자리를 저장해 주세요.
        </div>

        <form class="space-y-4 mt-4"
            x-bind:action="getClaimSubmitUrl()"
            x-bind:hx-post="getClaimSubmitUrl()"
            x-bind:hx-confirm="claimSubmitMode === 'delete' ? '이 예약을 바로 취소할까요?' : ''"
            hx-target="#reservation-grid-container"
            hx-swap="none"
            hx-indicator="#reservation-claim-indicator"
            hx-disabled-elt="find button[type='submit']"
            hx-on::response-error="alert(event.detail.xhr.responseText || '내 예약을 찾는 중 오류가 발생했습니다. 잠시 후 다시 시도해 주세요.')"
            @submit="prepareClaimSubmit($event)">
            {% csrf_token %}
            <div>
                <label class="block text-sm font-bold text-gray-700 mb-1">수정 코드 4자리</label>
                <input type="password" name="edit_code" x-model="claimEditCode"
                    class="w-full clay-inner p-3 rounded-xl text-center tracking-[0.35em]"
                    inputmode="numeric" maxlength="4" autocomplete="one-time-code"
                    required placeholder="예: 1234">
            </div>

            <div class="flex gap-2 mt-6">
                <button type="button" @click="showClaimModal = false"
                    class="w-1/3 py-3 rounded-xl text-gray-500 font-bold hover:bg-gray-100 transition-colors">닫기</button>
                <button type="submit"
                    @click="claimSubmitMode = 'open'"
                    :disabled="!claimHasEditCode"
                    :class="claimHasEditCode ? 'bg-amber-500 text-white hover:bg-amber-600' : 'bg-slate-200 text-slate-400 cursor-not-allowed'"
                    class="w-1/3 py-3 rounded-xl font-bold shadow-clay transition-colors transform active:scale-95 inline-flex items-center justify-center gap-2">
                    <span id="reservation-claim-indicator" class="htmx-indicator">
                        <i class="fa-solid fa-circle-notch fa-spin"></i>
                    </span>
                    <span>열기</span>
                </button>
                <button type="submit"
                    @click="claimSubmitMode = 'delete'"
                    :disabled="!claimHasEditCode"
                    :class="claimHasEditCode ? 'bg-rose-500 text-white hover:bg-rose-600' : 'bg-slate-200 text-slate-400 cursor-not-allowed'"
                    class="w-1/3 py-3 rounded-xl font-bold shadow-clay transition-colors transform active:scale-95 inline-flex items-center justify-center gap-2">
                    <span>바로 취소</span>
                </button>
            </div>
        </form>
    </div>
</div>
