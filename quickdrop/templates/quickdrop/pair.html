<!doctype html>
<html lang="ko">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>바로전송 연결 중</title>
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            background: linear-gradient(160deg, #edf4ff 0%, #f6f8fc 100%);
            font-family: "Pretendard", "Malgun Gothic", sans-serif;
            color: #14213d;
        }
        .card {
            width: min(92vw, 480px);
            border-radius: 28px;
            background: white;
            padding: 32px;
            box-shadow: 0 24px 80px rgba(41, 72, 152, 0.12);
        }
        .btn {
            width: 100%;
            border: 0;
            border-radius: 18px;
            background: #1f4fd1;
            color: white;
            padding: 16px;
            font-size: 16px;
            font-weight: 800;
        }
    </style>
</head>
<body>
    <form method="post" class="card" id="pair-form">
        {% csrf_token %}
        <p style="margin:0;font-size:13px;font-weight:800;letter-spacing:0.24em;text-transform:uppercase;color:#5c73b8;">바로전송</p>
        <h1 style="margin:12px 0 8px;font-size:30px;">{{ channel.title }} 연결 준비</h1>
        <p style="margin:0 0 24px;color:#475569;line-height:1.6;">이 기기를 한 번 등록하면 PC끼리도, 휴대폰과 PC도 같은 통로만 열어 바로 옮길 수 있습니다.</p>
        <button type="submit" class="btn">이 기기 연결하기</button>
        <noscript>
            <p style="margin-top:16px;font-size:14px;color:#475569;">버튼을 누르면 연결이 완료됩니다.</p>
        </noscript>
    </form>
    <script>
        window.setTimeout(function () {
            var form = document.getElementById('pair-form');
            if (form) {
                form.submit();
            }
        }, 120);
    </script>
</body>
</html>
