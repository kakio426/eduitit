<div class="flex-1">
    <div class="flex flex-wrap items-center gap-2 mb-3">
        <span class="px-3 py-1 bg-blue-100 text-blue-700 font-bold rounded-lg text-sm border border-blue-200">
            {{ material.get_subject_display }}
        </span>
        {% if material.grade %}
        <span class="px-3 py-1 bg-gray-100 text-gray-600 font-bold rounded-lg text-sm border border-gray-200">
            {{ material.grade }}
        </span>
        {% endif %}
    </div>
    
    <h1 class="text-3xl lg:text-4xl font-bold text-gray-800 font-title leading-tight mb-2">
        {{ material.title }}
    </h1>
    <div class="text-gray-500 font-medium flex items-center gap-2">
        <span><i class="fa-regular fa-calendar mr-1"></i>생성일: {{ material.created_at|date:"Y.m.d H:i" }}</span>
    </div>
</div>

<div class="flex-shrink-0 w-full md:w-auto flex flex-col gap-2">
    <!-- 상태 표시 및 전환 -->
    {% if material.is_published %}
    <div class="flex flex-col gap-2">
        <div class="bg-green-50 border border-green-200 text-green-700 px-4 py-3 rounded-xl flex items-center justify-center font-bold text-base">
            <span class="relative flex h-2 w-2 mr-2">
              <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-green-400 opacity-75"></span>
              <span class="relative inline-flex rounded-full h-2 w-2 bg-green-500"></span>
            </span>
            학생 접속 중
        </div>
        
        <form method="post" action="{% url 'textbooks:detail' pk=material.id %}" 
              hx-post="{% url 'textbooks:detail' pk=material.id %}" 
              hx-target="#material-actions" 
              hx-swap="outerHTML">
            {% csrf_token %}
            <input type="hidden" name="action" value="unpublish">
            <button type="submit" class="w-full px-4 py-2 bg-white hover:bg-red-50 text-gray-500 hover:text-red-500 border border-gray-200 hover:border-red-200 rounded-lg font-bold transition-all flex items-center justify-center gap-2 text-sm">
                <i class="fa-solid fa-power-off"></i> 접속 중단하기
            </button>
        </form>
    </div>
    {% else %}
    <div class="flex flex-col gap-2">
        <div class="bg-gray-50 border border-gray-200 text-gray-500 px-4 py-3 rounded-xl flex items-center justify-center font-bold text-base">
            <i class="fa-solid fa-lock mr-2"></i> 비공개 상태
        </div>
        
        <form method="post" action="{% url 'textbooks:detail' pk=material.id %}"
              hx-post="{% url 'textbooks:detail' pk=material.id %}" 
              hx-target="#material-actions" 
              hx-swap="outerHTML">
            {% csrf_token %}
            <input type="hidden" name="action" value="publish">
            <button type="submit" class="w-full px-5 py-3 bg-blue-500 hover:bg-blue-600 text-white rounded-xl shadow-sm font-bold text-base transition-all flex items-center justify-center gap-2">
                <i class="fa-solid fa-rocket"></i> 지금 배포하기
            </button>
        </form>
    </div>
    {% endif %}
</div>
