<div class="flex-1">
    <div class="flex flex-wrap items-center gap-2 mb-3">
        <span class="px-3 py-1 bg-blue-100 text-blue-700 font-bold rounded-lg text-sm border border-blue-200">
            {{ material.get_subject_display }}
        </span>
        {% if material.grade %}
        <span class="px-3 py-1 bg-gray-100 text-gray-600 font-bold rounded-lg text-sm border border-gray-200">
            {{ material.grade }}
        </span>
        {% endif %}
    </div>
    
    <h1 class="text-3xl lg:text-4xl font-bold text-gray-800 font-title leading-tight mb-2">
        {{ material.title }}
    </h1>
    <div class="text-gray-500 font-medium flex items-center gap-2">
        <span><i class="fa-regular fa-calendar mr-1"></i>생성일: {{ material.created_at|date:"Y.m.d H:i" }}</span>
    </div>
</div>

<div class="flex-shrink-0 w-full md:w-auto flex flex-col gap-3">
    <!-- 학생 배포 영역 -->
    {% if material.is_published %}
    <div class="flex flex-col gap-2">
        <div class="bg-green-50 border border-green-200 text-green-700 px-4 py-3 rounded-xl flex items-center justify-center font-bold text-lg mb-2">
            <span class="relative flex h-3 w-3 mr-3">
              <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-green-400 opacity-75"></span>
              <span class="relative inline-flex rounded-full h-3 w-3 bg-green-500"></span>
            </span>
            학생 접속 허용됨
        </div>
        
        <button @click="showQR = true" class="md:hidden px-6 py-4 bg-green-500 hover:bg-green-600 text-white rounded-xl font-bold shadow-clay hover:shadow-clay-hover transition-all text-lg flex items-center justify-center gap-2 w-full">
            <i class="fa-solid fa-qrcode"></i> 학생 QR 보여주기
        </button>

        <form method="post" action="{% url 'textbooks:detail' pk=material.id %}" 
              hx-post="{% url 'textbooks:detail' pk=material.id %}" 
              hx-target="#material-actions" 
              hx-swap="outerHTML">
            {% csrf_token %}
            <input type="hidden" name="action" value="unpublish">
            <button type="submit" class="w-full px-5 py-3 bg-white hover:bg-gray-50 text-gray-600 border border-gray-300 rounded-xl font-bold transition-all flex items-center justify-center gap-2" title="학생들의 접속을 즉시 차단합니다.">
                <i class="fa-solid fa-lock"></i> 접속 차단하기 (비공개)
            </button>
        </form>
    </div>
    {% else %}
    <div class="bg-gray-50 border border-gray-200 text-gray-500 px-4 py-3 rounded-xl flex items-center justify-center font-bold text-lg mb-2 w-full md:w-64">
        <i class="fa-solid fa-lock mr-2 text-xl"></i> 비공개 상태
    </div>
    
    <form method="post" action="{% url 'textbooks:detail' pk=material.id %}"
          hx-post="{% url 'textbooks:detail' pk=material.id %}" 
          hx-target="#material-actions" 
          hx-swap="outerHTML">
        {% csrf_token %}
        <input type="hidden" name="action" value="publish">
        <button type="submit" class="w-full md:w-64 px-6 py-4 bg-blue-500 hover:bg-blue-600 text-white rounded-xl shadow-clay hover:shadow-clay-hover font-bold text-lg transition-transform hover:-translate-y-1 flex items-center justify-center gap-2" title="학생들이 QR 코드로 접속할 수 있게 허용합니다.">
            <i class="fa-solid fa-satellite-dish"></i> 학생들에게 배포하기
        </button>
    </form>
    {% endif %}
</div>
