{% extends "base.html" %}

{% block title %}PDF 분석 도우미{% endblock %}

{% block content %}
<main class="service-shell min-h-screen bg-slate-50 pb-20">
    <section class="mx-auto max-w-3xl px-4 sm:px-6">
        <div class="rounded-[1.75rem] border border-slate-200 bg-white p-6 text-center shadow-sm shadow-slate-100 sm:p-8">
            <p class="text-sm font-black uppercase tracking-[0.2em] text-indigo-500">PDF 분석</p>
            <h1 class="mt-3 text-2xl font-black text-slate-900">{{ message|default:"다시 시도" }}</h1>
            <div class="mt-6 flex justify-center">
                <a href="{{ back_url }}" class="inline-flex min-h-[44px] items-center rounded-full bg-indigo-600 px-5 text-sm font-black text-white shadow-sm">
                    목록
                </a>
            </div>
        </div>
    </section>
</main>
{% endblock %}
