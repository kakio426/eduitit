{% extends "base.html" %}
{% load static %}

{% block title %}HWP 문서실{% endblock %}

{% block content %}
<link rel="stylesheet" href="{% static 'doccollab/doccollab.css' %}">

<section class="service-shell service-shell--compact doccollab-shell">
    <div class="doccollab-frame">
        <header class="doccollab-hero">
            <div>
                <p class="doccollab-kicker">온라인 HWP 편집</p>
                <h1 class="doccollab-title">HWP 문서실</h1>
            </div>
        </header>

        {% if messages %}
        <div class="doccollab-stack">
            {% for message in messages %}
            <div class="doccollab-alert {% if message.tags %}doccollab-alert--{{ message.tags }}{% endif %}">{{ message }}</div>
            {% endfor %}
        </div>
        {% endif %}

        <div class="mx-auto max-w-[560px]">
            <aside class="doccollab-card doccollab-card--sticky">
                <div class="doccollab-card-head">
                    <p class="doccollab-label">파일 열기</p>
                    <h2 class="doccollab-card-title">지금 수정</h2>
                </div>
                <form method="post" action="{% url 'doccollab:create_room' %}" enctype="multipart/form-data" class="doccollab-form" data-doccollab-upload-form="true">
                    {% csrf_token %}
                    <label class="doccollab-field">
                        <span>HWP/HWPX 파일</span>
                        <input type="file" name="source_file" accept=".hwp,.hwpx" required>
                    </label>
                    <label class="doccollab-field">
                        <span>문서 이름</span>
                        <input type="text" name="title">
                    </label>
                    <button type="submit" class="doccollab-primary" data-doccollab-open-button="true">파일 열기</button>
                </form>
            </aside>
        </div>
    </div>
</section>
<script type="module" src="{% static 'doccollab/editor/main.js' %}"></script>
{% endblock %}
