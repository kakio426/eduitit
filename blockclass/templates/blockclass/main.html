{% extends 'base.html' %}
{% load static %}

{% block title %}블록활동 실습실{% endblock %}

{% block content %}
<section class="min-h-screen bg-[#E0E5EC] px-4 pb-16 service-shell md:px-6">
    <div class="mx-auto max-w-7xl">
        <div class="mb-6 flex flex-wrap items-center justify-between gap-3">
            <a href="{% url 'home' %}" class="inline-flex items-center gap-2 text-gray-500 transition-colors hover:text-gray-700">
                <i class="fa-solid fa-arrow-left"></i>
                <span class="font-medium">서비스 목록으로 돌아가기</span>
            </a>

            <div class="inline-flex items-center gap-2 rounded-full bg-white/70 px-4 py-2 text-sm font-semibold text-gray-600 shadow-clay-inner">
                <i class="fa-solid fa-puzzle-piece text-emerald-500"></i>
                <span>블록 실습</span>
            </div>
        </div>

        <div class="mb-6 rounded-[2rem] border border-white/60 bg-gradient-to-r from-white/85 via-white/72 to-slate-100/90 p-6 shadow-[0_18px_45px_rgba(148,163,184,0.16)] md:p-8">
            <div class="flex flex-col gap-6 lg:flex-row lg:items-end lg:justify-between">
                <div class="max-w-3xl">
                    <h1 class="text-3xl font-black tracking-tight text-slate-800 md:text-5xl">블록으로 수업 흐름 만들기</h1>
                </div>
            </div>
        </div>

        <style>
            .blockclass-main-grid {
                align-items: start;
            }

            .blockclass-side-rail,
            .blockclass-workspace-column {
                min-width: 0;
            }

            .blockclass-workspace-card {
                overflow: visible !important;
                transform: none !important;
            }

            .blockclass-workspace-card:hover {
                transform: none !important;
                box-shadow: 8px 8px 16px rgba(163, 177, 198, 0.5), -8px -8px 16px rgba(255, 255, 255, 0.6) !important;
            }

            .blockclass-stage-card {
                border-radius: 1.5rem;
                border: 1px solid rgba(255, 255, 255, 0.75);
                background: rgba(255, 255, 255, 0.78);
                padding: 1rem;
            }

            .blockclass-workspace-frame {
                position: relative;
                overflow: hidden;
                border-radius: 28px;
                border: 1px solid rgba(255, 255, 255, 0.75);
                background: linear-gradient(160deg, rgba(255, 255, 255, 0.92) 0%, rgba(241, 245, 249, 0.98) 100%);
                box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.85), inset 0 -12px 24px rgba(226, 232, 240, 0.42);
            }

            #blockclass-workspace {
                position: relative;
                width: 100%;
                min-height: 480px;
                height: clamp(500px, 68vh, 780px);
            }

            @media (min-width: 1024px) {
                #blockclass-workspace {
                    min-height: 620px;
                    height: clamp(620px, 76vh, 860px);
                }
            }

            #blockclass-workspace .injectionDiv,
            #blockclass-workspace .blocklySvg {
                width: 100% !important;
                height: 100% !important;
            }

            #blockclass-workspace .blocklyMainBackground {
                stroke: rgba(148, 163, 184, 0.24);
            }

            .blockclass-workspace-card .blocklyToolboxDiv,
            .blockclass-workspace-card .blocklyFlyout,
            .blockclass-workspace-card .blocklyDropDownDiv {
                border-radius: 18px;
            }

            .blockclass-template-button {
                transition: background-color 0.2s ease, border-color 0.2s ease, box-shadow 0.2s ease, transform 0.2s ease;
            }

            .blockclass-template-button.is-active {
                border-color: rgba(16, 185, 129, 0.35);
                background: linear-gradient(180deg, rgba(236, 253, 245, 0.98) 0%, rgba(255, 255, 255, 0.98) 100%);
                box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.9), 0 10px 24px rgba(16, 185, 129, 0.12);
                transform: translateY(-1px);
            }
        </style>

        <div class="blockclass-main-grid grid grid-cols-1 gap-6 xl:grid-cols-[320px_minmax(0,1fr)]">
            <aside class="blockclass-side-rail space-y-5 xl:sticky" style="top: calc(var(--main-nav-height, 88px) + 1rem);">
                <div class="clay-card p-6 md:p-7">
                    <div class="mb-5 flex items-start gap-3">
                        <div class="flex h-12 w-12 items-center justify-center rounded-2xl bg-sky-100 text-xl text-sky-600 shadow-clay-inner">
                            <i class="fa-solid fa-shapes"></i>
                        </div>
                        <div>
                            <h2 class="text-2xl font-bold text-gray-700 font-title">템플릿</h2>
                        </div>
                    </div>

                    <div class="grid grid-cols-1 gap-2">
                        {% for template_card in template_cards %}
                        <button
                            type="button"
                            class="blockclass-template-button rounded-2xl border border-white/70 bg-white/80 px-4 py-3 text-left hover:bg-white"
                            data-template-key="{{ template_card.key }}"
                        >
                            <span class="block text-sm font-bold text-gray-700">{{ template_card.label }}</span>
                            <span class="mt-1 block text-xs leading-relaxed text-gray-500">{{ template_card.description }}</span>
                        </button>
                        {% endfor %}
                    </div>

                    <input id="blockclass-json-input" type="file" accept="application/json,.json" class="hidden">

                    <div class="mt-5 grid grid-cols-1 gap-3 sm:grid-cols-2 xl:grid-cols-1">
                        <button id="blockclass-save-json-button" type="button" class="w-full rounded-2xl border border-gray-200 bg-white px-4 py-3 font-bold text-gray-700 shadow-sm transition hover:bg-gray-50">
                            JSON 저장
                        </button>
                        <button id="blockclass-load-json-button" type="button" class="w-full rounded-2xl border border-gray-200 bg-white px-4 py-3 font-bold text-gray-700 shadow-sm transition hover:bg-gray-50">
                            JSON 불러오기
                        </button>
                        <button id="blockclass-save-image-button" type="button" class="w-full rounded-2xl bg-gradient-to-r from-emerald-500 to-green-500 px-4 py-3 font-bold text-white shadow-lg transition hover:shadow-xl sm:col-span-2 xl:col-span-1">
                            활동판 저장 (.svg)
                        </button>
                    </div>

                    <div id="blockclass-status" class="mt-4 rounded-2xl border border-emerald-100 bg-emerald-50 px-4 py-3 text-sm text-emerald-700 md:text-base">
                        준비 중
                    </div>
                    <noscript>
                        <p class="mt-4 rounded-2xl border border-amber-200 bg-amber-50 px-4 py-3 text-sm text-amber-800">
                            JavaScript 필요
                        </p>
                    </noscript>
                </div>
            </aside>

            <div class="blockclass-workspace-column min-w-0 space-y-6">
                <div class="clay-card clay-card--overflow-visible blockclass-workspace-card p-4 md:p-6">
                    <div class="mb-5 flex flex-col gap-3 lg:flex-row lg:items-center lg:justify-between">
                        <div>
                            <h2 class="text-2xl font-bold text-gray-700 font-title">블록 워크스페이스</h2>
                        </div>
                        <div class="flex flex-wrap items-center gap-2">
                            <div class="min-w-[110px] rounded-2xl border border-white/70 bg-white/75 px-4 py-2.5 text-center font-semibold text-gray-700">
                                블록 <span id="blockclass-block-count">0</span>개
                            </div>
                            <div class="min-w-[120px] rounded-2xl border border-white/70 bg-white/75 px-4 py-2.5 text-center font-semibold text-gray-700">
                                상단 <span id="blockclass-top-count">0</span>개
                            </div>
                        </div>
                    </div>

                    <div class="blockclass-workspace-frame">
                        <div id="blockclass-workspace"></div>
                    </div>
                </div>

                <div class="grid grid-cols-1 gap-3 lg:grid-cols-3">
                    <div class="blockclass-stage-card">
                        <p class="mb-2 text-xs uppercase tracking-[0.2em] text-gray-400">현재</p>
                        <p id="blockclass-stage-summary" class="text-base font-semibold text-gray-700">템플릿 대기</p>
                    </div>
                    <div class="blockclass-stage-card">
                        <p class="mb-2 text-xs uppercase tracking-[0.2em] text-gray-400">코드</p>
                        <p id="blockclass-code-summary" class="text-base font-semibold text-gray-700">코드 대기</p>
                    </div>
                    <div class="blockclass-stage-card">
                        <p class="mb-2 text-xs uppercase tracking-[0.2em] text-gray-400">다음</p>
                        <p id="blockclass-next-step" class="text-base font-semibold text-gray-700">블록 추가</p>
                    </div>
                </div>

                <div class="clay-card p-4 md:p-6">
                    <div class="mb-4 flex flex-wrap items-center justify-between gap-3">
                        <div>
                            <h2 class="text-2xl font-bold text-gray-700 font-title">코드 미리보기</h2>
                        </div>
                    </div>
                    <pre id="blockclass-code-output" class="min-h-[220px] overflow-auto rounded-[1.75rem] bg-slate-900 p-5 text-sm leading-6 text-slate-100">코드 대기</pre>
                </div>
            </div>
        </div>
    </div>
</section>

<xml id="blockclass-toolbox" style="display: none">
    <category name="동작" colour="#10b981">
        <block type="text_print"></block>
        <block type="text"></block>
    </category>
    <category name="조건" colour="#3b82f6">
        <block type="controls_if"></block>
        <block type="logic_compare"></block>
        <block type="logic_boolean"></block>
    </category>
    <category name="반복" colour="#f59e0b">
        <block type="controls_repeat_ext"></block>
        <block type="math_number"></block>
    </category>
    <category name="계산" colour="#8b5cf6">
        <block type="math_number"></block>
        <block type="math_arithmetic"></block>
    </category>
    <category name="텍스트" colour="#ef4444">
        <block type="text"></block>
        <block type="text_join"></block>
    </category>
</xml>

<script>
    window.BLOCKCLASS_MEDIA_URL = "{% static 'blockclass/vendor/blockly-assets/' %}";
</script>
<script src="{% static 'blockclass/vendor/blockly/blockly_compressed.js' %}"></script>
<script src="{% static 'blockclass/vendor/blockly/blocks_compressed.js' %}"></script>
<script src="{% static 'blockclass/vendor/blockly/javascript_compressed.js' %}"></script>
<script src="{% static 'blockclass/vendor/blockly/msg/ko.js' %}"></script>
<script src="{% static 'blockclass/blockclass.js' %}"></script>
{% endblock %}
