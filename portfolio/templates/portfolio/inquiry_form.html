{% extends 'base.html' %}

{% block content %}
<div class="container mx-auto px-4 service-shell pb-20">
    <div class="max-w-2xl mx-auto clay-card p-6 bg-white/75 backdrop-blur-md border border-white/50 md:p-10"
        data-aos="zoom-in">
        <div class="text-center mb-8">
            <div
                class="w-16 h-16 rounded-full bg-purple-100 flex items-center justify-center text-purple-500 text-3xl shadow-clay-inner mx-auto mb-5">
                <i class="fa-solid fa-envelope-open-text"></i>
            </div>
            <h1 class="text-3xl font-bold mb-3 text-gray-800 md:text-4xl">협업 문의</h1>
            <p class="text-base text-gray-500 font-bold md:text-lg">필요한 내용을 남겨 주세요.</p>
        </div>

        {% if form.errors %}
        <div id="portfolio-inquiry-status"
            class="mb-6 rounded-2xl border border-red-100 bg-red-50 px-4 py-3 text-sm font-bold text-red-600"
            aria-live="polite">
            문의 실패
        </div>
        {% else %}
        <div id="portfolio-inquiry-status" class="sr-only" aria-live="polite"></div>
        {% endif %}

        <form method="post" class="space-y-6" data-portfolio-inquiry-form>
            {% csrf_token %}
            {% for field in form %}
            <div data-aos="fade-up" data-aos-delay="{{ forloop.counter0 }}00">
                <label for="{{ field.id_for_label }}"
                    class="mb-2 ml-1 flex items-center gap-2 text-base font-bold text-gray-600 md:text-lg">
                    <span class="w-2 h-2 rounded-full bg-purple-400"></span>
                    {{ field.label }}
                    {% if field.field.required %}<span class="text-red-400 text-sm">*</span>{% endif %}
                </label>
                <div class="relative">
                    {{ field }}
                </div>
                {% if field.errors %}
                <p class="text-red-500 text-sm mt-2 ml-2 font-bold">{{ field.errors.0 }}</p>
                {% endif %}
            </div>
            {% endfor %}

            <div class="pt-4 text-center">
                <button type="submit"
                    class="w-full bg-purple-600 text-white font-bold py-4 px-6 rounded-2xl text-lg shadow-clay hover:shadow-clay-hover hover:scale-[1.01] transition-all flex items-center justify-center gap-3 md:text-xl"
                    data-portfolio-inquiry-submit>
                    <i class="fa-solid fa-paper-plane"></i>
                    <span data-portfolio-inquiry-submit-label>보내기</span>
                </button>
            </div>
        </form>
    </div>
</div>

<style>
    /* Styling for Django form fields with neomorphism */
    input[type="text"],
    input[type="email"],
    input[type="date"],
    input[type="tel"],
    textarea {
        width: 100%;
        padding: 1rem 1.25rem;
        background-color: rgba(255, 255, 255, 0.5);
        border: 2px solid transparent;
        border-radius: 1.25rem;
        font-size: 1rem;
        font-family: 'NanumSquareRound', sans-serif;
        box-shadow: inset 4px 4px 8px rgba(163, 177, 198, 0.4), inset -4px -4px 8px rgba(255, 255, 255, 0.8);
        transition: all 0.3s ease;
        color: #4A5568;
    }

    input:focus,
    textarea:focus {
        background-color: white;
        border-color: #A78BFA;
        outline: none;
        box-shadow: 0 0 0 4px rgba(167, 139, 250, 0.1);
        transform: translateY(-2px);
    }

    ::placeholder {
        color: #CBD5E0;
        opacity: 0.8;
    }
</style>
<script>
    document.addEventListener('DOMContentLoaded', function () {
        const form = document.querySelector('[data-portfolio-inquiry-form]');
        const submitButton = document.querySelector('[data-portfolio-inquiry-submit]');
        const submitLabel = document.querySelector('[data-portfolio-inquiry-submit-label]');
        const statusEl = document.getElementById('portfolio-inquiry-status');
        if (!form || !submitButton) return;

        form.addEventListener('submit', function () {
            submitButton.disabled = true;
            submitButton.classList.add('opacity-70', 'cursor-wait');
            if (submitLabel) submitLabel.textContent = '전송 중';
            if (statusEl) {
                statusEl.classList.remove('sr-only', 'text-red-600', 'bg-red-50', 'border-red-100');
                statusEl.classList.add('mb-6', 'rounded-2xl', 'border', 'border-purple-100', 'bg-purple-50', 'px-4', 'py-3', 'text-sm', 'font-bold', 'text-purple-700');
                statusEl.textContent = '전송 중';
            }
        });
    });
</script>
{% endblock %}
