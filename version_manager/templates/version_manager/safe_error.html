{% extends 'base.html' %}

{% block title %}문서 확인 | 최종최최종은 이제그만{% endblock %}

{% block content %}
<section class="service-shell pb-20 px-4 min-h-screen">
    <div class="max-w-lg mx-auto">
        <div class="clay-card p-6 md:p-8 text-center bg-white">
            <div class="mx-auto mb-4 flex h-12 w-12 items-center justify-center rounded-full bg-purple-50 text-purple-600">
                <i class="fa-solid fa-circle-exclamation"></i>
            </div>
            <h1 class="text-2xl font-black text-gray-800">{{ message }}</h1>
            <a href="{{ back_url }}" class="mt-6 inline-flex items-center justify-center rounded-xl bg-purple-600 px-5 py-3 text-sm font-black text-white hover:bg-purple-500">
                돌아가기
            </a>
        </div>
    </div>
</section>
{% endblock %}
