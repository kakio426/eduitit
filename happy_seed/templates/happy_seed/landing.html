{% extends 'base.html' %}

{% block content %}
<section class="service-shell pb-20 px-4 min-h-screen">
    <div class="max-w-3xl mx-auto text-center">

        <div class="mb-8">
            <span class="text-7xl">🌱</span>
        </div>

        <h1 class="text-4xl md:text-5xl font-bold text-gray-800 mb-4 font-title break-keep">행복의 씨앗</h1>
        <p class="text-base text-gray-500 mb-10 break-keep">학생 기록 · 꽃피움 · 교실 화면</p>

        <div class="flex flex-col sm:flex-row gap-4 justify-center mb-16">
            {% if user.is_authenticated %}
            <a href="{% url 'happy_seed:dashboard' %}"
               class="inline-block px-8 py-4 bg-gradient-to-r from-green-500 to-emerald-600 text-white rounded-xl font-bold text-lg hover:shadow-lg hover:-translate-y-0.5 transition-all">
                내 교실
            </a>
            {% else %}
            <a href="{% url 'account_login' %}?next={% url 'happy_seed:dashboard' %}"
               class="inline-block px-8 py-4 bg-gradient-to-r from-green-500 to-emerald-600 text-white rounded-xl font-bold text-lg hover:shadow-lg hover:-translate-y-0.5 transition-all">
                시작하기
            </a>
            {% endif %}
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 text-left">
            <div class="clay-card p-6 rounded-2xl">
                <div class="text-3xl mb-3">🌱</div>
                <h3 class="font-bold text-gray-800 mb-2">긍정 행동 기록</h3>
                <p class="text-sm text-gray-500 break-keep">학생 기록</p>
            </div>
            <div class="clay-card p-6 rounded-2xl">
                <div class="text-3xl mb-3">🌸</div>
                <h3 class="font-bold text-gray-800 mb-2">꽃피움 추첨 보상</h3>
                <p class="text-sm text-gray-500 break-keep">추첨 보상</p>
            </div>
            <div class="clay-card p-6 rounded-2xl">
                <div class="text-3xl mb-3">🏡</div>
                <h3 class="font-bold text-gray-800 mb-2">학급 꽃밭 대시보드</h3>
                <p class="text-sm text-gray-500 break-keep">교실 화면</p>
            </div>
        </div>

    </div>
</section>
{% endblock %}
