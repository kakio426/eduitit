<div class="p-6">
    <div class="rounded-2xl bg-green-50 border border-green-200 p-5">
        <div class="flex items-center gap-3 text-green-700">
            <i class="fa-solid fa-circle-check text-xl"></i>
            <div>
                <p class="font-bold">{% if status == 'pending' %}카드가 접수되었어요!{% else %}카드가 등록되었어요!{% endif %}</p>
                <p class="text-sm text-green-600">"{{ card.title }}"</p>
                {% if status == 'pending' %}
                <p class="text-sm text-green-600 mt-1">교사 확인 후 보드에 공개됩니다.</p>
                {% endif %}
            </div>
        </div>
    </div>
</div>
