<div class="ib-info-card ib-board-card ib-theme-{{ board.color_theme }}" id="board-{{ board.id }}">
    <a href="{% url 'infoboard:board_detail' board_id=board.id %}" class="block">
        <div class="flex items-start justify-between mb-3">
            <span class="text-3xl">{{ board.icon }}</span>
            <div class="relative" x-data="{ open: false }" @click.stop>
                <button @click.prevent="open = !open" class="w-8 h-8 rounded-full hover:bg-gray-100 flex items-center justify-center text-gray-400 hover:text-gray-600 transition">
                    <i class="fa-solid fa-ellipsis text-sm"></i>
                </button>
                <div x-show="open" @click.away="open = false" x-cloak
                    class="absolute right-0 top-full mt-1 w-44 bg-white rounded-xl shadow-xl p-2 z-30">
                    <button type="button"
                        hx-get="{% url 'infoboard:board_edit' board_id=board.id %}"
                        hx-target="#ibModal"
                        hx-swap="innerHTML"
                        @click="open = false; document.getElementById('ibModalOverlay').classList.remove('hidden')"
                        class="ib-dropdown-item w-full text-left">
                        <i class="fa-solid fa-pen text-xs"></i> 수정
                    </button>
                    <button type="button"
                        hx-get="{% url 'infoboard:share_panel' board_id=board.id %}"
                        hx-target="#ibModal"
                        hx-swap="innerHTML"
                        @click="open = false; document.getElementById('ibModalOverlay').classList.remove('hidden')"
                        class="ib-dropdown-item w-full text-left">
                        <i class="fa-solid fa-share-from-square text-xs"></i> 공유
                    </button>
                    <form method="post" action="{% url 'infoboard:board_delete' board_id=board.id %}"
                        onsubmit="return confirm('이 보드를 삭제할까요?')"
                        hx-post="{% url 'infoboard:board_delete' board_id=board.id %}"
                        hx-target="#board-{{ board.id }}"
                        hx-swap="outerHTML"
                        hx-confirm="이 보드와 모든 카드를 삭제할까요?">
                        {% csrf_token %}
                        <button type="submit" class="ib-dropdown-item danger w-full text-left">
                            <i class="fa-solid fa-trash text-xs"></i> 삭제
                        </button>
                    </form>
                </div>
            </div>
        </div>
        <h3 class="text-lg font-black text-gray-800 mb-1 line-clamp-2">{{ board.title }}</h3>
        {% if board.description %}
        <p class="text-sm text-gray-500 line-clamp-2 mb-3">{{ board.description }}</p>
        {% endif %}
        <div class="flex items-center justify-between mt-auto pt-3 border-t border-gray-100">
            <span class="text-xs text-gray-400 font-bold">{{ board.card_count }}개 항목</span>
            <span class="text-xs text-gray-400">{{ board.updated_at|timesince }} 전</span>
        </div>
        {% if board.tags.all %}
        <div class="flex flex-wrap gap-1 mt-2">
            {% for tag in board.tags.all %}
            <span class="ib-tag">#{{ tag.name }}</span>
            {% endfor %}
        </div>
        {% endif %}
    </a>
</div>
