<span id="ibBoardCardCount" hx-swap-oob="true" class="hidden">{{ card_count }}</span>
{% for card in cards %}
{% include 'infoboard/partials/card_item.html' %}
{% empty %}
<div class="col-span-full ib-empty">
    <div class="ib-empty-icon">📋</div>
    {% if search_q %}
    <p class="text-lg font-bold text-gray-500">"{{ search_q }}" 검색 결과가 없어요</p>
    <p class="text-sm text-gray-400 mt-1">검색어를 바꾸거나 카드 추가 버튼으로 새 자료를 만들어보세요.</p>
    {% else %}
    <p class="text-lg font-bold text-gray-500">아직 카드가 없어요</p>
    <p class="text-sm text-gray-400 mt-1">위의 "카드 추가" 버튼으로 첫 번째 자료를 추가해보세요</p>
    {% endif %}
</div>
{% endfor %}
