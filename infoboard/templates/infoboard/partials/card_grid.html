{% if card_count_oob_target %}
<span id="{{ card_count_oob_target }}" hx-swap-oob="true">{{ card_count }}</span>
{% endif %}
{% for card in cards %}
{% include 'infoboard/partials/card_item.html' %}
{% empty %}
<div class="ib-empty-card">
    <div class="ib-empty-emoji">🧷</div>
    <h3>자료 없음</h3>
    <p>제출 링크 또는 자료 추가</p>
</div>
{% endfor %}
