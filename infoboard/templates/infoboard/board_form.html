{% extends 'base.html' %}
{% load static %}

{% block title %}{% if is_edit %}보드 수정{% else %}새 보드{% endif %} — 잇티보드{% endblock %}

{% block extra_css %}
<link href="{% static 'infoboard/css/infoboard.css' %}?v=20260322-wall" rel="stylesheet">
{% endblock %}

{% block content %}
<section class="ib-page">
    <div class="ib-shell" style="max-width: 760px;">
        <a href="{% url 'infoboard:dashboard' %}" class="ib-back-link">
            <i class="fa-solid fa-arrow-left"></i> 대시보드로
        </a>
        <div class="ib-info-card" style="padding: 0;">
            {% include 'infoboard/partials/board_form_modal.html' %}
        </div>
    </div>
</section>
{% endblock %}

{% block extra_js %}
<script src="{% static 'infoboard/js/infoboard.js' %}?v=20260322-wall"></script>
{% endblock %}
