{% extends 'base.html' %}

{% block title %}ArtClass v2 1단계 - Eduitit{% endblock %}

{% block content %}
<main class="min-h-screen pt-24 md:pt-32 pb-20 px-4">
    <div class="max-w-3xl mx-auto">
        <div class="mb-6 flex items-center gap-3 text-xs font-black uppercase tracking-[0.18em] text-slate-400">
            <span class="rounded-full bg-emerald-600 px-3 py-1.5 text-white">1 유튜브 주소</span>
            <span>2 제미나이</span>
            <span>3 붙여넣기/저장</span>
        </div>

        <section class="rounded-[2rem] border border-rose-100 bg-white px-6 py-8 md:px-10 md:py-10 shadow-sm">
            <h1 class="text-3xl md:text-4xl font-black text-slate-900 break-keep">수업에 쓸 유튜브 주소를 먼저 넣어 주세요</h1>

            <form method="post" class="mt-8 space-y-5">
                {% csrf_token %}
                <div>
                    <label for="videoUrl" class="block text-sm font-black text-slate-900">유튜브 주소</label>
                    <input
                        id="videoUrl"
                        type="text"
                        name="videoUrl"
                        value="{{ setup_video_url }}"
                        placeholder="https://www.youtube.com/watch?v=..."
                        class="mt-3 w-full rounded-[1.4rem] border border-slate-200 bg-slate-50 px-5 py-4 text-base font-bold text-slate-900 outline-none transition-all focus:border-rose-300 focus:bg-white focus:ring-2 focus:ring-rose-200"
                        required
                    >
                    <p class="mt-3 text-xs font-bold text-amber-700">유튜브 주소만 넣어 주세요. 다른 사이트 링크, 내부망 주소, localhost 주소는 사용할 수 없습니다.</p>
                </div>

                <button type="submit"
                    class="inline-flex items-center justify-center gap-2 rounded-full bg-rose-500 px-8 py-4 text-lg font-black text-white shadow-lg shadow-rose-200 transition-all hover:bg-rose-600">
                    다음: 제미나이 열기 <i class="fa-solid fa-arrow-right"></i>
                </button>
            </form>

            <div class="mt-6">
                <a href="{{ legacy_setup_url }}" class="text-sm font-black text-slate-500 underline-offset-4 hover:text-slate-800 hover:underline">
                    기존 버전으로 돌아가기
                </a>
            </div>
        </section>
    </div>
</main>
{% endblock %}
