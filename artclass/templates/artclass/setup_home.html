{% extends 'base.html' %}

{% block title %}ArtClass v2 - Eduitit{% endblock %}

{% block content %}
<main class="min-h-screen pt-24 md:pt-32 pb-20 px-4">
    <div class="max-w-4xl mx-auto">
        <section class="rounded-[2rem] border border-emerald-100 bg-gradient-to-br from-emerald-50 via-white to-lime-50 px-6 py-8 md:px-10 md:py-12 shadow-sm">
            <div class="max-w-2xl">
                <span class="inline-flex items-center gap-2 rounded-full border border-emerald-200 bg-white px-4 py-2 text-sm font-black text-emerald-700">
                    <i class="fa-solid fa-wand-magic-sparkles"></i> ArtClass v2
                </span>
                <h1 class="mt-5 text-3xl md:text-5xl font-black text-slate-900 leading-tight break-keep">순서대로 따라가며 미술 수업을 만듭니다</h1>
            </div>

            <div class="mt-8 grid gap-4 md:grid-cols-2">
                <a href="{{ create_url }}"
                    class="flex min-h-36 flex-col justify-between rounded-[1.8rem] bg-emerald-600 px-6 py-6 text-white shadow-lg shadow-emerald-200 transition-all hover:-translate-y-1 hover:bg-emerald-700">
                    <div>
                        <p class="text-xs font-black tracking-[0.2em] uppercase text-emerald-100">Start</p>
                        <h2 class="mt-3 text-2xl font-black">새 수업 만들기</h2>
                    </div>
                </a>

                <a href="{{ library_url }}"
                    class="flex min-h-36 flex-col justify-between rounded-[1.8rem] border border-indigo-200 bg-white px-6 py-6 text-indigo-900 shadow-sm transition-all hover:-translate-y-1 hover:border-indigo-300 hover:bg-indigo-50">
                    <div>
                        <p class="text-xs font-black tracking-[0.2em] uppercase text-indigo-500">Library</p>
                        <h2 class="mt-3 text-2xl font-black">다른 선생님 수업 보기</h2>
                    </div>
                </a>
            </div>

            <div class="mt-6">
                <a href="{{ legacy_setup_url }}" class="text-sm font-black text-slate-500 underline-offset-4 hover:text-slate-800 hover:underline">
                    기존 버전으로 돌아가기
                </a>
            </div>
        </section>
    </div>
</main>
{% endblock %}
