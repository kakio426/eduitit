{% extends 'base.html' %}

{% block title %}ArtClass v2 2단계 - Eduitit{% endblock %}

{% block content %}
<main class="min-h-screen pt-24 md:pt-32 pb-20 px-4">
    <div class="max-w-4xl mx-auto">
        <div class="mb-6 flex items-center gap-3 text-xs font-black uppercase tracking-[0.18em] text-slate-400">
            <span>1 유튜브 주소</span>
            <span class="rounded-full bg-indigo-600 px-3 py-1.5 text-white">2 제미나이</span>
            <span>3 붙여넣기/저장</span>
        </div>

        <section class="rounded-[2rem] border border-indigo-100 bg-white px-6 py-8 md:px-10 md:py-10 shadow-sm">
            <div class="flex flex-col gap-4 md:flex-row md:items-start md:justify-between">
                <div class="max-w-2xl">
                    <h1 class="text-3xl md:text-4xl font-black text-slate-900 break-keep">프롬프트를 복사하고 제미나이를 열어 주세요</h1>
                    <div class="mt-4 rounded-2xl border border-slate-200 bg-slate-50 px-4 py-3 text-sm font-bold text-slate-700 break-all">
                        {{ setup_video_url }}
                    </div>
                </div>

                <div class="flex flex-wrap gap-2">
                    <a href="{{ url_step_url }}" class="inline-flex items-center rounded-full border border-slate-200 px-4 py-2 text-sm font-black text-slate-600 transition-all hover:bg-slate-50">
                        주소 다시 보기
                    </a>
                    <a href="{{ legacy_setup_url }}" class="inline-flex items-center rounded-full border border-slate-200 px-4 py-2 text-sm font-black text-slate-600 transition-all hover:bg-slate-50">
                        기존 버전으로 돌아가기
                    </a>
                </div>
            </div>

            <div class="mt-8 grid gap-5 lg:grid-cols-[1.1fr_0.9fr]">
                <div class="rounded-[1.8rem] border border-indigo-100 bg-indigo-50/60 p-5">
                    <div class="flex flex-wrap items-center justify-between gap-3">
                        <div>
                            <p class="text-xs font-black uppercase tracking-[0.18em] text-indigo-500">Prompt</p>
                            <h2 class="mt-2 text-xl font-black text-slate-900">프롬프트 복사</h2>
                        </div>
                        <div class="flex flex-wrap gap-2">
                            <button type="button" id="btnLaunchGeminiFlow"
                                class="rounded-xl bg-indigo-600 px-4 py-2 text-sm font-black text-white transition-all hover:bg-indigo-700">
                                복사하고 제미나이 열기
                            </button>
                            <button type="button" id="btnCopyGeminiPrompt"
                                class="rounded-xl border border-indigo-200 bg-white px-4 py-2 text-sm font-black text-indigo-700 transition-all hover:bg-indigo-50">
                                프롬프트만 복사
                            </button>
                        </div>
                    </div>

                    <p id="geminiStatus" class="mt-4 hidden text-sm font-black"></p>
                    <textarea id="geminiPromptBox" readonly
                        class="mt-4 h-72 w-full rounded-2xl border border-slate-800 bg-slate-950 p-4 text-xs leading-relaxed text-slate-100 shadow-inner">{{ manual_prompt_template }}</textarea>
                </div>

                <div class="rounded-[1.8rem] border border-emerald-100 bg-emerald-50/60 p-5">
                    <p class="text-xs font-black uppercase tracking-[0.18em] text-emerald-600">Next</p>
                    <h2 class="mt-2 text-xl font-black text-slate-900">제미나이 결과를 받았나요?</h2>
                    <a href="{{ review_url }}"
                        class="mt-6 inline-flex items-center justify-center gap-2 rounded-full bg-emerald-600 px-6 py-3 text-base font-black text-white transition-all hover:bg-emerald-700">
                        다음: 결과 붙여넣기 <i class="fa-solid fa-arrow-right"></i>
                    </a>
                </div>
            </div>
        </section>
    </div>
</main>

<script>
    const geminiPromptBoxEl = document.getElementById('geminiPromptBox');
    const geminiStatusEl = document.getElementById('geminiStatus');

    function setGeminiStatus(message, tone = 'success') {
        geminiStatusEl.textContent = message || '';
        geminiStatusEl.classList.remove('hidden', 'text-emerald-700', 'text-red-700');
        if (!message) {
            geminiStatusEl.classList.add('hidden');
            return;
        }
        geminiStatusEl.classList.add(tone === 'error' ? 'text-red-700' : 'text-emerald-700');
    }

    async function copyPrompt() {
        try {
            await navigator.clipboard.writeText(geminiPromptBoxEl.value);
            setGeminiStatus('프롬프트를 복사했어요. 제미나이에 바로 붙여넣어 주세요.');
            return true;
        } catch (_) {
            setGeminiStatus('자동 복사가 안 됐어요. 프롬프트 상자에서 직접 복사해 주세요.', 'error');
            return false;
        }
    }

    document.getElementById('btnCopyGeminiPrompt').addEventListener('click', async () => {
        await copyPrompt();
    });

    document.getElementById('btnLaunchGeminiFlow').addEventListener('click', async () => {
        const copied = await copyPrompt();
        const popup = window.open('https://gemini.google.com/app', '_blank', 'noopener,noreferrer');
        if (!popup) {
            setGeminiStatus(
                copied
                    ? '프롬프트는 복사했지만 팝업이 막혀 있어요. 제미나이를 직접 열어 붙여넣어 주세요.'
                    : '팝업이 막혀 있어요. 먼저 프롬프트만 복사하거나 팝업을 허용한 뒤 다시 눌러 주세요.',
                'error'
            );
        }
    });
</script>
{% endblock %}
