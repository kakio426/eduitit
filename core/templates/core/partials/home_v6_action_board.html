{% if board %}
<div
    class="rounded-[1.5rem] border border-dashed border-slate-300 bg-slate-50 px-4 py-6 sm:px-5 {% if surface_key == 'mobile-workbench' or surface_key == 'desktop-workbench' %}home-v6-empty-state--compact text-left{% else %}text-center{% endif %}"
    {% if surface_key %}data-home-v6-empty-state="{{ surface_key }}"{% endif %}
>
    <p class="text-sm font-black text-slate-900">{{ board.title }}</p>
    <p class="mt-2 text-sm font-semibold leading-6 text-slate-500">{{ board.description }}</p>
    <div class="mt-4 flex flex-col gap-2 {% if surface_key == 'mobile-workbench' or surface_key == 'desktop-workbench' %}home-v6-empty-state-actions--compact{% else %}sm:flex-row sm:flex-wrap sm:justify-center{% endif %}">
        {% if board.primary_action %}
        <a
            href="{{ board.primary_action.href }}"
            class="home-v6-empty-primary-action"
            {% if board.primary_action.is_external %}target="_blank" rel="noopener noreferrer"{% endif %}
        >
            {{ board.primary_action.cta_label|default:board.primary_action.title }}
        </a>
        {% endif %}
        {% for action in board.secondary_actions %}
        <a
            href="{{ action.href }}"
            class="home-v6-inline-secondary-action home-v6-inline-secondary-action--pill"
            {% if action.is_external %}target="_blank" rel="noopener noreferrer"{% endif %}
        >
            {{ action.cta_label|default:action.title }}
        </a>
        {% endfor %}
    </div>
</div>
{% endif %}
