{% if board %}
<div
    class="rounded-[1.5rem] border border-dashed border-slate-300 bg-slate-50 px-4 py-6 text-center sm:px-5"
    {% if surface_key %}data-home-v6-empty-state="{{ surface_key }}"{% endif %}
>
    <p class="text-sm font-black text-slate-900">{{ board.title }}</p>
    <p class="mt-2 text-sm font-semibold leading-6 text-slate-500">{{ board.description }}</p>
    <div class="mt-4 flex flex-col gap-2 sm:flex-row sm:flex-wrap sm:justify-center">
        {% if board.primary_action %}
        <a
            href="{{ board.primary_action.href }}"
            class="inline-flex items-center justify-center rounded-full bg-slate-900 px-4 py-2.5 text-sm font-black text-white transition hover:bg-slate-800"
            {% if board.primary_action.is_external %}target="_blank" rel="noopener noreferrer"{% endif %}
        >
            {{ board.primary_action.cta_label|default:board.primary_action.title }}
        </a>
        {% endif %}
        {% for action in board.secondary_actions %}
        <a
            href="{{ action.href }}"
            class="inline-flex items-center justify-center rounded-full border border-slate-200 bg-white px-4 py-2.5 text-sm font-black text-slate-700 transition hover:border-indigo-200 hover:text-indigo-700"
            {% if action.is_external %}target="_blank" rel="noopener noreferrer"{% endif %}
        >
            {{ action.cta_label|default:action.title }}
        </a>
        {% endfor %}
    </div>
</div>
{% endif %}
