<section
    class="home-v6-representative-section"
    data-home-v6-representative-services="true"
    data-home-v6-agent-workspace="true"
>
    <div class="home-v6-card home-v6-agent-card">
        <aside class="home-v6-agent-utility" aria-label="AI 교무비서 탐색">
            <button
                type="button"
                class="home-v6-agent-utility-brand"
                @click="selectRailItem('service:' + (activeMode.key || 'notice'))"
                aria-label="AI 교무비서"
            >
                <i class="fa-solid fa-sparkles"></i>
            </button>
            <button
                type="button"
                class="home-v6-agent-utility-tab"
                :class="{ 'is-active': !activeConversationItem }"
                @click="selectRailItem('service:' + (activeMode.key || 'notice'))"
            >
                <span>AI</span>
                <strong x-text="railCountByKind('service')"></strong>
            </button>
            <button
                type="button"
                class="home-v6-agent-utility-tab"
                :class="{ 'is-active': !!activeConversationItem }"
                @click="selectRailItem(firstRailItemKeyByKind('room'))"
            >
                <span>톡</span>
                <strong x-text="railCountByKind('room')"></strong>
            </button>
        </aside>

        <aside class="home-v6-agent-rail" data-home-v6-agent-mode-select="true">
            <div class="home-v6-agent-rail-head">
                <div class="home-v6-agent-brand-copy">
                    <h2 class="home-v6-agent-title">{{ agent_workspace.workspace_title|default:'AI 교무비서' }}</h2>
                    <p class="home-v6-agent-brand-subtitle">서비스와 대화</p>
                </div>
            </div>

            <label class="home-v6-agent-rail-search" aria-label="서비스와 대화 찾기">
                <span class="home-v6-agent-rail-search-icon" aria-hidden="true">
                    <i class="fa-solid fa-magnifying-glass"></i>
                </span>
                <input
                    type="text"
                    class="home-v6-agent-rail-search-input"
                    x-model="railSearchText"
                    placeholder="{{ agent_workspace.workspace_search_placeholder|default:'서비스와 대화 찾기' }}"
                >
            </label>

            <template x-for="section in filteredAgentRailSections()" :key="section.key">
                <div class="home-v6-agent-rail-section" x-cloak x-show="section.items.length">
                    <p class="home-v6-agent-rail-label" x-text="section.label || ''"></p>
                    <div class="home-v6-agent-rail-list">
                        <template x-for="item in section.items" :key="item.key">
                            <button
                                type="button"
                                class="home-v6-agent-rail-item"
                                :class="{ 'is-active': activeRailKey === item.key, 'is-room': item.kind === 'room' }"
                                :aria-pressed="activeRailKey === item.key ? 'true' : 'false'"
                                :title="item.title || ''"
                                @click="selectRailItem(item.key)"
                            >
                                <span class="home-v6-agent-rail-item-icon" :class="{ 'is-room': item.kind === 'room' }" aria-hidden="true">
                                    <template x-if="item.kind === 'room'">
                                        <span x-text="item.avatar_label || '대화'"></span>
                                    </template>
                                    <template x-if="item.kind !== 'room'">
                                        <i :class="item.icon_class || 'fa-regular fa-circle'"></i>
                                    </template>
                                </span>
                                <span class="home-v6-agent-rail-item-copy">
                                    <span class="home-v6-agent-rail-item-name" x-text="item.title || ''"></span>
                                    <span class="home-v6-agent-rail-item-summary" x-text="item.summary || item.meta || ''"></span>
                                </span>
                                <span class="home-v6-agent-rail-item-badge" x-cloak x-show="item.badge" x-text="item.badge"></span>
                            </button>
                        </template>
                    </div>
                </div>
            </template>
        </aside>

        <div class="home-v6-agent-main">
            <div class="home-v6-agent-main-head">
                <div class="home-v6-agent-active">
                    <span class="home-v6-agent-active-icon" :class="{ 'is-room': activeConversationItem }" aria-hidden="true">
                        <template x-if="activeConversationItem">
                            <span x-text="(activeRoomSnapshot && activeRoomSnapshot.room && activeRoomSnapshot.room.avatar_label) || (activeConversationItem && activeConversationItem.avatar_label) || '대화'"></span>
                        </template>
                        <template x-if="!activeConversationItem">
                            <i :class="activeMode.icon_class || 'fa-regular fa-circle'"></i>
                        </template>
                    </span>
                    <div class="home-v6-agent-active-copy">
                        <h3 class="home-v6-agent-active-title" x-text="activeHeaderTitle()"></h3>
                        <div class="home-v6-agent-active-meta">
                            <span class="home-v6-agent-active-badge" x-text="activeHeaderBadge()"></span>
                            <span class="home-v6-agent-active-status">
                                <span class="home-v6-agent-active-status-dot"></span>
                                <span x-text="activeHeaderMeta()"></span>
                            </span>
                        </div>
                    </div>
                </div>

                <div class="home-v6-agent-head-actions">
                    <a
                        class="home-v6-inline-secondary-action home-v6-inline-secondary-action--pill home-v6-agent-context-link"
                        x-cloak
                        x-show="activeHeaderPrimaryHref() && activeHeaderPrimaryLabel()"
                        :href="activeHeaderPrimaryHref() || '#'"
                        x-text="activeHeaderPrimaryLabel() || ''"
                    ></a>
                    <a
                        class="home-v6-inline-secondary-action home-v6-inline-secondary-action--pill home-v6-agent-context-link"
                        x-cloak
                        x-show="activeHeaderSecondaryLabel() && activeHeaderSecondaryHref()"
                        :href="activeHeaderSecondaryHref() || '#'"
                        x-text="activeHeaderSecondaryLabel() || ''"
                    ></a>
                </div>
            </div>

            <div class="home-v6-agent-context-bar" x-cloak x-show="hasAgentConversationContext() && !activeConversationItem">
                <span class="home-v6-agent-context-room" x-text="agentConversationContextTitle() || ''"></span>
                <div class="home-v6-agent-context-actions">
                    <button
                        type="button"
                        class="home-v6-agent-chat-action"
                        @click="returnToAgentConversationContext()"
                    >대화로</button>
                    <button
                        type="button"
                        class="home-v6-agent-chat-action"
                        x-cloak
                        x-show="canSharePreviewToContextConversation()"
                        :disabled="isSharingAgentPreviewToRoom"
                        @click="shareAgentPreviewToContextConversation()"
                        x-text="isSharingAgentPreviewToRoom ? '공유 중' : '방에 공유'"
                    ></button>
                </div>
            </div>

            <section class="home-v6-agent-human-chat" x-cloak x-show="activeRendererKey === 'human-chat'">
                <div class="home-v6-agent-human-toolbar">
                    <div class="home-v6-agent-human-toolbar-group">
                        <template x-for="action in humanChatContextActions()" :key="action.key">
                            <button
                                type="button"
                                class="home-v6-agent-human-toolbar-chip"
                                @click="launchHumanChatContextAction(action)"
                                x-text="action.label"
                            ></button>
                        </template>
                    </div>
                    <div class="home-v6-agent-human-toolbar-group">
                        <button
                            type="button"
                            class="home-v6-agent-human-toolbar-chip"
                            x-cloak
                            x-show="humanChatCanCreateDm()"
                            @click="toggleHumanChatUtilityPanel('dm')"
                        >새 대화</button>
                        <button
                            type="button"
                            class="home-v6-agent-human-toolbar-chip"
                            x-cloak
                            x-show="humanChatCanCreateInvite()"
                            @click="toggleHumanChatUtilityPanel('invite')"
                        >초대</button>
                    </div>
                </div>

                <div class="home-v6-agent-human-selection-bar" x-cloak x-show="humanChatHasSelection()">
                    <span class="home-v6-agent-human-selection-text" x-text="humanChatSelectionSummary()"></span>
                    <button type="button" class="home-v6-agent-chat-action" @click="clearHumanChatSelection()">지우기</button>
                </div>

                <div class="home-v6-agent-human-utility-panel" x-cloak x-show="humanChatUtilityPanel === 'dm'">
                    <div class="home-v6-agent-human-utility-head">
                        <p class="home-v6-agent-human-utility-title">새 대화</p>
                        <button type="button" class="home-v6-agent-chat-action" @click="closeHumanChatUtilityPanel()">닫기</button>
                    </div>
                    <div class="home-v6-agent-human-member-list">
                        <template x-for="member in humanChatDmMembers()" :key="'dm-member-' + member.user_id">
                            <button
                                type="button"
                                class="home-v6-agent-human-member-chip"
                                :class="{ 'is-active': humanChatIsDmMemberSelected(member.user_id) }"
                                @click="toggleHumanChatDmMember(member.user_id)"
                            >
                                <span class="home-v6-agent-human-member-name" x-text="member.label"></span>
                                <span class="home-v6-agent-human-member-meta" x-text="member.meta"></span>
                            </button>
                        </template>
                    </div>
                    <input
                        type="text"
                        class="home-v6-agent-form-input"
                        placeholder="대화 이름"
                        x-model="humanChatDmRoomName"
                    >
                    <p class="home-v6-agent-field-error" x-cloak x-show="humanChatDmErrorText" x-text="humanChatDmErrorText"></p>
                    <div class="home-v6-agent-chat-draft-actions">
                        <button
                            type="button"
                            class="home-v6-agent-chat-action"
                            :disabled="isHumanChatCreatingDm"
                            @click="submitHumanChatDm()"
                            x-text="isHumanChatCreatingDm ? '만드는 중' : '시작'"
                        ></button>
                    </div>
                </div>

                <div class="home-v6-agent-human-utility-panel" x-cloak x-show="humanChatUtilityPanel === 'invite'">
                    <div class="home-v6-agent-human-utility-head">
                        <p class="home-v6-agent-human-utility-title">초대</p>
                        <button type="button" class="home-v6-agent-chat-action" @click="closeHumanChatUtilityPanel()">닫기</button>
                    </div>
                    <div class="home-v6-agent-human-toolbar-group">
                        <template x-for="role in humanChatInviteRoles()" :key="'invite-role-' + role.value">
                            <button
                                type="button"
                                class="home-v6-agent-human-toolbar-chip"
                                :class="{ 'is-active': humanChatInviteRole === role.value }"
                                @click="humanChatInviteRole = role.value"
                                x-text="role.label"
                            ></button>
                        </template>
                    </div>
                    <input
                        type="email"
                        class="home-v6-agent-form-input"
                        placeholder="이메일"
                        x-model="humanChatInviteEmail"
                    >
                    <p class="home-v6-agent-field-error" x-cloak x-show="humanChatInviteErrorText" x-text="humanChatInviteErrorText"></p>
                    <div class="home-v6-agent-chat-draft-actions">
                        <button
                            type="button"
                            class="home-v6-agent-chat-action"
                            :disabled="isHumanChatCreatingInvite"
                            @click="submitHumanChatInvite()"
                            x-text="isHumanChatCreatingInvite ? '만드는 중' : '링크 만들기'"
                        ></button>
                        <button
                            type="button"
                            class="home-v6-agent-chat-action"
                            x-cloak
                            x-show="humanChatLatestInviteUrl"
                            @click="copyHumanChatInviteUrl()"
                        >복사</button>
                    </div>
                    <a
                        class="home-v6-agent-human-invite-url"
                        x-cloak
                        x-show="humanChatLatestInviteUrl"
                        :href="humanChatLatestInviteUrl || '#'"
                        x-text="humanChatLatestInviteUrl || ''"
                        target="_blank"
                        rel="noopener"
                    ></a>
                </div>

                <div class="home-v6-agent-human-thread">
                    <div class="home-v6-agent-chat-row" x-cloak x-show="isHumanChatLoading && !humanChatMessages().length">
                        <div class="home-v6-agent-chat-bubble home-v6-agent-chat-bubble--ai">
                            <div class="home-v6-agent-chat-loading">
                                <span></span>
                                <span></span>
                                <span></span>
                            </div>
                        </div>
                    </div>

                    <div class="home-v6-agent-chat-row" x-cloak x-show="!isHumanChatLoading && !humanChatMessages().length">
                        <div class="home-v6-agent-chat-bubble home-v6-agent-chat-bubble--ai">
                            <p class="home-v6-agent-chat-text">대화 없음</p>
                        </div>
                    </div>

                    <template x-for="message in humanChatMessages()" :key="message.id">
                        <div class="home-v6-agent-chat-row" :class="{ 'home-v6-agent-chat-row--user': message.is_mine }">
                            <div class="home-v6-agent-chat-bubble" :class="message.is_mine ? 'home-v6-agent-chat-bubble--user' : 'home-v6-agent-chat-bubble--ai'">
                                <div class="home-v6-agent-human-meta">
                                    <span class="home-v6-agent-human-sender" x-text="message.sender_name || ''"></span>
                                    <span class="home-v6-agent-human-time" x-text="message.created_at_label || ''"></span>
                                </div>
                                <div class="home-v6-agent-human-parent" x-cloak x-show="message.parent_preview">
                                    <span class="home-v6-agent-human-parent-name" x-text="message.parent_sender_name || ''"></span>
                                    <span class="home-v6-agent-human-parent-body" x-text="message.parent_preview || ''"></span>
                                </div>
                                <p class="home-v6-agent-chat-text" x-cloak x-show="message.body" x-text="message.body || ''"></p>
                                <div class="home-v6-agent-human-asset-list" x-cloak x-show="Array.isArray(message.assets) && message.assets.length">
                                    <template x-for="asset in message.assets" :key="asset.id">
                                        <span class="home-v6-agent-human-asset-item">
                                            <a class="home-v6-agent-human-asset" :href="asset.download_url || '#'" x-text="asset.original_name || '첨부파일'"></a>
                                            <button
                                                type="button"
                                                class="home-v6-agent-chat-action"
                                                @click="toggleHumanChatAssetSelection(asset)"
                                                x-text="humanChatIsAssetSelected(asset.id) ? '선택됨' : '선택'"
                                            ></button>
                                        </span>
                                    </template>
                                </div>
                                <div class="home-v6-agent-chat-draft-actions">
                                    <button type="button" class="home-v6-agent-chat-action" x-cloak x-show="humanChatSupportsReply()" @click="setHumanChatReply(message)">답글</button>
                                    <button type="button" class="home-v6-agent-chat-action" x-cloak x-show="humanChatSupportsReactions()" @click="toggleHumanChatReaction(message)">
                                        확인
                                        <span x-cloak x-show="message.ack_count" x-text="message.ack_count"></span>
                                    </button>
                                    <button
                                        type="button"
                                        class="home-v6-agent-chat-action"
                                        @click="toggleHumanChatMessageSelection(message)"
                                        x-text="humanChatIsMessageSelected(message.id) ? '선택됨' : '선택'"
                                    ></button>
                                </div>
                            </div>
                        </div>
                    </template>
                </div>

                <div class="home-v6-agent-human-extras" x-cloak x-show="humanChatHasAssetsPanel() || humanChatCalendarSuggestions().length">
                    <section class="home-v6-agent-human-extra-card" x-cloak x-show="humanChatHasAssetsPanel()">
                        <div class="home-v6-agent-human-extra-head">
                            <p class="home-v6-agent-human-extra-title">자료</p>
                            <span class="home-v6-agent-rail-item-badge" x-text="humanChatAssetsTotalCount()"></span>
                        </div>
                        <div class="home-v6-agent-human-board-section-list">
                            <template x-for="section in humanChatAssetSections()" :key="'asset-section-' + section.code">
                                <div class="home-v6-agent-human-board-section">
                                    <div class="home-v6-agent-human-board-head">
                                        <p class="home-v6-agent-human-board-title" x-text="section.label"></p>
                                        <span class="home-v6-agent-human-board-count" x-text="section.count"></span>
                                    </div>
                                    <div class="home-v6-agent-human-board-list">
                                        <template x-for="asset in section.items" :key="'board-asset-' + asset.id">
                                            <div class="home-v6-agent-human-board-card">
                                                <div class="home-v6-agent-human-board-copy">
                                                    <p class="home-v6-agent-human-board-name" x-text="asset.original_name || '자료'"></p>
                                                    <p class="home-v6-agent-human-board-meta" x-text="asset.posted_by || asset.uploader_name || ''"></p>
                                                </div>
                                                <div class="home-v6-agent-chat-draft-actions">
                                                    <a class="home-v6-agent-chat-action home-v6-agent-chat-action--link" :href="asset.download_url || '#'" target="_blank" rel="noopener">다운로드</a>
                                                    <a class="home-v6-agent-chat-action home-v6-agent-chat-action--link" :href="asset.message_url || '#'" x-cloak x-show="asset.message_url">원문</a>
                                                    <button
                                                        type="button"
                                                        class="home-v6-agent-chat-action"
                                                        @click="toggleHumanChatAssetSelection(asset)"
                                                        x-text="humanChatIsAssetSelected(asset.id) ? '선택됨' : '선택'"
                                                    ></button>
                                                </div>
                                            </div>
                                        </template>
                                    </div>
                                </div>
                            </template>
                        </div>
                    </section>

                    <section class="home-v6-agent-human-extra-card" x-cloak x-show="humanChatCalendarSuggestions().length">
                        <div class="home-v6-agent-human-extra-head">
                            <p class="home-v6-agent-human-extra-title">일정</p>
                            <span class="home-v6-agent-rail-item-badge" x-text="humanChatCalendarSuggestions().length"></span>
                        </div>
                        <div class="home-v6-agent-human-calendar-list">
                            <template x-for="suggestion in humanChatCalendarSuggestions()" :key="'calendar-suggestion-' + suggestion.id">
                                <div class="home-v6-agent-human-calendar-card">
                                    <div class="home-v6-agent-human-board-copy">
                                        <p class="home-v6-agent-human-board-name" x-text="suggestion.title || '추천 일정'"></p>
                                        <p class="home-v6-agent-human-board-meta" x-text="suggestion.start_time_label || ''"></p>
                                    </div>
                                    <button
                                        type="button"
                                        class="home-v6-agent-chat-action"
                                        :disabled="isHumanChatSuggestionApplying(suggestion.id)"
                                        @click="applyHumanChatCalendarSuggestion(suggestion)"
                                        x-text="isHumanChatSuggestionApplying(suggestion.id) ? '넣는 중' : '캘린더 넣기'"
                                    ></button>
                                </div>
                            </template>
                        </div>
                    </section>
                </div>

                <div
                    class="home-v6-agent-human-composer"
                    :class="{ 'is-drag-active': isHumanChatDragActive }"
                    @dragenter.prevent="handleHumanChatDragEnter($event)"
                    @dragover.prevent="handleHumanChatDragOver($event)"
                    @dragleave.prevent="handleHumanChatDragLeave($event)"
                    @drop.prevent="handleHumanChatDrop($event)"
                >
                    <div class="home-v6-agent-human-reply" x-cloak x-show="humanChatReplyTo">
                        <span class="home-v6-agent-human-reply-copy">
                            <strong x-text="humanChatReplyTo && humanChatReplyTo.sender_name ? humanChatReplyTo.sender_name : ''"></strong>
                            <span x-text="humanChatReplyTo && humanChatReplyTo.body ? humanChatReplyTo.body : ''"></span>
                        </span>
                        <button type="button" class="home-v6-agent-chat-action" @click="clearHumanChatReply()">닫기</button>
                    </div>

                    <div class="home-v6-agent-human-queued-list" x-cloak x-show="humanChatHasFilesQueued()">
                        <template x-for="file in humanChatQueuedFiles" :key="file.id">
                            <span class="home-v6-agent-human-queued-file">
                                <span x-text="file.name || ''"></span>
                                <button type="button" class="home-v6-agent-human-queued-remove" @click="removeHumanChatQueuedFile(file.id)">
                                    <i class="fa-solid fa-xmark" aria-hidden="true"></i>
                                </button>
                            </span>
                        </template>
                    </div>

                    <textarea
                        class="home-v6-agent-input home-v6-agent-input--human"
                        :placeholder="humanChatComposerPlaceholder()"
                        x-model="humanChatDraftText"
                        @paste="captureHumanChatPaste($event)"
                        @keydown.ctrl.enter.prevent="sendHumanChat()"
                        @keydown.meta.enter.prevent="sendHumanChat()"
                    ></textarea>
                    <p class="home-v6-agent-field-error" x-cloak x-show="humanChatErrorText" x-text="humanChatErrorText"></p>
                    <div class="home-v6-agent-action-row home-v6-agent-action-row--human">
                        <div class="home-v6-agent-human-actions">
                            <input
                                type="file"
                                class="sr-only"
                                data-home-v6-human-chat-file-input="true"
                                multiple
                                @change="queueHumanChatFilesFromInput($event)"
                            >
                            <button type="button" class="home-v6-agent-chat-action" x-cloak x-show="humanChatCanAttachFiles()" @click="openHumanChatFilePicker()">첨부</button>
                        </div>
                        <button
                            type="button"
                            class="home-v6-empty-primary-action home-v6-agent-submit"
                            :disabled="isHumanChatSending || !humanChatCanSend()"
                            @click="sendHumanChat()"
                            x-text="isHumanChatSending ? '전송 중' : '전송'"
                        ></button>
                    </div>
                </div>
            </section>

            <section class="home-v6-agent-notice-chat" x-cloak x-show="activeRendererKey === 'notice'">
                <div class="home-v6-agent-notice-thread">
                    <div class="home-v6-agent-chat-row" x-cloak x-show="!noticeHasConversation()">
                        <div class="home-v6-agent-chat-bubble home-v6-agent-chat-bubble--ai">
                            <p class="home-v6-agent-chat-text" x-text="activeMode.empty_prompt || '무엇을 보낼까요?'"></p>
                            <div class="home-v6-agent-notice-quick-list">
                                <template x-for="item in noticeQuickExamples()" :key="item.label">
                                    <button
                                        type="button"
                                        class="home-v6-agent-notice-quick-chip"
                                        @click="runNoticeExample(item.text)"
                                        x-text="item.label"
                                    ></button>
                                </template>
                            </div>
                        </div>
                    </div>

                    <div class="home-v6-agent-chat-row home-v6-agent-chat-row--user" x-cloak x-show="noticeUserBubbleText()">
                        <div class="home-v6-agent-chat-bubble home-v6-agent-chat-bubble--user">
                            <p class="home-v6-agent-chat-text" x-text="noticeUserBubbleText()"></p>
                        </div>
                    </div>

                    <div class="home-v6-agent-chat-row" x-cloak x-show="isAgentLoading || previewResultLines().length">
                        <div class="home-v6-agent-chat-bubble home-v6-agent-chat-bubble--ai home-v6-agent-chat-bubble--draft">
                            <div class="home-v6-agent-chat-draft-head">
                                <p class="home-v6-agent-chat-draft-title" x-text="noticeDraftTitle()"></p>
                            </div>

                            <div class="home-v6-agent-chat-loading" x-cloak x-show="isAgentLoading">
                                <span></span>
                                <span></span>
                                <span></span>
                            </div>

                            <div class="home-v6-agent-chat-draft-body" x-cloak x-show="previewResultLines().length">
                                <template x-for="(line, index) in previewResultLines()" :key="'notice-line-' + index + '-' + line">
