<section
    class="home-v6-representative-section"
    {% if agent_workspace_surface != 'mobile' %}data-home-v6-representative-services="true" data-home-v6-agent-workspace="true"{% endif %}
>
    <div class="home-v6-card home-v6-agent-card" :class="{ 'is-shell-empty': !activeAiHasVisibleConversation() }">
        <div class="home-v6-agent-main" :class="{ 'is-shell-empty': !activeAiHasVisibleConversation() }">
            <div class="home-v6-agent-main-head home-v6-agent-main-head--single-shell" :class="{ 'is-empty': !activeAiHasVisibleConversation() }">
                <div class="home-v6-cmd-stage">
                    <div class="home-v6-cmd-stage-backdrop" aria-hidden="true"></div>
                    <div class="home-v6-cmd-hero home-v6-cmd-hero--single-shell">
                        <div class="home-v6-cmd-shell-head">
                            <div class="home-v6-cmd-shell-title-group">
                                <span class="home-v6-agent-shell-avatar" aria-hidden="true">
                                    <i class="fa-solid fa-robot"></i>
                                </span>
                                <span class="home-v6-cmd-shell-copy">
                                    <p class="home-v6-cmd-shell-title">AI 교무비서</p>
                                    <span class="home-v6-cmd-shell-status" x-cloak x-show="workspaceShellHint()">
                                        <span class="home-v6-cmd-shell-status-dot" aria-hidden="true"></span>
                                        <span x-text="workspaceShellHint()"></span>
                                    </span>
                                </span>
                            </div>
                            <span class="home-v6-cmd-shell-badge" x-cloak x-show="workspaceShellBadge()" x-text="workspaceShellBadge()"></span>
                        </div>

                        <div class="home-v6-svc-nav" role="tablist" aria-label="AI 교무비서 서비스">
                            <template x-for="mode in availableShellModes()" :key="'svc-nav-' + mode.key">
                                <button
                                    class="home-v6-svc-nav-chip"
                                    :class="{ 'is-active': activeModeKey === mode.key }"
                                    type="button"
                                    role="tab"
                                    :aria-selected="activeModeKey === mode.key ? 'true' : 'false'"
                                    :aria-label="mode.label"
                                    @click="selectModeFromShellMenu(mode.key)"
                                    x-text="mode.label"
                                ></button>
                            </template>
                        </div>
                    </div>
                </div>

                <div class="home-v6-agent-head-actions" x-cloak x-show="activeRendererKey === 'human-chat'" :class="{ 'home-v6-agent-head-actions--human': activeRendererKey === 'human-chat' }">
                    <div class="home-v6-agent-human-head-actions" x-cloak x-show="activeRendererKey === 'human-chat'">
                        <button
                            type="button"
                            class="home-v6-agent-human-head-chip"
                            x-cloak
                            x-show="humanChatContextActions().length"
                            :class="{ 'is-active': humanChatDrawerIs('ai') }"
                            @click="openHumanChatAiTools()"
                        >AI 도구</button>
                        <div
                            class="home-v6-agent-human-head-popover home-v6-agent-human-head-popover--ai"
                            x-cloak
                            x-show="humanChatDrawerIs('ai')"
                            @click.outside="closeHumanChatDrawer()"
                        >
                            <div class="home-v6-agent-human-head-popover-head">
                                <p class="home-v6-agent-human-head-popover-title">AI 도구</p>
                                <button type="button" class="home-v6-agent-human-mini-close" @click="closeHumanChatDrawer()" aria-label="닫기">
                                    <i class="fa-solid fa-xmark" aria-hidden="true"></i>
                                </button>
                            </div>
                            <div class="home-v6-agent-human-head-popover-list">
                                <template x-for="action in humanChatContextActions()" :key="action.key">
                                    <button
                                        type="button"
                                        class="home-v6-agent-human-popover-action"
                                        @click="launchHumanChatContextAction(action)"
                                        x-text="action.label"
                                    ></button>
                                </template>
                            </div>
                        </div>
                        <button
                            type="button"
                            class="home-v6-agent-human-head-chip"
                            x-cloak
                            x-show="humanChatHasAssetsPanel()"
                            :class="{ 'is-active': humanChatDrawerIs('assets') }"
                            @click="toggleHumanChatDrawer('assets')"
                        >
                            <span>자료</span>
                            <strong x-text="humanChatAssetsTotalCount()"></strong>
                        </button>
                        <button
                            type="button"
                            class="home-v6-agent-human-head-chip"
                            x-cloak
                            x-show="humanChatCalendarSuggestions().length"
                            :class="{ 'is-active': humanChatDrawerIs('calendar') }"
                            @click="toggleHumanChatDrawer('calendar')"
                        >
                            <span>일정</span>
                            <strong x-text="humanChatCalendarSuggestions().length"></strong>
                        </button>
                        <div class="home-v6-agent-human-head-menu">
                            <button
                                type="button"
                                class="home-v6-agent-human-head-chip home-v6-agent-human-head-chip--icon"
                                :class="{ 'is-active': humanChatDrawerIs('room-menu') }"
                                @click="openHumanChatRoomMenu()"
                                aria-label="대화 메뉴"
                            >
                                <i class="fa-solid fa-ellipsis" aria-hidden="true"></i>
                            </button>

                            <div
                                class="home-v6-agent-human-head-popover"
                                x-cloak
                                x-show="humanChatDrawerIs('room-menu')"
                                @click.outside="closeHumanChatDrawer()"
                            >
                                <div class="home-v6-agent-human-head-popover-head">
                                    <button
                                        type="button"
                                        class="home-v6-agent-human-popover-back"
                                        x-cloak
                                        x-show="humanChatRoomMenuView !== 'menu'"
                                        @click="humanChatRoomMenuView = 'menu'"
                                    >
                                        <i class="fa-solid fa-chevron-left" aria-hidden="true"></i>
                                        <span>뒤로</span>
                                    </button>
                                    <p
                                        class="home-v6-agent-human-head-popover-title"
                                        x-text="humanChatRoomMenuView === 'dm' ? '새 대화' : (humanChatRoomMenuView === 'invite' ? '초대' : '더보기')"
                                    ></p>
                                    <button type="button" class="home-v6-agent-human-mini-close" @click="closeHumanChatDrawer()" aria-label="닫기">
                                        <i class="fa-solid fa-xmark" aria-hidden="true"></i>
                                    </button>
                                </div>

                                <div class="home-v6-agent-human-head-popover-list" x-cloak x-show="humanChatRoomMenuView === 'menu'">
                                    <button
                                        type="button"
                                        class="home-v6-agent-human-popover-action"
                                        x-cloak
                                        x-show="humanChatCanCreateDm()"
                                        @click="openHumanChatDmPanel()"
                                    >새 대화</button>
                                    <button
                                        type="button"
                                        class="home-v6-agent-human-popover-action"
                                        x-cloak
                                        x-show="humanChatCanCreateInvite()"
                                        @click="openHumanChatInvitePanel()"
                                    >초대</button>
                                    <a
                                        class="home-v6-agent-human-popover-action home-v6-agent-human-popover-action--link"
                                        x-cloak
                                        x-show="activeHeaderPrimaryHref()"
                                        :href="activeHeaderPrimaryHref() || '#'"
                                    >채팅방 열기</a>
                                </div>

                                <div class="home-v6-agent-human-popover-panel" x-cloak x-show="humanChatRoomMenuView === 'dm'">
                                    <div class="home-v6-agent-human-member-list">
                                        <template x-for="member in humanChatDmMembers()" :key="'dm-member-' + member.user_id">
                                            <button
                                                type="button"
                                                class="home-v6-agent-human-member-chip"
                                                :class="{ 'is-active': humanChatIsDmMemberSelected(member.user_id) }"
                                                @click="toggleHumanChatDmMember(member.user_id)"
                                            >
                                                <span class="home-v6-agent-human-member-name" x-text="member.label"></span>
                                                <span class="home-v6-agent-human-member-meta" x-text="member.meta"></span>
                                            </button>
                                        </template>
                                    </div>
                                    <input
                                        type="text"
                                        class="home-v6-agent-form-input"
                                        placeholder="대화 이름"
                                        x-model="humanChatDmRoomName"
                                    >
                                    <p class="home-v6-agent-field-error" x-cloak x-show="humanChatDmErrorText" x-text="humanChatDmErrorText"></p>
                                    <div class="home-v6-agent-chat-draft-actions">
                                        <button
                                            type="button"
                                            class="home-v6-agent-chat-action"
                                            :disabled="isHumanChatCreatingDm"
                                            @click="submitHumanChatDm()"
                                            x-text="isHumanChatCreatingDm ? '만드는 중' : '시작'"
                                        ></button>
                                    </div>
                                </div>

                                <div class="home-v6-agent-human-popover-panel" x-cloak x-show="humanChatRoomMenuView === 'invite'">
                                    <div class="home-v6-agent-human-toolbar-group">
                                        <template x-for="role in humanChatInviteRoles()" :key="'invite-role-' + role.value">
                                            <button
                                                type="button"
                                                class="home-v6-agent-human-toolbar-chip"
                                                :class="{ 'is-active': humanChatInviteRole === role.value }"
                                                @click="humanChatInviteRole = role.value"
                                                x-text="role.label"
                                            ></button>
                                        </template>
                                    </div>
                                    <input
                                        type="email"
                                        class="home-v6-agent-form-input"
                                        placeholder="이메일"
                                        x-model="humanChatInviteEmail"
                                    >
                                    <p class="home-v6-agent-field-error" x-cloak x-show="humanChatInviteErrorText" x-text="humanChatInviteErrorText"></p>
                                    <div class="home-v6-agent-chat-draft-actions">
                                        <button
                                            type="button"
                                            class="home-v6-agent-chat-action"
                                            :disabled="isHumanChatCreatingInvite"
                                            @click="submitHumanChatInvite()"
                                            x-text="isHumanChatCreatingInvite ? '만드는 중' : '링크 만들기'"
                                        ></button>
                                        <button
                                            type="button"
                                            class="home-v6-agent-chat-action"
                                            x-cloak
                                            x-show="humanChatLatestInviteUrl"
                                            @click="copyHumanChatInviteUrl()"
                                        >복사</button>
                                    </div>
                                    <a
                                        class="home-v6-agent-human-invite-url"
                                        x-cloak
                                        x-show="humanChatLatestInviteUrl"
                                        :href="humanChatLatestInviteUrl || '#'"
                                        x-text="humanChatLatestInviteUrl || ''"
                                        target="_blank"
                                        rel="noopener"
                                    ></a>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div x-cloak x-show="activeRendererKey !== 'human-chat'">
                        <a
                            class="home-v6-inline-secondary-action home-v6-inline-secondary-action--pill home-v6-agent-context-link"
                            x-cloak
                            x-show="activeHeaderPrimaryHref() && activeHeaderPrimaryLabel()"
                            :href="activeHeaderPrimaryHref() || '#'"
                            x-text="activeHeaderPrimaryLabel() || ''"
                        ></a>
                        <a
                            class="home-v6-inline-secondary-action home-v6-inline-secondary-action--pill home-v6-agent-context-link"
                            x-cloak
                            x-show="activeHeaderSecondaryLabel() && activeHeaderSecondaryHref()"
                            :href="activeHeaderSecondaryHref() || '#'"
                            x-text="activeHeaderSecondaryLabel() || ''"
                        ></a>
                    </div>
                </div>
            </div>

            <div class="home-v6-agent-context-bar" x-cloak x-show="hasAgentConversationContext() && !activeConversationItem">
                <span class="home-v6-agent-context-room" x-text="agentConversationContextTitle() || ''"></span>
                <div class="home-v6-agent-context-actions">
                    <button
                        type="button"
                        class="home-v6-agent-chat-action"
                        @click="returnToAgentConversationContext()"
                    >대화로</button>
                    <button
                        type="button"
                        class="home-v6-agent-chat-action"
                        x-cloak
                        x-show="canSharePreviewToContextConversation()"
                        :disabled="isSharingAgentPreviewToRoom"
                        @click="shareAgentPreviewToContextConversation()"
                        x-text="isSharingAgentPreviewToRoom ? '공유 중' : '방에 공유'"
                    ></button>
                </div>
            </div>

            <section class="home-v6-agent-human-chat" x-cloak x-show="activeRendererKey === 'human-chat'">
                <div class="home-v6-agent-human-selection-bar" x-cloak x-show="humanChatHasSelection()">
                    <span class="home-v6-agent-human-selection-text" x-text="humanChatSelectionSummary()"></span>
                    <button type="button" class="home-v6-agent-chat-action" @click="clearHumanChatSelection()">지우기</button>
                </div>

                <div class="home-v6-agent-human-stage" :class="{ 'is-drawer-open': humanChatDrawerIs('assets') || humanChatDrawerIs('calendar') }">
                    <div class="home-v6-agent-human-thread">
                        <div class="home-v6-agent-chat-row" x-cloak x-show="isHumanChatLoading && !humanChatMessages().length">
                            <div class="home-v6-agent-chat-bubble home-v6-agent-chat-bubble--ai">
                                <div class="home-v6-agent-chat-loading">
                                    <span></span>
                                    <span></span>
                                    <span></span>
                                </div>
                            </div>
                        </div>

                        <div class="home-v6-agent-chat-row" x-cloak x-show="!isHumanChatLoading && !humanChatMessages().length">
                            <div class="home-v6-agent-chat-bubble home-v6-agent-chat-bubble--ai">
                                <p class="home-v6-agent-chat-text">대화 없음</p>
                            </div>
                        </div>

                        <div class="home-v6-agent-human-timeline">
                            <template x-for="item in humanChatTimelineItems()" :key="item.key">
                                <div>
                                    <div class="home-v6-agent-human-day-divider" x-cloak x-show="item.type === 'day_divider'">
                                        <span x-text="item.label || ''"></span>
                                    </div>

                                    <div class="home-v6-agent-human-cluster" x-cloak x-show="item.type === 'cluster'" :class="{ 'is-mine': item.is_mine }">
                                        <p class="home-v6-agent-human-cluster-sender" x-cloak x-show="item.show_sender" x-text="item.sender_name || ''"></p>
                                        <div class="home-v6-agent-human-cluster-stack">
                                            <template x-for="message in item.messages" :key="message.id">
                                                <div
                                                    class="home-v6-agent-human-message"
                                                    :class="{ 'is-mine': item.is_mine, 'is-selected': humanChatIsMessageSelected(message.id) }"
                                                >
                                                    <div class="home-v6-agent-human-message-shell" :class="{ 'is-action-open': humanChatIsActionMenuOpen(message.id) }">
                                                        <button
                                                            type="button"
                                                            class="home-v6-agent-human-action-launcher"
                                                            :class="{ 'is-visible': humanChatIsActionMenuOpen(message.id) }"
                                                            @click.stop="toggleHumanChatActionMenu(message)"
                                                            :aria-label="(message.sender_name || '메시지') + ' 메뉴'"
                                                        >
                                                            <i class="fa-solid fa-ellipsis" aria-hidden="true"></i>
                                                        </button>

                                                        <div class="home-v6-agent-human-bubble" :class="{ 'is-mine': item.is_mine, 'is-selected': humanChatIsMessageSelected(message.id) }" tabindex="0">
                                                            <div class="home-v6-agent-human-quote" x-cloak x-show="message.parent_preview">
                                                                <span class="home-v6-agent-human-quote-name" x-text="message.parent_sender_name || ''"></span>
                                                                <span class="home-v6-agent-human-quote-body" x-text="message.parent_preview || ''"></span>
                                                            </div>
                                                            <p class="home-v6-agent-chat-text" x-cloak x-show="message.body" x-text="message.body || ''"></p>
                                                            <div class="home-v6-agent-human-asset-list" x-cloak x-show="Array.isArray(message.assets) && message.assets.length">
                                                                <template x-for="asset in message.assets" :key="asset.id">
                                                                    <a
                                                                        class="home-v6-agent-human-asset"
                                                                        :href="asset.download_url || '#'"
                                                                        x-text="asset.original_name || '첨부파일'"
                                                                    ></a>
                                                                </template>
                                                            </div>
                                                        </div>

                                                        <div
                                                            class="home-v6-agent-human-action-menu"
                                                            x-cloak
                                                            x-show="humanChatIsActionMenuOpen(message.id)"
                                                            @click.outside="closeHumanChatActionMenu()"
                                                            @click.stop
                                                        >
                                                            <button
                                                                type="button"
                                                                class="home-v6-agent-human-action-menu-item"
                                                                x-cloak
                                                                x-show="humanChatSupportsReply()"
                                                                @click="setHumanChatReply(message)"
                                                            >답글</button>
                                                            <button
                                                                type="button"
                                                                class="home-v6-agent-human-action-menu-item"
                                                                x-cloak
                                                                x-show="humanChatSupportsReactions()"
                                                                @click="toggleHumanChatReaction(message); closeHumanChatActionMenu()"
                                                            >
                                                                확인
                                                                <span x-cloak x-show="message.ack_count" x-text="message.ack_count"></span>
                                                            </button>
                                                            <button
                                                                type="button"
                                                                class="home-v6-agent-human-action-menu-item"
                                                                @click="toggleHumanChatMessageSelection(message); closeHumanChatActionMenu()"
                                                                x-text="humanChatIsMessageSelected(message.id) ? '선택 취소' : '선택'"
                                                            ></button>
                                                        </div>
                                                    </div>
                                                </div>
                                            </template>
                                        </div>
                                        <div class="home-v6-agent-human-cluster-meta">
                                            <span class="home-v6-agent-human-cluster-ack" x-cloak x-show="humanChatClusterAckLabel(item)" x-text="humanChatClusterAckLabel(item)"></span>
                                            <span class="home-v6-agent-human-cluster-time" x-text="item.tail_time || ''"></span>
                                        </div>
                                    </div>
                                </div>
                            </template>
                        </div>
                    </div>

                    <div
                        class="home-v6-agent-human-drawer-backdrop"
                        x-cloak
                        x-show="humanChatDrawerIs('assets') || humanChatDrawerIs('calendar')"
                        @click="closeHumanChatDrawer()"
                    ></div>

                    <aside class="home-v6-agent-human-drawer" x-cloak x-show="humanChatDrawerIs('assets') || humanChatDrawerIs('calendar')">
                        <div class="home-v6-agent-human-drawer-head">
                            <div class="home-v6-agent-human-drawer-copy">
                                <p class="home-v6-agent-human-drawer-title" x-text="humanChatDrawerIs('assets') ? '자료' : '일정'"></p>
                                <span
                                    class="home-v6-agent-rail-item-badge"
                                    x-text="humanChatDrawerIs('assets') ? humanChatAssetsTotalCount() : humanChatCalendarSuggestions().length"
                                ></span>
                            </div>
                            <button type="button" class="home-v6-agent-human-mini-close" @click="closeHumanChatDrawer()" aria-label="닫기">
                                <i class="fa-solid fa-xmark" aria-hidden="true"></i>
                            </button>
                        </div>

                        <div class="home-v6-agent-human-drawer-body" x-cloak x-show="humanChatDrawerIs('assets')">
                            <div class="home-v6-agent-human-board-section-list">
                                <template x-for="section in humanChatAssetSections()" :key="'asset-section-' + section.code">
                                    <div class="home-v6-agent-human-board-section">
                                        <div class="home-v6-agent-human-board-head">
                                            <p class="home-v6-agent-human-board-title" x-text="section.label"></p>
                                            <span class="home-v6-agent-human-board-count" x-text="section.count"></span>
                                        </div>
                                        <div class="home-v6-agent-human-board-list">
                                            <template x-for="asset in section.items" :key="'board-asset-' + asset.id">
                                                <div class="home-v6-agent-human-board-card">
                                                    <div class="home-v6-agent-human-board-copy">
                                                        <p class="home-v6-agent-human-board-name" x-text="asset.original_name || '자료'"></p>
                                                        <p class="home-v6-agent-human-board-meta" x-text="asset.posted_by || asset.uploader_name || ''"></p>
                                                    </div>
                                                    <div class="home-v6-agent-human-board-actions">
                                                        <button
                                                            type="button"
                                                            class="home-v6-agent-human-board-toggle"
                                                            :class="{ 'is-selected': humanChatIsAssetSelected(asset.id) }"
                                                            @click="toggleHumanChatAssetSelection(asset)"
                                                            :aria-pressed="humanChatIsAssetSelected(asset.id) ? 'true' : 'false'"
                                                            aria-label="자료 선택"
                                                        >
                                                            <i class="fa-solid fa-check" aria-hidden="true"></i>
                                                        </button>
                                                        <a class="home-v6-agent-chat-action home-v6-agent-chat-action--link" :href="asset.download_url || '#'" target="_blank" rel="noopener">다운로드</a>
                                                        <a class="home-v6-agent-chat-action home-v6-agent-chat-action--link" :href="asset.message_url || '#'" x-cloak x-show="asset.message_url">원문</a>
                                                    </div>
                                                </div>
                                            </template>
                                        </div>
                                    </div>
                                </template>
                            </div>
                        </div>

                        <div class="home-v6-agent-human-drawer-body" x-cloak x-show="humanChatDrawerIs('calendar')">
                            <div class="home-v6-agent-human-calendar-list">
                                <template x-for="suggestion in humanChatCalendarSuggestions()" :key="'calendar-suggestion-' + suggestion.id">
                                    <div class="home-v6-agent-human-calendar-card">
                                        <div class="home-v6-agent-human-board-copy">
                                            <p class="home-v6-agent-human-board-name" x-text="suggestion.title || '추천 일정'"></p>
                                            <p class="home-v6-agent-human-board-meta" x-text="suggestion.start_time_label || ''"></p>
                                        </div>
                                        <button
                                            type="button"
                                            class="home-v6-agent-chat-action"
                                            :disabled="isHumanChatSuggestionApplying(suggestion.id)"
                                            @click="applyHumanChatCalendarSuggestion(suggestion)"
                                            x-text="isHumanChatSuggestionApplying(suggestion.id) ? '넣는 중' : '캘린더 넣기'"
                                        ></button>
                                    </div>
                                </template>
                            </div>
                        </div>
                    </aside>
                </div>

                <div
                    class="home-v6-agent-human-composer"
                    :class="{ 'is-drag-active': isHumanChatDragActive }"
                    @dragenter.prevent="handleHumanChatDragEnter($event)"
                    @dragover.prevent="handleHumanChatDragOver($event)"
                    @dragleave.prevent="handleHumanChatDragLeave($event)"
                    @drop.prevent="handleHumanChatDrop($event)"
                >
                    <div class="home-v6-agent-human-reply" x-cloak x-show="humanChatReplyTo">
                        <span class="home-v6-agent-human-reply-copy">
                            <strong x-text="humanChatReplyTo && humanChatReplyTo.sender_name ? humanChatReplyTo.sender_name : ''"></strong>
                            <span x-text="humanChatReplyTo && humanChatReplyTo.body ? humanChatReplyTo.body : ''"></span>
                        </span>
                        <button type="button" class="home-v6-agent-human-mini-close" @click="clearHumanChatReply()" aria-label="답글 닫기">
                            <i class="fa-solid fa-xmark" aria-hidden="true"></i>
                        </button>
                    </div>

                    <div class="home-v6-agent-human-queued-list" x-cloak x-show="humanChatHasFilesQueued()">
                        <template x-for="file in humanChatQueuedFiles" :key="file.id">
                            <span class="home-v6-agent-human-queued-file">
                                <span x-text="file.name || ''"></span>
                                <button type="button" class="home-v6-agent-human-queued-remove" @click="removeHumanChatQueuedFile(file.id)">

                        </button>

                        <button
                            class="home-v6-cmd-bar-tool"
                            x-cloak
                            x-show="workspaceShellShowImageUtility()"
                            type="button"
                            title="사진 첨부"
                            aria-label="사진 첨부"
                            @click="openWorkspaceImagePicker()"
                        >
                            <i class="fa-regular fa-image" aria-hidden="true"></i>
                        </button>

                        <button
                            class="home-v6-cmd-bar-tool"
                            x-cloak
                            x-show="workspaceShellShowVoiceUtility()"
                            type="button"
                            :class="{ 'is-active': isWorkspaceVoiceListening }"
                            :title="workspaceShellVoiceLabel()"
                            :aria-label="workspaceShellVoiceLabel()"
                            @click="toggleWorkspaceVoiceInput()"
                        >
                            <i class="fa-solid fa-microphone-lines" aria-hidden="true"></i>
                        </button>

                        <button
                            class="home-v6-cmd-bar-tool"
                            type="button"
                            :class="{ 'is-disabled': !workspaceShellCanReset() }"
                            :title="activeAiResetLabel()"
                            :aria-label="activeAiResetLabel()"
                            :aria-disabled="workspaceShellCanReset() ? 'false' : 'true'"
                            @click="startNewWorkspaceChat()"
                        >
                            <i class="fa-regular fa-pen-to-square" aria-hidden="true"></i>
                        </button>
                    </div>

                    <button
                        class="home-v6-cmd-bar-submit"
                        type="button"
                        :disabled="!activeAiCanSubmit()"
                        @click="submitWorkspaceShell()"
                        :aria-label="workspaceShellSubmitLabel()"
                        :title="workspaceShellSubmitLabel()"
                        x-text="workspaceShellSubmitLabel()"
                    ></button>

                </div>

                <p class="home-v6-agent-field-error" x-cloak x-show="activeAiErrorText()" x-text="activeAiErrorText()"></p>
            </div>


        </div>
    </div>
</section>
