<section
    class="home-v6-representative-section"
    data-home-v6-representative-services="true"
    data-home-v6-agent-workspace="true"
>
    <div class="home-v6-card home-v6-agent-card">
        <div class="home-v6-agent-head">
            <div class="home-v6-agent-head-row">
                <h2 class="home-v6-agent-title">{{ agent_workspace.workspace_title|default:'AI 교무비서' }}</h2>
                <div class="home-v6-agent-head-actions" x-cloak x-show="activeMode.secondary_link_label && activeMode.secondary_link_href">
                    <a
                        class="home-v6-inline-secondary-action home-v6-inline-secondary-action--pill home-v6-agent-context-link"
                        :href="activeMode.secondary_link_href || '#'"
                        x-text="activeMode.secondary_link_label || ''"
                    ></a>
                </div>
            </div>

            <div class="home-v6-agent-toolbar">
                <div class="home-v6-agent-modebar">
                    <span class="home-v6-agent-mode-pill" x-text="activeMode.label || '알림장'"></span>
                    <div class="home-v6-agent-menu" @keydown.escape.window="agentModeMenuOpen = false">
                        <button
                            type="button"
                            class="home-v6-agent-menu-trigger"
                            data-home-v6-agent-mode-select="true"
                            :aria-expanded="agentModeMenuOpen ? 'true' : 'false'"
                            @click="agentModeMenuOpen = !agentModeMenuOpen"
                        >
                            <i class="fa-solid fa-plus" aria-hidden="true"></i>
                            <span class="sr-only">서비스 선택</span>
                        </button>

                        <div
                            class="home-v6-agent-menu-panel"
                            x-cloak
                            x-show="agentModeMenuOpen"
                            @click.outside="agentModeMenuOpen = false"
                        >
                            <div class="home-v6-agent-menu-grid">
                                <template x-for="mode in agentModes" :key="mode.key">
                                    <button
                                        type="button"
                                        class="home-v6-agent-menu-option"
                                        :class="{ 'is-active': mode.key === activeModeKey }"
                                        @click="selectAgentMode(mode.key)"
                                        x-text="mode.label"
                                    ></button>
                                </template>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="home-v6-agent-grid">
            <section class="home-v6-agent-console" data-home-v6-agent-console="true">
                <textarea
                    class="home-v6-agent-input"
                    data-home-v6-agent-input="true"
                    data-home-v7-workspace-input="true"
                    :placeholder="activeMode.placeholder || ''"
                    x-model="workspaceInput"
                    @keydown.ctrl.enter.prevent="runAgentPreview()"
                    @keydown.meta.enter.prevent="runAgentPreview()"
                ></textarea>
                <div class="home-v6-agent-action-row">
                    <button
                        type="button"
                        class="home-v6-empty-primary-action home-v6-agent-submit"
                        :disabled="isAgentLoading"
                        @click="runAgentPreview()"
                        x-text="isAgentLoading ? '생성 중' : (activeMode.submit_label || '보기')"
                    ></button>
                    <button
                        type="button"
                        class="home-v6-inline-secondary-action home-v6-agent-action"
                        x-cloak
                        x-show="activeMode.action_label"
                        @click="executeModeAction()"
                        x-text="activeMode.action_label || ''"
                    ></button>
                </div>
            </section>

            <section class="home-v6-agent-preview" data-home-v6-agent-preview="true">
                <div class="home-v6-agent-preview-head">
                    <h3 class="home-v6-agent-preview-title">결과</h3>
                </div>
                <div class="home-v6-agent-preview-lines" x-show="previewResultLines().length">
                    <template x-for="(line, index) in previewResultLines()" :key="activeModeKey + '-' + index + '-' + line">
                        <p class="home-v6-agent-preview-line" x-text="line"></p>
                    </template>
                </div>

                <div class="home-v6-agent-execution-warning-list" x-cloak x-show="agentExecution && (agentExecution.warnings || []).length">
                    <template x-for="warning in (agentExecution ? agentExecution.warnings : [])" :key="warning">
                        <p class="home-v6-agent-execution-warning" x-text="warning"></p>
                    </template>
                </div>

                <div class="home-v6-agent-execution" x-cloak x-show="agentExecution && agentExecution.kind === 'schedule'">
                    <div class="home-v6-agent-form-grid">
                        <label class="home-v6-agent-field" x-cloak x-show="agentExecution && (agentExecution.choices || []).length > 1">
                            <span class="home-v6-agent-field-label">일정</span>
                            <select
                                class="home-v6-agent-form-input"
                                :value="agentExecutionDraft.choice_id || ''"
                                @change="selectScheduleExecutionChoice($event.target.value)"
                            >
                                <template x-for="choice in (agentExecution ? agentExecution.choices : [])" :key="choice.id">
                                    <option :value="choice.id" x-text="choice.label"></option>
                                </template>
                            </select>
                        </label>

                        <label class="home-v6-agent-field">
                            <span class="home-v6-agent-field-label">이름</span>
                            <input type="text" class="home-v6-agent-form-input" x-model="agentExecutionDraft.title">
                        </label>

                        <div class="home-v6-agent-form-grid home-v6-agent-form-grid--split">
                            <label class="home-v6-agent-field">
                                <span class="home-v6-agent-field-label">시작</span>
                                <input type="datetime-local" class="home-v6-agent-form-input" x-model="agentExecutionDraft.start_time">
                            </label>
                            <label class="home-v6-agent-field">
                                <span class="home-v6-agent-field-label">종료</span>
                                <input type="datetime-local" class="home-v6-agent-form-input" x-model="agentExecutionDraft.end_time">
                            </label>
                        </div>

                        <label class="home-v6-agent-checkbox">
                            <input
                                type="checkbox"
                                :checked="Boolean(agentExecutionDraft.is_all_day)"
                                @change="agentExecutionDraft.is_all_day = $event.target.checked"
                            >
                            <span>하루 종일</span>
                        </label>

                        <label class="home-v6-agent-field">
                            <span class="home-v6-agent-field-label">메모</span>
                            <textarea class="home-v6-agent-form-textarea" x-model="agentExecutionDraft.note"></textarea>
                        </label>
                    </div>

                    <button
                        type="button"
                        class="home-v6-empty-primary-action home-v6-agent-confirm-submit"
                        :disabled="isAgentExecuting"
                        @click="executeAgentService()"
                        x-text="isAgentExecuting ? '저장 중' : ((agentExecution && agentExecution.submitLabel) || '저장')"
                    ></button>
                </div>

                <div class="home-v6-agent-execution" x-cloak x-show="agentExecution && agentExecution.kind === 'reservation'">
                    <div class="home-v6-agent-form-grid">
                        <label class="home-v6-agent-field" x-cloak x-show="reservationSchoolOptions().length > 1">
                            <span class="home-v6-agent-field-label">예약판</span>
                            <select
                                class="home-v6-agent-form-input"
                                x-model="agentExecutionDraft.school_slug"
                                @change="normalizeExecutionDraft()"
                            >
                                <template x-for="school in reservationSchoolOptions()" :key="school.slug">
                                    <option :value="school.slug" x-text="school.name"></option>
                                </template>
                            </select>
                        </label>

                        <div class="home-v6-agent-form-grid home-v6-agent-form-grid--split">
                            <label class="home-v6-agent-field">
                                <span class="home-v6-agent-field-label">날짜</span>
                                <input type="date" class="home-v6-agent-form-input" x-model="agentExecutionDraft.date">
                            </label>
                            <label class="home-v6-agent-field">
                                <span class="home-v6-agent-field-label">교시</span>
                                <select class="home-v6-agent-form-input" x-model="agentExecutionDraft.period">
                                    <option value="">선택</option>
                                    <template x-for="period in reservationPeriodOptions()" :key="period.id">
                                        <option :value="period.id" x-text="period.displayLabel || period.label"></option>
                                    </template>
                                </select>
                            </label>
                        </div>

                        <label class="home-v6-agent-field">
                            <span class="home-v6-agent-field-label">장소</span>
                            <select class="home-v6-agent-form-input" x-model="agentExecutionDraft.room_id">
                                <option value="">선택</option>
                                <template x-for="room in reservationRoomOptions()" :key="room.id">
                                    <option :value="room.id" x-text="room.name"></option>
                                </template>
                            </select>
                        </label>

                        <label class="home-v6-agent-field">
                            <span class="home-v6-agent-field-label">대상</span>
                            <select class="home-v6-agent-form-input" x-model="agentExecutionDraft.owner_type" @change="normalizeExecutionDraft()">
                                <option value="class">학급</option>
                                <option value="custom">기타</option>
                            </select>
                        </label>

                        <div class="home-v6-agent-form-grid home-v6-agent-form-grid--split" x-cloak x-show="agentExecutionDraft.owner_type === 'class'">
                            <label class="home-v6-agent-field">
                                <span class="home-v6-agent-field-label">학년</span>
                                <input type="number" min="1" class="home-v6-agent-form-input" x-model="agentExecutionDraft.grade">
                            </label>
                            <label class="home-v6-agent-field">
                                <span class="home-v6-agent-field-label">반</span>
                                <input type="number" min="1" class="home-v6-agent-form-input" x-model="agentExecutionDraft.class_no">
                            </label>
                        </div>

                        <label class="home-v6-agent-field" x-cloak x-show="agentExecutionDraft.owner_type === 'custom'">
                            <span class="home-v6-agent-field-label">이용 대상</span>
                            <input type="text" class="home-v6-agent-form-input" x-model="agentExecutionDraft.target_label" placeholder="예) 동아리, 방송부">
                        </label>

                        <div class="home-v6-agent-form-grid home-v6-agent-form-grid--split">
                            <label class="home-v6-agent-field">
                                <span class="home-v6-agent-field-label">이름</span>
                                <input type="text" class="home-v6-agent-form-input" x-model="agentExecutionDraft.name">
                            </label>
                            <label class="home-v6-agent-field">
                                <span class="home-v6-agent-field-label">수정 코드</span>
                                <input type="text" maxlength="4" inputmode="numeric" class="home-v6-agent-form-input" x-model="agentExecutionDraft.edit_code">
                            </label>
                        </div>

                        <label class="home-v6-agent-field">
                            <span class="home-v6-agent-field-label">메모</span>
                            <textarea class="home-v6-agent-form-textarea" x-model="agentExecutionDraft.memo"></textarea>
                        </label>
                    </div>

                    <button
                        type="button"
                        class="home-v6-empty-primary-action home-v6-agent-confirm-submit"
                        :disabled="isAgentExecuting"
                        @click="executeAgentService()"
                        x-text="isAgentExecuting ? '저장 중' : ((agentExecution && agentExecution.submitLabel) || '저장')"
                    ></button>
                </div>

                <div class="home-v6-agent-execution" x-cloak x-show="agentExecution && agentExecution.kind === 'teacher-law'">
                    <div class="home-v6-agent-form-grid">
                        <label class="home-v6-agent-field">
                            <span class="home-v6-agent-field-label">질문</span>
                            <textarea
                                class="home-v6-agent-form-textarea"
                                :class="{ 'home-v6-agent-form-input--error': executionFieldError('question') }"
                                data-home-v6-agent-field="question"
                                x-model="agentExecutionDraft.question"
                                @input="clearExecutionFieldError('question')"
                            ></textarea>
                            <span class="home-v6-agent-field-error" x-cloak x-show="executionFieldError('question')" x-text="executionFieldError('question')"></span>
                        </label>

                        <div class="home-v6-agent-form-grid home-v6-agent-form-grid--split">
                            <label class="home-v6-agent-field">
                                <span class="home-v6-agent-field-label">사건 유형</span>
                                <select
                                    class="home-v6-agent-form-input"
                                    :class="{ 'home-v6-agent-form-input--error': executionFieldError('incident_type') }"
                                    data-home-v6-agent-field="incident_type"
                                    x-model="agentExecutionDraft.incident_type"
                                    @change="normalizeExecutionDraft(); clearExecutionFieldError('incident_type'); clearExecutionFieldError('scene'); clearExecutionFieldError('counterpart')"
                                >
                                    <option value="">선택</option>
                                    <template x-for="item in teacherLawIncidentOptions()" :key="item.value">
                                        <option :value="item.value" x-text="item.label"></option>
                                    </template>
                                </select>
                                <span class="home-v6-agent-field-error" x-cloak x-show="executionFieldError('incident_type')" x-text="executionFieldError('incident_type')"></span>
                            </label>
                            <label class="home-v6-agent-field">
                                <span class="home-v6-agent-field-label">궁금한 것</span>
                                <select
                                    class="home-v6-agent-form-input"
                                    :class="{ 'home-v6-agent-form-input--error': executionFieldError('legal_goal') }"
                                    data-home-v6-agent-field="legal_goal"
                                    x-model="agentExecutionDraft.legal_goal"
                                    @change="clearExecutionFieldError('legal_goal')"
                                >
                                    <option value="">선택</option>
                                    <template x-for="item in teacherLawGoalOptions()" :key="item.value">
                                        <option :value="item.value" x-text="item.label"></option>
                                    </template>
                                </select>
                                <span class="home-v6-agent-field-error" x-cloak x-show="executionFieldError('legal_goal')" x-text="executionFieldError('legal_goal')"></span>
                            </label>
                        </div>

                        <label class="home-v6-agent-field" x-cloak x-show="teacherLawNeedsScene()">
                            <span class="home-v6-agent-field-label">장면</span>
                            <select
                                class="home-v6-agent-form-input"
                                :class="{ 'home-v6-agent-form-input--error': executionFieldError('scene') }"
                                data-home-v6-agent-field="scene"
                                x-model="agentExecutionDraft.scene"
                                @change="clearExecutionFieldError('scene')"
                            >
                                <option value="">선택</option>
                                <template x-for="item in teacherLawSceneOptions()" :key="item.value">
                                    <option :value="item.value" x-text="item.label"></option>
                                </template>
                            </select>
                            <span class="home-v6-agent-field-error" x-cloak x-show="executionFieldError('scene')" x-text="executionFieldError('scene')"></span>
                        </label>

                        <label class="home-v6-agent-field" x-cloak x-show="teacherLawNeedsCounterpart()">
                            <span class="home-v6-agent-field-label">상대</span>
                            <select
                                class="home-v6-agent-form-input"
                                :class="{ 'home-v6-agent-form-input--error': executionFieldError('counterpart') }"
                                data-home-v6-agent-field="counterpart"
                                x-model="agentExecutionDraft.counterpart"
                                @change="clearExecutionFieldError('counterpart')"
                            >
                                <option value="">선택</option>
                                <template x-for="item in teacherLawCounterpartOptions()" :key="item.value">
                                    <option :value="item.value" x-text="item.label"></option>
                                </template>
                            </select>
                            <span class="home-v6-agent-field-error" x-cloak x-show="executionFieldError('counterpart')" x-text="executionFieldError('counterpart')"></span>
                        </label>
                    </div>

                    <button
                        type="button"
                        class="home-v6-empty-primary-action home-v6-agent-confirm-submit"
                        :disabled="isAgentExecuting"
                        @click="executeAgentService()"
                        x-text="isAgentExecuting ? '저장 중' : ((agentExecution && agentExecution.submitLabel) || '저장')"
                    ></button>
                </div>

                <div class="home-v6-agent-preview-foot" x-cloak x-show="!agentExecution && agentPreview.confirmHref && agentPreview.confirmLabel">
                    <a
                        class="home-v6-inline-secondary-action home-v6-inline-secondary-action--pill home-v6-agent-open-link"
                        :href="agentPreview.confirmHref"
                        x-text="agentPreview.confirmLabel"
                    ></a>
                </div>
            </section>
        </div>
    </div>
</section>
