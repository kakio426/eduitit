<section
    class="home-v6-representative-section"
    data-home-v6-representative-services="true"
    data-home-v6-agent-workspace="true"
>
    <div class="home-v6-card home-v6-agent-card">
        <div class="home-v6-agent-head">
            <h2 class="home-v6-agent-title">{{ agent_workspace.workspace_title|default:'바로 실행' }}</h2>
        </div>

        <div class="home-v6-agent-toolbar">
            <div class="home-v6-agent-select-wrap">
                <select
                    class="home-v6-agent-select"
                    data-home-v6-agent-mode-select="true"
                    x-model="activeModeKey"
                    @change="selectAgentMode($event.target.value)"
                >
                    {% for mode in agent_workspace.modes %}
                    <option value="{{ mode.key }}"{% if mode.key == agent_workspace.initial_mode %} selected{% endif %}>{{ mode.label }}</option>
                    {% endfor %}
                </select>
                <i class="fa-solid fa-chevron-down" aria-hidden="true"></i>
            </div>
        </div>

        <div class="home-v6-agent-grid">
            <section class="home-v6-agent-console" data-home-v6-agent-console="true">
                <textarea
                    class="home-v6-agent-input"
                    data-home-v6-agent-input="true"
                    data-home-v7-workspace-input="true"
                    :placeholder="activeMode.placeholder || ''"
                    x-model="workspaceInput"
                    @keydown.ctrl.enter.prevent="runAgentPreview()"
                    @keydown.meta.enter.prevent="runAgentPreview()"
                ></textarea>
                <div class="home-v6-agent-chip-list">
                    <template x-for="example in (activeMode.examples || [])" :key="example">
                        <button type="button" class="home-v6-agent-chip" @click="useExample(example)" x-text="example"></button>
                    </template>
                </div>
                <div class="home-v6-agent-action-row">
                    <button
                        type="button"
                        class="home-v6-empty-primary-action home-v6-agent-submit"
                        :disabled="isAgentLoading"
                        @click="runAgentPreview()"
                        x-text="isAgentLoading ? '생성 중' : (activeMode.submit_label || '보기')"
                    ></button>
                    <button
                        type="button"
                        class="home-v6-inline-secondary-action home-v6-agent-action"
                        x-cloak
                        x-show="activeMode.action_label"
                        @click="executeModeAction()"
                        x-text="activeMode.action_label || ''"
                    ></button>
                </div>
            </section>

            <section class="home-v6-agent-preview" data-home-v6-agent-preview="true">
                <div class="home-v6-agent-preview-lines" x-show="previewResultLines().length">
                    <template x-for="(line, index) in previewResultLines()" :key="activeModeKey + '-' + index + '-' + line">
                        <p class="home-v6-agent-preview-line" x-text="line"></p>
                    </template>
                </div>
            </section>
        </div>
    </div>
</section>
