<section class="rounded-[2rem] border border-slate-200 bg-white p-5 shadow-sm" x-data="homeCalendarWidget()" x-init="init()" data-home-v2-top-calendar="true">
    <div class="flex flex-col gap-4">
        <div class="flex flex-col gap-3">
            <div class="flex items-start justify-between gap-3">
                <div>
                    <h3 class="text-lg md:text-xl font-black text-slate-900 flex items-center gap-2">
                        <i class="fa-solid fa-calendar-days text-indigo-500"></i>
                        학급 캘린더
                    </h3>
                    <p class="mt-1 text-xs font-semibold text-slate-400">날짜를 눌러 그날 일정을 보거나 바로 등록합니다.</p>
                </div>
                <div class="flex items-center gap-1.5">
                    <button type="button" @click="prevMonth()" class="inline-flex h-9 w-9 items-center justify-center rounded-xl border border-slate-200 text-slate-500 hover:bg-slate-50" aria-label="이전 달">
                        <i class="fa-solid fa-chevron-left text-xs"></i>
                    </button>
                    <button type="button" @click="nextMonth()" class="inline-flex h-9 w-9 items-center justify-center rounded-xl border border-slate-200 text-slate-500 hover:bg-slate-50" aria-label="다음 달">
                        <i class="fa-solid fa-chevron-right text-xs"></i>
                    </button>
                </div>
            </div>
            <div class="flex flex-col gap-3 sm:flex-row sm:items-center sm:justify-between">
                <h4 class="text-base font-black text-slate-800" x-text="currentMonthText"></h4>
                <div class="flex flex-wrap items-center gap-2">
                    <a href="{% url 'classcalendar:main' %}" class="inline-flex items-center gap-2 rounded-2xl border border-slate-300 bg-white px-3.5 py-2 text-xs font-black text-slate-700 hover:border-indigo-300 hover:text-indigo-600 transition">
                        <i class="fa-solid fa-calendar-days"></i> 캘린더 열기
                    </a>
                    <button type="button" @click="openCreateModalForDate(new Date())" class="inline-flex items-center gap-2 rounded-2xl bg-indigo-600 px-3.5 py-2 text-xs font-black text-white hover:bg-indigo-700 transition">
                        <i class="fa-solid fa-plus"></i> 일정 추가
                    </button>
                </div>
            </div>
        </div>

        <div class="grid grid-cols-7 gap-px overflow-hidden rounded-[1.4rem] border border-slate-200 bg-slate-200">
            <template x-for="day in ['일', '월', '화', '수', '목', '금', '토']" :key="day">
                <div class="bg-slate-100 py-2 text-center text-[11px] font-extrabold text-slate-500" x-text="day"></div>
            </template>
            <template x-for="date in calendarDates" :key="date.toISOString()">
                <button
                    type="button"
                    class="home-calendar-day bg-white px-1.5 py-2 text-left hover:bg-slate-50 transition"
                    @click="handleDateClick(date)"
                    :title="dayTooltip(date)"
                >
                    <div class="flex items-start justify-between gap-1">
                        <span
                            class="flex h-6 w-6 items-center justify-center rounded-full text-[11px] font-bold"
                            :class="{
                                'bg-indigo-600 text-white': isToday(date),
                                'text-slate-400': !isCurrentMonth(date),
                                'text-slate-700': isCurrentMonth(date) && !isToday(date)
                            }"
                            x-text="date.getDate()"
                        ></span>
                        <span
                            x-show="getEventsForDate(date).length > 0"
                            class="inline-flex h-5 min-w-5 items-center justify-center rounded-full bg-slate-100 px-1 text-[10px] font-black text-slate-500"
                            x-text="getEventsForDate(date).length"
                        ></span>
                    </div>
                    <div class="mt-1 space-y-1">
                        <template x-for="event in getVisibleEventsForDate(date)" :key="event.id">
                            <button
                                type="button"
                                @click.stop="openDayEventsModalForDate(date)"
                                class="block w-full rounded border px-1 py-0.5 text-[10px] font-semibold truncate"
                                :class="eventChipClass(event)"
                                x-text="eventLabel(event)"
                            ></button>
                        </template>
                        <p x-show="getOverflowCountForDate(date) > 0"
                           class="px-0.5 text-[10px] font-semibold text-slate-500"
                           x-text="`+${getOverflowCountForDate(date)}개`"></p>
                    </div>
                </button>
            </template>
        </div>
    </div>

    <div x-show="dayEventsModalOpen" x-cloak class="fixed inset-0 z-50 flex items-center justify-center bg-slate-900/50 px-4" @click.self="closeDayEventsModal()">
        <div class="w-full max-w-lg bg-white rounded-2xl p-5 border border-slate-200 shadow-2xl">
            <div class="flex items-start justify-between gap-3 mb-4">
                <div>
                    <h3 class="text-lg font-extrabold text-slate-900">선택한 날짜 일정</h3>
                    <p class="text-xs font-semibold text-slate-500 mt-1" x-text="selectedDateLabel"></p>
                </div>
                <button type="button" @click="closeDayEventsModal()" class="w-8 h-8 rounded-lg border border-slate-200 text-slate-500 hover:bg-slate-50" aria-label="닫기">
                    <i class="fa-solid fa-xmark text-sm"></i>
                </button>
            </div>

            <div class="max-h-80 overflow-y-auto space-y-2 pr-1">
                <template x-for="event in selectedDateEvents" :key="`home-selected-${event.id}`">
                    <div class="rounded-xl border border-slate-200 bg-slate-50 p-3">
                        <p class="text-sm font-bold text-slate-900 truncate" x-text="event.title"></p>
                        <p class="text-xs font-semibold text-slate-600 mt-1" x-text="formatEventRange(event)"></p>
                        <p x-show="event.note" class="text-xs text-slate-500 mt-2 leading-relaxed whitespace-pre-line line-clamp-2" x-text="event.note"></p>
                    </div>
                </template>
            </div>

            <div class="flex justify-end gap-2 pt-4">
                <a href="{% url 'classcalendar:main' %}" class="px-3.5 py-2 rounded-lg border border-slate-300 text-slate-700 text-sm font-semibold hover:bg-slate-50">
                    전체 캘린더
                </a>
                <button type="button" @click="openCreateModalForSelectedDate()" class="px-3.5 py-2 rounded-lg bg-indigo-600 text-white text-sm font-bold hover:bg-indigo-700">
                    일정 추가
                </button>
            </div>
        </div>
    </div>

    <div x-show="createModalOpen" x-cloak class="fixed inset-0 z-50 flex items-center justify-center bg-slate-900/50 px-4" @click.self="createModalOpen = false">
        <div class="w-full max-w-lg bg-white rounded-2xl p-5 border border-slate-200 shadow-2xl">
            <h3 class="text-lg font-extrabold text-slate-900 mb-1">일정 빠른 추가</h3>
            <p class="mb-4 text-xs font-semibold text-slate-500" x-text="createContextDateText"></p>
            <form @submit.prevent="submitCreateEvent" class="space-y-3">
                <div>
                    <label class="block text-xs font-bold text-slate-700 mb-1">제목</label>
                    <input x-model="createForm.title" type="text" required maxlength="200" class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400">
                </div>
                <div class="grid grid-cols-1 sm:grid-cols-2 gap-2">
                    <div>
                        <label class="block text-xs font-bold text-slate-700 mb-1">시작</label>
                        <input x-model="createForm.start_time" type="datetime-local" required class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-slate-700 mb-1">종료</label>
                        <input x-model="createForm.end_time" type="datetime-local" required class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400">
                    </div>
                </div>
                <div>
                    <label class="block text-xs font-bold text-slate-700 mb-1">노트</label>
                    <textarea x-model="createForm.note" rows="3" class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400" placeholder="개인 메모를 남겨두세요."></textarea>
                </div>
                <div class="flex items-center justify-between">
                    <label class="inline-flex items-center gap-2 text-xs font-semibold text-slate-700">
                        <input x-model="createForm.is_all_day" type="checkbox" class="rounded border-slate-300"> 하루 종일
                    </label>
                    <select x-model="createForm.color" class="rounded-lg border border-slate-300 px-2.5 py-1.5 text-xs font-semibold text-slate-700 focus:outline-none focus:ring-2 focus:ring-indigo-400">
                        <option value="indigo">인디고</option>
                        <option value="rose">로즈</option>
                        <option value="amber">앰버</option>
                        <option value="emerald">에메랄드</option>
                        <option value="sky">스카이</option>
                    </select>
                </div>
                <div class="flex justify-end gap-2 pt-1">
                    <button type="button" @click="createModalOpen = false" class="px-3.5 py-2 rounded-lg border border-slate-300 text-slate-700 text-sm font-semibold">취소</button>
                    <button type="submit" :disabled="isSubmitting" class="px-3.5 py-2 rounded-lg bg-indigo-600 text-white text-sm font-bold disabled:opacity-60">저장</button>
                </div>
            </form>
        </div>
    </div>
</section>
