{% extends 'base.html' %}

{% block title %}회원 탈퇴 - Eduitit{% endblock %}

{% block content %}
<section class="service-shell pb-20 px-4 min-h-screen flex items-center justify-center">
    <div class="max-w-md w-full" data-aos="zoom-in">
        <div class="clay-card p-7 bg-white/75 space-y-7 text-center md:p-9">
            <div
                class="w-20 h-20 rounded-full bg-red-50 flex items-center justify-center text-red-500 text-3xl mx-auto shadow-clay-inner">
                <i class="fa-solid fa-user-xmark float-icon"></i>
            </div>

            <div class="space-y-3">
                <h1 class="text-3xl font-bold text-gray-700 font-round">회원 탈퇴</h1>
                <p class="rounded-2xl border border-red-100 bg-red-50 px-4 py-3 text-base font-bold leading-relaxed text-red-600">
                    활동 기록과 설정이 삭제됩니다.
                </p>
                <p class="text-sm font-bold text-gray-400">삭제 후 복구할 수 없습니다.</p>
            </div>

            <form method="post" class="space-y-4">
                {% csrf_token %}
                <button type="submit"
                    class="w-full py-4 bg-red-500 text-white rounded-2xl font-bold text-lg shadow-clay hover:bg-red-600 transition-all hover:scale-[1.01] active:scale-95">
                    계정 삭제
                </button>
                <a href="{% url 'settings' %}"
                    class="block w-full py-4 bg-gray-200 text-gray-600 rounded-2xl font-bold text-lg hover:bg-gray-300 transition-all">
                    취소
                </a>
            </form>
        </div>
    </div>
</section>
{% endblock %}
