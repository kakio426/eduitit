{% if today_try_cards %}
<section class="mb-6" data-home-v2-try-now="true">
    <div class="mb-3 flex items-center justify-between gap-3">
        <div>
            <h3 class="text-sm font-bold text-slate-500">오늘 바로 써보기</h3>
            <p class="text-xs text-slate-400">자주 여는 대표 흐름만 먼저 둡니다.</p>
        </div>
    </div>
    <div class="grid grid-cols-1 gap-3 md:grid-cols-2 md:gap-4" data-home-v2-try-now-grid="true">
        {% for card in today_try_cards %}
        <div
            class="group product-card relative h-full cursor-pointer rounded-[1.6rem] border border-slate-200 bg-white px-4 py-4 shadow-sm transition-all hover:border-indigo-200 hover:shadow-md focus:outline-none focus-visible:ring-2 focus-visible:ring-indigo-400 focus-visible:ring-offset-2 md:min-h-[168px] md:px-5"
            data-home-v2-try-now-card="{{ card.key }}"
            data-product-id="{{ card.product_id }}"
            data-launch-href="{{ card.href }}"
            data-launch-external="{{ card.is_external|yesno:'true,false' }}"
            data-track="mini_card"
            data-track-label="{{ card.track_label }}"
            role="button"
            tabindex="0"
        >
            <div class="flex h-full flex-col justify-between gap-4">
                <div class="space-y-3">
                    <div class="flex items-start gap-3">
                        <span class="flex h-10 w-10 flex-shrink-0 items-center justify-center rounded-2xl bg-slate-50 text-base shadow-sm {{ card.icon_color_class }}">
                            {% if "fa-" in card.icon %}<i class="{{ card.icon }}"></i>{% else %}{{ card.icon }}{% endif %}
                        </span>
                        <div class="min-w-0 flex-1 pt-0.5">
                            <h4 class="text-[1.08rem] font-black leading-6 text-slate-900 transition-colors group-hover:text-indigo-600">
                                {{ card.title }}
                            </h4>
                            <p class="mt-1 text-[0.92rem] leading-5 text-slate-500 line-clamp-2">
                                {{ card.description }}
                            </p>
                        </div>
                    </div>
                </div>
                <div class="flex items-center justify-between gap-3 text-xs">
                    <span class="truncate rounded-full bg-slate-100 px-2.5 py-1 font-bold text-slate-500">
                        {{ card.access_status_label }}
                    </span>
                    <span class="inline-flex items-center gap-1 font-bold text-slate-400 transition-colors group-hover:text-indigo-500">
                        <span>바로 열기</span>
                        <i class="fa-solid fa-arrow-right text-[10px]"></i>
                    </span>
                </div>
            </div>
        </div>
        {% endfor %}
    </div>
</section>
{% endif %}
