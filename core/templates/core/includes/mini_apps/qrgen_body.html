<div
    x-data="createQrgenSingleLinkMiniApp({ previewDomId: '{{ entry.preview_dom_id }}', idleMessage: '{{ entry.state.message }}' })"
    x-init="init()"
    class="space-y-3"
>
    <div class="mini-app-input-row" data-mini-app-input-row="true">
        <label class="block">
            <span class="mb-1 block text-xs font-black text-slate-700">링크</span>
            <input
                x-model.trim="url"
                type="text"
                placeholder="예: forms.gle/abcd1234"
                class="w-full rounded-xl border border-slate-200 bg-slate-50 px-3 py-2.5 text-sm text-slate-700 focus:border-indigo-300 focus:outline-none"
            >
        </label>
    </div>

    <div
        class="rounded-[1.4rem] border px-4 py-3"
        :class="{
            'border-slate-200 bg-slate-50 text-slate-600': status === 'idle' || status === 'empty',
            'border-red-200 bg-red-50 text-red-700': status === 'error',
            'border-emerald-200 bg-emerald-50 text-emerald-800': status === 'success'
        }"
        :data-mini-app-state="status"
    >
        <template x-if="status !== 'success'">
            <p class="text-sm leading-6" x-text="message"></p>
        </template>
        <template x-if="status === 'success'">
            <div class="flex items-center gap-4">
                <div id="{{ entry.preview_dom_id }}" class="flex h-[152px] w-[152px] flex-shrink-0 items-center justify-center rounded-2xl bg-white shadow-sm"></div>
                <div class="min-w-0 flex-1">
                    <p class="text-sm font-black text-slate-900">QR 미리보기</p>
                    <p class="mt-1 text-sm leading-6 text-slate-600">학생에게 바로 보여줄 수 있는 QR입니다.</p>
                    <p class="mt-2 text-xs font-semibold text-slate-500 break-all" x-text="normalizedUrl"></p>
                    <button
                        type="button"
                        class="mt-3 inline-flex items-center gap-1.5 rounded-lg border border-emerald-200 bg-white px-3 py-2 text-xs font-black text-emerald-700 transition hover:bg-emerald-100"
                        @click="copyLink()"
                        data-mini-app-action="copy"
                    >
                        <i class="fa-regular fa-copy"></i>
                        링크 복사
                    </button>
                </div>
            </div>
        </template>
    </div>

    <div class="flex flex-wrap gap-2">
        <button
            type="button"
            class="inline-flex items-center gap-2 rounded-xl bg-indigo-600 px-4 py-2.5 text-sm font-black text-white transition hover:bg-indigo-700"
            @click="submit()"
            data-mini-app-action="run"
        >
            <i class="fa-solid fa-qrcode text-xs"></i>
            {{ entry.primary_action_label }}
        </button>
        <button
            type="button"
            class="inline-flex items-center gap-2 rounded-xl border border-slate-200 bg-white px-4 py-2.5 text-sm font-black text-slate-700 transition hover:border-slate-300"
            @click="reset()"
            data-mini-app-action="reset"
        >
            초기화
        </button>
    </div>
</div>
