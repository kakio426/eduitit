{% load static %}
<div class="flex gap-4 group" id="gr-step-{{ step.order }}">

    {# 타임라인 선 + 숫자 뱃지 #}
    <div class="flex flex-col items-center flex-shrink-0">
        <div class="w-9 h-9 rounded-full bg-indigo-600 text-white flex items-center justify-center text-sm font-bold shadow">
            {{ step.order }}
        </div>
        <div class="w-0.5 bg-indigo-200 flex-1 mt-1 last:hidden"></div>
    </div>

    {# 카드 본문 #}
    <div class="flex-1 pb-8">
        <div class="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden">

            {# 스크린샷 #}
            {% if step.screenshot %}
            <img src="{{ step.screenshot.url }}"
                 alt="Step {{ step.order }} 스크린샷"
                 class="w-full object-cover border-b border-gray-100 cursor-zoom-in"
                 loading="lazy"
                 onclick="this.classList.toggle('max-h-64'); this.classList.toggle('max-h-none');"
                 style="max-height:16rem; transition: max-height .3s;">
            {% endif %}

            {# 설명 + 편집 (Alpine.js) #}
            <div class="p-4"
                 x-data="{
                    editing: false,
                    desc: '{{ step.description|escapejs }}',
                    saving: false,
                    status: '',
                    async saveDescription() {
                        this.saving = true;
                        this.status = '';
                        try {
                            const response = await fetch('{% url 'guide_recorder:api_update_description' pk=step.pk %}', {
                                method: 'POST',
                                headers: {'Content-Type': 'application/json', 'X-CSRFToken': '{{ csrf_token }}', 'Accept': 'application/json'},
                                body: JSON.stringify({description: this.desc})
                            });
                            const data = await window.guideRecorderReadJson(response);
                            if (!data.ok) {
                                throw new Error(data.error || '저장 실패');
                            }
                            this.editing = false;
                        } catch (error) {
                            this.status = '저장 실패';
                        } finally {
                            this.saving = false;
                        }
                    }
                 }">

                {# 보기 모드 #}
                <div x-show="!editing" class="flex items-start justify-between gap-3">
                    <p class="text-gray-700 text-sm leading-relaxed flex-1" x-text="desc"></p>
                    {% if can_edit %}
                    <div class="flex gap-2 flex-shrink-0 opacity-0 group-hover:opacity-100 transition-opacity">
                        <button @click="editing = true"
                                class="text-xs text-indigo-500 hover:text-indigo-700 px-2 py-1 rounded hover:bg-indigo-50 transition-colors"
                                title="설명 수정">
                            <i class="fa-solid fa-pen text-xs"></i>
                        </button>
                        <button hx-post="{% url 'guide_recorder:api_delete_step' pk=step.pk %}"
                                hx-target="#gr-step-{{ step.order }}"
                                hx-swap="outerHTML"
                                hx-trigger="guide-confirmed"
                                hx-headers='{"X-CSRFToken": "{{ csrf_token }}"}'
                                data-gr-confirm="삭제하시겠습니까?"
                                class="text-xs text-red-400 hover:text-red-600 px-2 py-1 rounded hover:bg-red-50 transition-colors"
                                title="단계 삭제">
                            <i class="fa-solid fa-trash text-xs"></i>
                        </button>
                    </div>
                    {% endif %}
                </div>

                {# 편집 모드 #}
                {% if can_edit %}
                <div x-show="editing" x-cloak class="flex flex-col gap-2">
                    <textarea x-model="desc"
                              class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm resize-none focus:outline-none focus:ring-2 focus:ring-indigo-400"
                              rows="2"
                              maxlength="500"></textarea>
                    <div class="flex gap-2 justify-end">
                        <button @click="editing = false"
                                class="text-xs px-3 py-1.5 rounded-lg border border-gray-300 text-gray-600 hover:bg-gray-50">
                            취소
                        </button>
                        <button @click.prevent="saveDescription()"
                                :disabled="saving"
                                class="text-xs px-3 py-1.5 rounded-lg bg-indigo-600 text-white hover:bg-indigo-700 disabled:opacity-60">
                            <span x-text="saving ? '저장 중' : '저장'"></span>
                        </button>
                    </div>
                    <p x-show="status" x-text="status" class="text-xs font-bold text-red-600"></p>
                </div>
                {% endif %}

            </div>
        </div>
    </div>
</div>
